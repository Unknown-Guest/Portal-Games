<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CIVILISATION</title>
<style>
:root{--g:#3fbf3f;--gs:#6fdc6f;--gd:#2a9f2a;--r:#ff4444;--gold:#ffcc00;--bg:#000;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--g);font-family:'Courier New',monospace;display:flex;flex-direction:column;min-height:100vh;user-select:none;}
#hdr{border-bottom:2px solid var(--g);box-shadow:0 0 14px color-mix(in srgb,var(--g) 60%,transparent);padding:10px 24px;display:flex;align-items:center;flex-shrink:0;background:var(--bg);}
#hdr-title{font-size:20px;font-weight:bold;letter-spacing:5px;text-shadow:0 0 10px var(--g);flex:1;text-align:center;}
.back-btn{padding:5px 14px;border:1px solid var(--g);background:transparent;color:var(--g);font-size:10px;letter-spacing:2px;cursor:pointer;}
.back-btn:hover{background:var(--g);color:#000;}
#gw{flex:1;display:flex;justify-content:center;align-items:flex-start;padding:14px 16px 24px;}
#go{position:relative;width:960px;height:560px;border:2px solid var(--g);box-shadow:0 0 24px color-mix(in srgb,var(--g) 20%,transparent);flex-shrink:0;overflow:hidden;background:#000;}

</style>
</head>
<body>
<div id="hdr">
  <button class="back-btn" onclick="(function(){if(window.opener||window.history.length<=1)window.close();else location.href='websites.html';})()" >&#8592; BACK</button>
  <div style="flex:1;text-align:center;"><div id="hdr-title">CIVILISATION</div><div style="font-size:9px;letter-spacing:2px;color:var(--gs);">// IDLE STRATEGY //</div></div>
  <div style="width:90px;display:flex;justify-content:flex-end;"><button onclick="_goFS()" style="background:transparent;border:1px solid #2a4a2a;color:#3a6a3a;font-size:10px;padding:4px 8px;cursor:pointer;font-family:monospace;">&#9974; FULL</button></div>
</div>
<div id="gw"><div id="go">
<div style="width:100%;height:100%;display:flex;flex-direction:column;background:#050a05;font-family:'Courier New',monospace;overflow:hidden;">
  <div style="display:flex;gap:16px;padding:8px 12px;border-bottom:1px solid #1a2a1a;flex-shrink:0;flex-wrap:wrap;">
    <div><span style="font-size:8px;color:#2a5a2a;letter-spacing:2px;">👥 POP</span><div id="cv-pop" style="color:var(--g);font-size:12px;">10</div></div>
    <div><span style="font-size:8px;color:#2a5a2a;letter-spacing:2px;">🌾 FOOD</span><div id="cv-food" style="color:#8bc34a;font-size:12px;">0</div></div>
    <div><span style="font-size:8px;color:#2a5a2a;letter-spacing:2px;">🪵 WOOD</span><div id="cv-wood" style="color:#8d6e63;font-size:12px;">0</div></div>
    <div><span style="font-size:8px;color:#2a5a2a;letter-spacing:2px;">🪨 STONE</span><div id="cv-stone" style="color:#9e9e9e;font-size:12px;">0</div></div>
    <div><span style="font-size:8px;color:#2a5a2a;letter-spacing:2px;">⚙️ SCIENCE</span><div id="cv-sci" style="color:#4af;font-size:12px;">0</div></div>
    <div><span style="font-size:8px;color:#2a5a2a;letter-spacing:2px;">💰 GOLD</span><div id="cv-gold" style="color:var(--gold,#fc0);font-size:12px;">0</div></div>
    <div style="margin-left:auto;text-align:right;"><div id="cv-age" style="font-size:9px;letter-spacing:2px;color:var(--gold,#fc0);">STONE AGE</div><div id="cv-msg" style="font-size:8px;color:#2a5a2a;min-width:160px;"></div></div>
  </div>
  <div style="display:flex;flex:1;overflow:hidden;">
    <div style="flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:4px;" id="cv-buildings"></div>
    <div style="width:240px;border-left:1px solid #1a2a1a;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:4px;">
      <div style="font-size:8px;letter-spacing:3px;color:#2a3a2a;margin-bottom:4px;">RESEARCH</div>
      <div id="cv-techs"></div>
    </div>
  </div>
</div>
</div></div>
<script>
(function(){
  var t=JSON.parse(localStorage.getItem('scpLastTheme')||localStorage.getItem('scpTheme')||'{}');
  var bg=t.bg||'#000000', ac=t.accent||'#3fbf3f';
  document.documentElement.style.setProperty('--g', ac);
  document.documentElement.style.setProperty('--bg', bg);
  function lighten(hex,amt){
    var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    r=Math.min(255,r+amt);g=Math.min(255,g+amt);b=Math.min(255,b+amt);
    return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
  }
  document.documentElement.style.setProperty('--gs', lighten(ac,50));
  document.documentElement.style.setProperty('--gd', lighten(ac,-30));
  document.body.style.backgroundColor=bg;
  document.getElementById('hdr').style.backgroundColor=bg;
  // Disable right-click on all game pages
  document.addEventListener('contextmenu', function(e){ e.preventDefault(); return false; });
  // Disable right-click drag image ghost
  document.addEventListener('dragstart', function(e){ e.preventDefault(); return false; });
})();
function _goFS(){const el=document.getElementById('go');if(!document.fullscreenElement)el.requestFullscreen().catch(()=>{});else document.exitFullscreen().catch(()=>{});}
document.addEventListener('keydown',e=>{if(e.code==='KeyF')_goFS();});
document.addEventListener('fullscreenchange',()=>{const el=document.getElementById('go');if(document.fullscreenElement===el){const s=Math.min(screen.width/960,screen.height/560);el.style.cssText='transform:scale('+s+');transform-origin:top left;position:fixed;top:'+Math.floor((screen.height-560*s)/2)+'px;left:'+Math.floor((screen.width-960*s)/2)+'px;z-index:9999;';}else{el.style.cssText='';}});

let R={food:50,wood:30,stone:0,sci:0,gold:0,pop:10,maxPop:20};
let B={farm:0,woodcutter:0,quarry:0,school:0,market:0,barracks:0,house:0,wonder:0};
let T={writing:false,agriculture:false,masonry:false,trade:false,military:false,philosophy:false};
let age='STONE AGE',tick2=0;
const BS={
  farm:{name:'FARM',icon:'🌾',base:{wood:30},prod:{food:2},cap:'Feeds 10 people',req:{}},
  woodcutter:{name:'WOODCUTTER',icon:'🪵',base:{food:20},prod:{wood:1},cap:'Chops trees',req:{}},
  quarry:{name:'QUARRY',icon:'🪨',base:{food:30,wood:20},prod:{stone:1},cap:'Mines stone',req:{agriculture:true}},
  school:{name:'SCHOOL',icon:'📚',base:{wood:50,stone:20},prod:{sci:0.5},cap:'Generates science',req:{writing:true}},
  market:{name:'MARKET',icon:'🏪',base:{wood:40,stone:30},prod:{gold:1},cap:'Generates gold',req:{trade:true}},
  barracks:{name:'BARRACKS',icon:'⚔️',base:{wood:60,stone:40},prod:{},cap:'Unlocks military',req:{military:true}},
  house:{name:'HOUSE',icon:'🏠',base:{wood:40,stone:10},prod:{},cap:'+10 max population',effect:'maxPop',req:{}},
  wonder:{name:'WONDER',icon:'🏛️',base:{stone:500,gold:200,sci:100},prod:{sci:5,gold:3},cap:'Pinnacle of civilisation',req:{philosophy:true}},
};
const TS={
  writing:{name:'WRITING',icon:'📜',cost:{food:50,wood:30},desc:'Enables schools',req:{}},
  agriculture:{name:'AGRICULTURE',icon:'🌱',cost:{food:100},desc:'Enables quarries',req:{}},
  masonry:{name:'MASONRY',icon:'🧱',cost:{stone:50,sci:20},desc:'Stronger buildings',req:{writing:true}},
  trade:{name:'TRADE ROUTES',icon:'🛒',cost:{gold:50,sci:30},desc:'Enables markets',req:{writing:true}},
  military:{name:'MILITARY',icon:'🗡️',cost:{stone:80,sci:20},desc:'Enables barracks',req:{agriculture:true}},
  philosophy:{name:'PHILOSOPHY',icon:'🔮',cost:{sci:150,gold:100},desc:'Enables the Wonder',req:{masonry:true,trade:true}},
};
function fmt(n){if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1000)return(n/1000).toFixed(1)+'K';return Math.floor(n);}
function canAfford(cost){return Object.entries(cost).every(([k,v])=>R[k]>=v);}
function spend(cost){Object.entries(cost).forEach(([k,v])=>R[k]-=v);}
function buildCost(id,n){const bc={...BS[id].base};Object.keys(bc).forEach(k=>bc[k]=Math.ceil(bc[k]*Math.pow(1.2,n)));return bc;}
function buyBuilding(id){const b=BS[id];if(!metReq(b.req))return;const cost=buildCost(id,B[id]);if(!canAfford(cost))return;spend(cost);B[id]++;if(id==='house')R.maxPop+=10;cvMsg('Built '+b.name);renderAll();}
function buyTech(id){const t=TS[id];if(T[id]||!metReq(t.req)||!canAfford(t.cost))return;spend(t.cost);T[id]=true;cvMsg('Researched: '+t.name);checkAge();renderAll();}
function metReq(req){return Object.entries(req).every(([k,v])=>T[k]===v);}
function checkAge(){if(T.philosophy&&B.wonder>0)age='CLASSICAL AGE';else if(T.masonry&&T.trade)age='BRONZE AGE';else if(T.agriculture)age='NEOLITHIC';document.getElementById('cv-age').textContent=age;}
function cvMsg(t){const el=document.getElementById('cv-msg');el.textContent=t;setTimeout(()=>el.textContent='',2000);}
function gameTick(){
  tick2++;
  // Production
  const prod={food:0,wood:0,stone:0,sci:0,gold:0};
  Object.entries(B).forEach(([id,cnt])=>{if(!cnt)return;const p=BS[id].prod;Object.entries(p).forEach(([k,v])=>prod[k]=(prod[k]||0)+v*cnt);});
  // Population growth
  if(R.pop<R.maxPop&&R.food>R.pop*10&&tick2%20===0)R.pop=Math.min(R.maxPop,R.pop+1);
  // Food consumption
  prod.food-=R.pop*0.1;
  Object.keys(prod).forEach(k=>R[k]=Math.max(0,R[k]+prod[k]));
  // Update HUD
  document.getElementById('cv-pop').textContent=R.pop+'/'+R.maxPop;
  document.getElementById('cv-food').textContent=fmt(R.food);
  document.getElementById('cv-wood').textContent=fmt(R.wood);
  document.getElementById('cv-stone').textContent=fmt(R.stone);
  document.getElementById('cv-sci').textContent=fmt(R.sci);
  document.getElementById('cv-gold').textContent=fmt(R.gold);
  if(tick2%10===0)renderAll();
}
function renderAll(){
  // Buildings
  const bd=document.getElementById('cv-buildings');bd.innerHTML='<div style="font-size:8px;letter-spacing:3px;color:#2a3a2a;margin-bottom:4px;">BUILDINGS</div>';
  Object.entries(BS).forEach(([id,b])=>{
    if(!metReq(b.req)&&!B[id])return;
    const cost=buildCost(id,B[id]);const can=canAfford(cost)&&metReq(b.req);
    const el=document.createElement('div');
    el.style.cssText='display:flex;align-items:center;gap:8px;padding:6px 8px;border:1px solid '+(can?'#2a4a2a':'#111')+';margin-bottom:3px;cursor:'+(can?'pointer':'default')+';opacity:'+(can?'1':'0.55')+';background:'+(can?'rgba(0,30,0,0.3)':'transparent')+';';
    const costStr=Object.entries(cost).map(([k,v])=>fmt(v)+' '+k).join(' · ');
    el.innerHTML='<span style="font-size:18px;">'+b.icon+'</span><div style="flex:1;"><div style="font-size:10px;color:var(--g);">'+b.name+' <span style="color:#555;">('+B[id]+')</span></div><div style="font-size:8px;color:#2a5a2a;">'+b.cap+'</div><div style="font-size:7px;color:#444;">'+costStr+'</div></div>';
    if(can)el.onclick=()=>buyBuilding(id);
    bd.appendChild(el);
  });
  // Techs
  const td=document.getElementById('cv-techs');td.innerHTML='';
  Object.entries(TS).forEach(([id,t])=>{
    if(T[id]){const el=document.createElement('div');el.style.cssText='padding:5px 8px;border:1px solid #1a3a1a;margin-bottom:3px;font-size:9px;color:#2a5a2a;';el.textContent='✓ '+t.name;td.appendChild(el);return;}
    if(!metReq(t.req))return;
    const can=canAfford(t.cost);const el=document.createElement('div');
    const costStr=Object.entries(t.cost).map(([k,v])=>fmt(v)+' '+k).join(' ');
    el.style.cssText='padding:5px 8px;border:1px solid '+(can?'#2a4a6a':'#111')+';margin-bottom:3px;cursor:'+(can?'pointer':'default')+';opacity:'+(can?'1':'0.5')+';background:'+(can?'rgba(0,20,40,0.3)':'transparent')+';';
    el.innerHTML='<div style="font-size:10px;color:#4af;">'+t.icon+' '+t.name+'</div><div style="font-size:8px;color:#2a4a6a;">'+t.desc+'</div><div style="font-size:7px;color:#1a3a5a;">'+costStr+'</div>';
    if(can)el.onclick=()=>buyTech(id);
    td.appendChild(el);
  });
}
setInterval(gameTick,1000);renderAll();

</script>
</body>
</html>
