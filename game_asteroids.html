<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ASTEROIDS</title>
<style>
:root{--g:#3fbf3f;--gs:#6fdc6f;--gd:#2a9f2a;--r:#ff4444;--gold:#ffcc00;--bg:#000;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--g);font-family:'Courier New',monospace;display:flex;flex-direction:column;min-height:100vh;user-select:none;}
#hdr{border-bottom:2px solid var(--g);box-shadow:0 0 14px color-mix(in srgb,var(--g) 60%,transparent);padding:10px 24px;display:flex;align-items:center;flex-shrink:0;background:var(--bg);}
#hdr-title{font-size:20px;font-weight:bold;letter-spacing:5px;text-shadow:0 0 10px var(--g);flex:1;text-align:center;}
.back-btn{padding:5px 14px;border:1px solid var(--g);background:transparent;color:var(--g);font-size:10px;letter-spacing:2px;cursor:pointer;}
.back-btn:hover{background:var(--g);color:#000;}
#gw{flex:1;display:flex;justify-content:center;align-items:flex-start;padding:14px 16px 24px;}
#go{position:relative;width:960px;height:560px;border:2px solid var(--g);box-shadow:0 0 24px color-mix(in srgb,var(--g) 20%,transparent);flex-shrink:0;overflow:hidden;background:#000;}

</style>
</head>
<body>
<div id="hdr">
  <button class="back-btn" onclick="(function(){if(window.opener||window.history.length<=1)window.close();else location.href='websites.html';})()" >&#8592; BACK</button>
  <div style="flex:1;text-align:center;"><div id="hdr-title">ASTEROIDS</div><div style="font-size:9px;letter-spacing:2px;color:var(--gs);">// SPACE SHOOTER //</div></div>
  <div style="width:90px;display:flex;justify-content:flex-end;"><button onclick="_goFS()" style="background:transparent;border:1px solid #2a4a2a;color:#3a6a3a;font-size:10px;padding:4px 8px;cursor:pointer;font-family:monospace;">&#9974; FULL</button></div>
</div>
<div id="gw"><div id="go"><canvas id="c" width="960" height="560"></canvas></div></div>
<script>
(function(){
  var t=JSON.parse(localStorage.getItem('scpLastTheme')||localStorage.getItem('scpTheme')||'{}');
  var bg=t.bg||'#000000', ac=t.accent||'#3fbf3f';
  document.documentElement.style.setProperty('--g', ac);
  document.documentElement.style.setProperty('--bg', bg);
  function lighten(hex,amt){
    var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    r=Math.min(255,r+amt);g=Math.min(255,g+amt);b=Math.min(255,b+amt);
    return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
  }
  document.documentElement.style.setProperty('--gs', lighten(ac,50));
  document.documentElement.style.setProperty('--gd', lighten(ac,-30));
  document.body.style.backgroundColor=bg;
  document.getElementById('hdr').style.backgroundColor=bg;
  // Disable right-click on all game pages
  document.addEventListener('contextmenu', function(e){ e.preventDefault(); return false; });
  // Disable right-click drag image ghost
  document.addEventListener('dragstart', function(e){ e.preventDefault(); return false; });
})();
function _goFS(){const el=document.getElementById('go');if(!document.fullscreenElement)el.requestFullscreen().catch(()=>{});else document.exitFullscreen().catch(()=>{});}
document.addEventListener('keydown',e=>{if(e.code==='KeyF')_goFS();});
document.addEventListener('fullscreenchange',()=>{const el=document.getElementById('go');if(document.fullscreenElement===el){const s=Math.min(screen.width/960,screen.height/560);el.style.cssText='transform:scale('+s+');transform-origin:top left;position:fixed;top:'+Math.floor((screen.height-560*s)/2)+'px;left:'+Math.floor((screen.width-960*s)/2)+'px;z-index:9999;';}else{el.style.cssText='';}});

const cv=document.getElementById('c'),cx=cv.getContext('2d');
const W=960,H=560,KS={};
let ship,bullets,asteroids,particles2,score,lives,level,running=false,frame=0,invincible=0;
function init(){
  ship={x:W/2,y:H/2,angle:-Math.PI/2,vx:0,vy:0,rot:0,thrusting:false,shootTimer:0};
  bullets=[];particles2=[];score=0;lives=3;level=1;invincible=120;
  asteroids=[];for(let i=0;i<4+level;i++)spawnAsteroid(3);
  running=true;frame=0;
}
function spawnAsteroid(size,x,y){
  const edge=Math.random()*4|0;
  let ax=x??[Math.random()*W,W,Math.random()*W,0][edge];
  let ay=y??[0,Math.random()*H,H,Math.random()*H][edge];
  const speed=(3-size)*0.7+0.5+Math.random()*1.5;
  const angle=Math.random()*Math.PI*2;
  const r=[0,18,30,46][size];
  asteroids.push({x:ax,y:ay,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,size,r,angle:0,rot:(Math.random()-0.5)*0.05});
}
function wrapPos(obj){obj.x=(obj.x+W)%W;obj.y=(obj.y+H)%H;}
function tick(){
  if(!running)return;frame++;invincible=Math.max(0,invincible-1);
  // Ship
  ship.angle+=KS['ArrowLeft']||KS['KeyA']?-0.07:KS['ArrowRight']||KS['KeyD']?0.07:0;
  ship.thrusting=KS['ArrowUp']||KS['KeyW'];
  if(ship.thrusting){ship.vx+=Math.cos(ship.angle)*0.18;ship.vy+=Math.sin(ship.angle)*0.18;}
  ship.vx*=0.98;ship.vy*=0.98;
  ship.x+=ship.vx;ship.y+=ship.vy;wrapPos(ship);
  if(ship.shootTimer>0)ship.shootTimer--;
  if((KS['Space'])&&ship.shootTimer<=0){
    bullets.push({x:ship.x+Math.cos(ship.angle)*18,y:ship.y+Math.sin(ship.angle)*18,vx:Math.cos(ship.angle)*12+ship.vx,vy:Math.sin(ship.angle)*12+ship.vy,life:55});
    ship.shootTimer=12;
  }
  // Bullets
  bullets=bullets.filter(b=>{b.x+=b.vx;b.y+=b.vy;wrapPos(b);b.life--;return b.life>0;});
  // Asteroids
  asteroids.forEach(a=>{a.x+=a.vx;a.y+=a.vy;a.angle+=a.rot;wrapPos(a);});
  // Collision bullets vs asteroids
  for(let bi=bullets.length-1;bi>=0;bi--){
    const b=bullets[bi];
    for(let ai=asteroids.length-1;ai>=0;ai--){
      const a=asteroids[ai];
      if(Math.hypot(b.x-a.x,b.y-a.y)<a.r){
        bullets.splice(bi,1);
        const pts=[0,20,50,100][a.size];score+=pts;
        for(let p=0;p<6+a.size*2;p++)particles2.push({x:a.x,y:a.y,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,l:20+Math.random()*15,col:'#aaa'});
        if(a.size>1){spawnAsteroid(a.size-1,a.x,a.y);spawnAsteroid(a.size-1,a.x,a.y);}
        asteroids.splice(ai,1);
        break;
      }
    }
  }
  // Collision ship vs asteroids
  if(invincible===0){
    for(const a of asteroids){
      if(Math.hypot(ship.x-a.x,ship.y-a.y)<a.r+12){
        lives--;invincible=180;
        for(let p=0;p<16;p++)particles2.push({x:ship.x,y:ship.y,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6,l:30,col:'#4af'});
        if(lives<=0){running=false;}
        break;
      }
    }
  }
  particles2=particles2.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=0.96;p.vy*=0.96;p.l--;return p.l>0;});
  if(!asteroids.length){level++;for(let i=0;i<4+level;i++)spawnAsteroid(3);}
  draw();
}
function drawAsteroid(a){
  cx.save();cx.translate(a.x,a.y);cx.rotate(a.angle);
  cx.strokeStyle='rgba(180,180,180,0.8)';cx.lineWidth=2;
  cx.shadowColor='#888';cx.shadowBlur=4;
  cx.beginPath();
  const sides=7+a.size*2;
  for(let i=0;i<=sides;i++){const an=i/sides*Math.PI*2;const r2=a.r*(0.8+Math.sin(an*3+a.angle)*0.2);cx.lineTo(Math.cos(an)*r2,Math.sin(an)*r2);}
  cx.closePath();cx.stroke();cx.shadowBlur=0;cx.restore();
}
function draw(){
  cx.fillStyle='rgba(0,0,10,0.85)';cx.fillRect(0,0,W,H);
  // Stars
  for(let i=0;i<50;i++){cx.fillStyle='rgba(255,255,255,'+(0.1+Math.sin(frame*0.02+i)*0.05)+')';cx.fillRect((i*173)%W,(i*91)%H,1,1);}
  asteroids.forEach(drawAsteroid);
  bullets.forEach(b=>{cx.fillStyle='#ff0';cx.shadowColor='#ff0';cx.shadowBlur=6;cx.beginPath();cx.arc(b.x,b.y,3,0,Math.PI*2);cx.fill();cx.shadowBlur=0;});
  particles2.forEach(p=>{cx.globalAlpha=p.l/35;cx.fillStyle=p.col;cx.beginPath();cx.arc(p.x,p.y,2,0,Math.PI*2);cx.fill();});cx.globalAlpha=1;
  // Ship
  if(lives>0&&(invincible===0||frame%6<3)){
    cx.save();cx.translate(ship.x,ship.y);cx.rotate(ship.angle);
    cx.strokeStyle='#4af';cx.lineWidth=2;cx.shadowColor='#4af';cx.shadowBlur=8;
    cx.beginPath();cx.moveTo(18,0);cx.lineTo(-12,10);cx.lineTo(-6,0);cx.lineTo(-12,-10);cx.closePath();cx.stroke();
    if(ship.thrusting){
      cx.fillStyle='rgba(255,140,0,'+(0.5+Math.random()*0.5)+')';
      cx.beginPath();cx.moveTo(-6,0);cx.lineTo(-18,(Math.random()-0.5)*8);cx.lineTo(-22,0);cx.lineTo(-18,(Math.random()-0.5)*8);cx.closePath();cx.fill();
    }
    cx.shadowBlur=0;cx.restore();
  }
  // HUD
  cx.fillStyle='rgba(0,0,0,0.6)';cx.fillRect(0,0,W,22);
  cx.fillStyle='#4af';cx.font='12px Courier New';cx.textAlign='left';cx.fillText('SCORE: '+score,10,15);
  cx.textAlign='center';cx.fillText('LEVEL '+level,W/2,15);
  cx.textAlign='right';cx.fillText('LIVES: '+'△'.repeat(lives),W-10,15);
  if(!running){
    cx.fillStyle='rgba(0,0,0,0.85)';cx.fillRect(W/2-160,H/2-55,320,110);cx.strokeStyle='#f44';cx.lineWidth=2;cx.strokeRect(W/2-160,H/2-55,320,110);cx.fillStyle='#f44';cx.font='bold 26px Courier New';cx.textAlign='center';cx.fillText('GAME OVER',W/2,H/2-14);cx.fillStyle='#4af';cx.font='13px Courier New';cx.fillText('SCORE: '+score+' · LEVEL '+level,W/2,H/2+14);cx.fillStyle='#2a4a5a';cx.fillText('SPACE TO RESTART',W/2,H/2+38);
  } else if(frame<120){
    cx.fillStyle='rgba(0,0,0,0.7)';cx.fillRect(W/2-200,H/2-30,400,60);cx.fillStyle='#4af';cx.font='12px Courier New';cx.textAlign='center';cx.fillText('ARROWS/WASD — ROTATE & THRUST · SPACE — FIRE',W/2,H/2+5);
  }
}
window.addEventListener('keydown',e=>{KS[e.code]=true;if(e.code==='Space'&&!running)init();e.preventDefault();});
window.addEventListener('keyup',e=>{KS[e.code]=false;});
setInterval(tick,1000/60);
cx.fillStyle='#000010';cx.fillRect(0,0,W,H);cx.fillStyle='#4af';cx.font='bold 30px Courier New';cx.textAlign='center';cx.fillText('ASTEROIDS',W/2,H/2-10);cx.fillStyle='#2a4a5a';cx.font='12px Courier New';cx.fillText('PRESS SPACE TO START',W/2,H/2+22);

</script>
</body>
</html>
