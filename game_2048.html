<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>2048</title>
<style>
:root{--g:#3fbf3f;--gs:#6fdc6f;--gd:#2a9f2a;--r:#ff4444;--gold:#ffcc00;--bg:#000;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--g);font-family:'Courier New',monospace;display:flex;flex-direction:column;min-height:100vh;user-select:none;}
#hdr{border-bottom:2px solid var(--g);box-shadow:0 0 14px color-mix(in srgb,var(--g) 60%,transparent);padding:10px 24px;display:flex;align-items:center;flex-shrink:0;background:var(--bg);}
#hdr-title{font-size:20px;font-weight:bold;letter-spacing:5px;text-shadow:0 0 10px var(--g);flex:1;text-align:center;}
.back-btn{padding:5px 14px;border:1px solid var(--g);background:transparent;color:var(--g);font-size:10px;letter-spacing:2px;cursor:pointer;}
.back-btn:hover{background:var(--g);color:#000;}
#gw{flex:1;display:flex;justify-content:center;align-items:flex-start;padding:14px 16px 24px;}
#go{position:relative;width:960px;height:560px;border:2px solid var(--g);box-shadow:0 0 24px color-mix(in srgb,var(--g) 20%,transparent);flex-shrink:0;overflow:hidden;background:#000;}

</style>
</head>
<body>
<div id="hdr">
  <button class="back-btn" onclick="(function(){if(window.opener||window.history.length<=1)window.close();else location.href='websites.html';})()" >&#8592; BACK</button>
  <div style="flex:1;text-align:center;"><div id="hdr-title">2048</div><div style="font-size:9px;letter-spacing:2px;color:var(--gs);">// SLIDE & MERGE //</div></div>
  <div style="width:90px;display:flex;justify-content:flex-end;"><button onclick="_goFS()" style="background:transparent;border:1px solid #2a4a2a;color:#3a6a3a;font-size:10px;padding:4px 8px;cursor:pointer;font-family:monospace;">&#9974; FULL</button></div>
</div>
<div id="gw"><div id="go">
<div id="g2-wrap" style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;">
  <div style="display:flex;gap:30px;align-items:center;">
    <div style="text-align:center;"><div style="font-size:9px;letter-spacing:2px;color:#2a5a2a;">SCORE</div><div id="g2-score" style="font-size:22px;color:var(--g);font-weight:bold;">0</div></div>
    <div style="text-align:center;"><div style="font-size:9px;letter-spacing:2px;color:#2a5a2a;">BEST</div><div id="g2-best" style="font-size:22px;color:var(--gold,#fc0);font-weight:bold;">0</div></div>
    <button onclick="g2Init()" style="padding:6px 16px;border:1px solid var(--g);background:transparent;color:var(--g);font-family:monospace;font-size:10px;letter-spacing:2px;cursor:pointer;">NEW GAME</button>
  </div>
  <div id="g2-board" style="display:grid;grid-template-columns:repeat(4,100px);gap:8px;padding:12px;background:rgba(0,0,0,0.5);border:1px solid #1a3a1a;border-radius:6px;"></div>
  <div style="font-size:8px;letter-spacing:2px;color:#1a3a1a;">ARROWS / WASD TO SLIDE · GET 2048!</div>
</div>
</div></div>
<script>
(function(){
  var t=JSON.parse(localStorage.getItem('scpLastTheme')||localStorage.getItem('scpTheme')||'{}');
  var bg=t.bg||'#000000', ac=t.accent||'#3fbf3f';
  document.documentElement.style.setProperty('--g', ac);
  document.documentElement.style.setProperty('--bg', bg);
  function lighten(hex,amt){
    var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    r=Math.min(255,r+amt);g=Math.min(255,g+amt);b=Math.min(255,b+amt);
    return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
  }
  document.documentElement.style.setProperty('--gs', lighten(ac,50));
  document.documentElement.style.setProperty('--gd', lighten(ac,-30));
  document.body.style.backgroundColor=bg;
  document.getElementById('hdr').style.backgroundColor=bg;
  // Disable right-click on all game pages
  document.addEventListener('contextmenu', function(e){ e.preventDefault(); return false; });
  // Disable right-click drag image ghost
  document.addEventListener('dragstart', function(e){ e.preventDefault(); return false; });
})();
function _goFS(){const el=document.getElementById('go');if(!document.fullscreenElement)el.requestFullscreen().catch(()=>{});else document.exitFullscreen().catch(()=>{});}
document.addEventListener('keydown',e=>{if(e.code==='KeyF')_goFS();});
document.addEventListener('fullscreenchange',()=>{const el=document.getElementById('go');if(document.fullscreenElement===el){const s=Math.min(screen.width/960,screen.height/560);el.style.cssText='transform:scale('+s+');transform-origin:top left;position:fixed;top:'+Math.floor((screen.height-560*s)/2)+'px;left:'+Math.floor((screen.width-960*s)/2)+'px;z-index:9999;';}else{el.style.cssText='';}});

const COLORS={'':['#0a1a0a','#1a2a1a'],2:['#eee4da','#776e65'],4:['#ede0c8','#776e65'],8:['#f2b179','#f9f6f2'],16:['#f59563','#f9f6f2'],32:['#f67c5f','#f9f6f2'],64:['#f65e3b','#f9f6f2'],128:['#edcf72','#f9f6f2'],256:['#edcc61','#f9f6f2'],512:['#edc850','#f9f6f2'],1024:['#edc53f','#f9f6f2'],2048:['#edc22e','#f9f6f2']};
let board,score,best=0,moved;
function g2Init(){board=Array(4).fill(0).map(()=>Array(4).fill(0));score=0;addTile();addTile();render();}
function addTile(){const empty=[];board.forEach((r,ri)=>r.forEach((v,ci)=>{if(!v)empty.push([ri,ci]);}));if(!empty.length)return;const[r,c]=empty[Math.floor(Math.random()*empty.length)];board[r][c]=Math.random()<0.9?2:4;}
function slide(row){const f=row.filter(v=>v);while(f.length<4)f.push(0);for(let i=0;i<3;i++){if(f[i]&&f[i]===f[i+1]){f[i]*=2;score+=f[i];if(score>best)best=score;f[i+1]=0;}}return f.filter(v=>v).concat(Array(4).fill(0)).slice(0,4);}
function move(dir){moved=false;let nb=board.map(r=>[...r]);if(dir==='l')nb=nb.map(r=>{const s=slide(r);if(s.join()!==r.join())moved=true;return s;});else if(dir==='r')nb=nb.map(r=>{const s=slide([...r].reverse()).reverse();if(s.join()!==r.join())moved=true;return s;});else if(dir==='u'){for(let c=0;c<4;c++){const col=board.map(r=>r[c]);const s=slide(col);s.forEach((v,r)=>{if(v!==col[r])moved=true;nb[r][c]=v;});}}else{for(let c=0;c<4;c++){const col=board.map(r=>r[c]);const s=slide([...col].reverse()).reverse();s.forEach((v,r)=>{if(v!==col[r])moved=true;nb[r][c]=v;});}}if(moved){board=nb;addTile();render();checkEnd();}}
function checkEnd(){if(board.flat().includes(2048)){alert('YOU REACHED 2048! 🎉');return;}const e=board.flat().some(v=>!v);if(e)return;for(let r=0;r<4;r++)for(let c=0;c<4;c++){if(c<3&&board[r][c]===board[r][c+1])return;if(r<3&&board[r][c]===board[r+1][c])return;}alert('GAME OVER! Score: '+score);}
function render(){const g=document.getElementById('g2-board');g.innerHTML='';board.forEach(row=>row.forEach(v=>{const c=COLORS[v]||['#2a1a4a','#f9f6f2'];const el=document.createElement('div');el.style.cssText='width:100px;height:100px;display:flex;align-items:center;justify-content:center;border-radius:4px;font-weight:bold;font-family:Courier New;background:'+c[0]+';color:'+c[1]+';font-size:'+(v>999?'22px':v>99?'28px':'34px')+';border:1px solid rgba(255,255,255,0.1);box-shadow:'+(v>=2048?'0 0 20px gold':v>=1024?'0 0 12px #ffa':'0')+';transition:all .1s;';el.textContent=v||'';g.appendChild(el);}));document.getElementById('g2-score').textContent=score;document.getElementById('g2-best').textContent=best;}
const K={ArrowLeft:'l',ArrowRight:'r',ArrowUp:'u',ArrowDown:'d',KeyA:'l',KeyD:'r',KeyW:'u',KeyS:'d'};
window.addEventListener('keydown',e=>{if(K[e.code]){move(K[e.code]);e.preventDefault();}});
let tx=0;document.getElementById('go').addEventListener('touchstart',e=>{tx=e.touches[0].clientX;},{passive:true});
document.getElementById('go').addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>30)move(dx>0?'r':'l');},{passive:true});
g2Init();

</script>
</body>
</html>
