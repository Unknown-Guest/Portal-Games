<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PLATFORMER</title>
<style>
:root{--g:#3fbf3f;--gs:#6fdc6f;--gd:#2a9f2a;--r:#ff4444;--gold:#ffcc00;--bg:#000;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--g);font-family:'Courier New',monospace;display:flex;flex-direction:column;min-height:100vh;user-select:none;}
#hdr{border-bottom:2px solid var(--g);box-shadow:0 0 14px color-mix(in srgb,var(--g) 60%,transparent);padding:10px 24px;display:flex;align-items:center;flex-shrink:0;background:var(--bg);}
#hdr-title{font-size:20px;font-weight:bold;letter-spacing:5px;text-shadow:0 0 10px var(--g);flex:1;text-align:center;}
.back-btn{padding:5px 14px;border:1px solid var(--g);background:transparent;color:var(--g);font-size:10px;letter-spacing:2px;cursor:pointer;}
.back-btn:hover{background:var(--g);color:#000;}
#gw{flex:1;display:flex;justify-content:center;align-items:flex-start;padding:14px 16px 24px;}
#go{position:relative;width:960px;height:560px;border:2px solid var(--g);box-shadow:0 0 24px color-mix(in srgb,var(--g) 20%,transparent);flex-shrink:0;overflow:hidden;background:#000;}

</style>
</head>
<body>
<div id="hdr">
  <button class="back-btn" onclick="(function(){if(window.opener||window.history.length<=1)window.close();else location.href='websites.html';})()" >&#8592; BACK</button>
  <div style="flex:1;text-align:center;"><div id="hdr-title">PLATFORMER</div><div style="font-size:9px;letter-spacing:2px;color:var(--gs);">// JUMP & RUN //</div></div>
  <div style="width:90px;display:flex;justify-content:flex-end;"><button onclick="_goFS()" style="background:transparent;border:1px solid #2a4a2a;color:#3a6a3a;font-size:10px;padding:4px 8px;cursor:pointer;font-family:monospace;">&#9974; FULL</button></div>
</div>
<div id="gw"><div id="go"><canvas id="c" width="960" height="560"></canvas></div></div>
<script>
(function(){
  var t=JSON.parse(localStorage.getItem('scpLastTheme')||localStorage.getItem('scpTheme')||'{}');
  var bg=t.bg||'#000000', ac=t.accent||'#3fbf3f';
  document.documentElement.style.setProperty('--g', ac);
  document.documentElement.style.setProperty('--bg', bg);
  function lighten(hex,amt){
    var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    r=Math.min(255,r+amt);g=Math.min(255,g+amt);b=Math.min(255,b+amt);
    return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
  }
  document.documentElement.style.setProperty('--gs', lighten(ac,50));
  document.documentElement.style.setProperty('--gd', lighten(ac,-30));
  document.body.style.backgroundColor=bg;
  document.getElementById('hdr').style.backgroundColor=bg;
  // Disable right-click on all game pages
  document.addEventListener('contextmenu', function(e){ e.preventDefault(); return false; });
  // Disable right-click drag image ghost
  document.addEventListener('dragstart', function(e){ e.preventDefault(); return false; });
})();
function _goFS(){const el=document.getElementById('go');if(!document.fullscreenElement)el.requestFullscreen().catch(()=>{});else document.exitFullscreen().catch(()=>{});}
document.addEventListener('keydown',e=>{if(e.code==='KeyF')_goFS();});
document.addEventListener('fullscreenchange',()=>{const el=document.getElementById('go');if(document.fullscreenElement===el){const s=Math.min(screen.width/960,screen.height/560);el.style.cssText='transform:scale('+s+');transform-origin:top left;position:fixed;top:'+Math.floor((screen.height-560*s)/2)+'px;left:'+Math.floor((screen.width-960*s)/2)+'px;z-index:9999;';}else{el.style.cssText='';}});

const cv=document.getElementById('c'),cx=cv.getContext('2d');
const W=960,H=560,G=0.5,KS={};
let px,py,pvx,pvy,onGnd,camX,level,score,lives,gems,frame,running=false,dying=false;
const LEVELS=[
  {platforms:[[0,460,300,20],[350,380,200,20],[600,300,250,20],[900,380,200,20],[1150,300,150,20],[1350,400,200,20],[1600,300,300,20],[1950,400,50,20]],gems:[[160,440],[420,360],[700,280],[980,360],[1200,280],[1450,380],[1700,280],[1800,280],[1900,280]],goal:[1980,360],bg:'#050a20',ground:480,len:2100},
  {platforms:[[0,460,200,20],[260,380,150,20],[470,300,100,20],[630,380,150,20],[840,280,100,20],[1000,360,200,20],[1260,260,100,20],[1420,340,180,20],[1660,240,100,20],[1820,380,200,20]],gems:[[80,440],[300,360],[510,280],[700,360],[880,260],[1060,340],[1300,240],[1480,320],[1700,220],[1900,360]],goal:[2050,360],bg:'#150510',ground:480,len:2200},
];
function initGame(){level=0;score=0;lives=3;startLevel();}
function startLevel(){
  const L=LEVELS[level%LEVELS.length];
  px=80;py=L.ground-40;pvx=0;pvy=0;onGnd=false;camX=0;frame=0;dying=false;
  gems=[...L.gems.map(g=>({x:g[0],y:g[1],col:'#ffcc00',r:8,taken:false}))];
  running=true;loop();
}
function loop(){if(!running)return;requestAnimationFrame(loop);update();draw();}
function update(){
  if(dying){frame++;if(frame>40)die();return;}
  frame++;
  const L=LEVELS[level%LEVELS.length];
  if(KS['ArrowLeft']||KS['KeyA'])pvx=Math.max(pvx-0.5,-5);
  else if(KS['ArrowRight']||KS['KeyD'])pvx=Math.min(pvx+0.5,5);
  else pvx*=0.8;
  pvy+=G;px+=pvx;py+=pvy;
  onGnd=false;
  if(py>=L.ground){py=L.ground;pvy=0;onGnd=true;}
  L.platforms.forEach(p=>{if(px+24>p[0]&&px<p[0]+p[2]&&py>p[1]&&py-pvy<=p[1]){py=p[1];pvy=0;onGnd=true;}});
  if(px<0)px=0;if(px>L.len)px=L.len;
  // Gems
  gems.forEach(g=>{if(!g.taken&&Math.hypot(px+16-g.x,py-16-g.y)<20){g.taken=true;score+=10;}});
  // Fall
  if(py>H+100){dying=true;frame=0;}
  // Goal
  const gl=L.goal;if(px>gl[0]&&px<gl[0]+40&&py>gl[1]-60&&py<gl[1]+10){level++;startLevel();}
  // Camera
  camX+=(px-W*0.4-camX)*0.1;camX=Math.max(0,Math.min(L.len-W,camX));
}
function die(){lives--;if(lives<=0){running=false;}else startLevel();}
function draw(){
  const L=LEVELS[level%LEVELS.length];
  const sky=cx.createLinearGradient(0,0,0,H);sky.addColorStop(0,L.bg);sky.addColorStop(1,'#000');
  cx.fillStyle=sky;cx.fillRect(0,0,W,H);
  // Ground
  cx.fillStyle='#2a1a0a';cx.fillRect(-camX,L.ground,L.len,H-L.ground);
  cx.fillStyle='#5a4a1a';cx.fillRect(-camX,L.ground,L.len,6);
  // Platforms
  L.platforms.forEach(p=>{
    const g=cx.createLinearGradient(0,p[1],0,p[1]+p[3]);g.addColorStop(0,'#5a4a2a');g.addColorStop(1,'#3a2a10');
    cx.fillStyle=g;cx.fillRect(p[0]-camX,p[1],p[2],p[3]);
    cx.fillStyle='#8a7a3a';cx.fillRect(p[0]-camX,p[1],p[2],4);
  });
  // Goal flag
  const gx=L.goal[0]-camX,gy=L.goal[1];
  cx.strokeStyle='#888';cx.lineWidth=3;cx.beginPath();cx.moveTo(gx+20,gy);cx.lineTo(gx+20,gy-60);cx.stroke();
  cx.fillStyle='#3f3';cx.beginPath();cx.moveTo(gx+20,gy-60);cx.lineTo(gx+50,gy-45);cx.lineTo(gx+20,gy-30);cx.closePath();cx.fill();
  // Gems
  gems.forEach(g=>{if(g.taken)return;cx.fillStyle=g.col;cx.shadowColor=g.col;cx.shadowBlur=8;cx.beginPath();cx.arc(g.x-camX,g.y,g.r,0,Math.PI*2);cx.fill();cx.shadowBlur=0;});
  // Player
  if(!dying||frame%6<3){
    const pg=cx.createLinearGradient(px-camX,py-40,px-camX+32,py);
    pg.addColorStop(0,'#4af');pg.addColorStop(1,'#0af');
    cx.fillStyle=pg;cx.beginPath();cx.roundRect(px-camX,py-36,32,28,3);cx.fill();
    cx.fillStyle='#8af';cx.beginPath();cx.arc(px-camX+16,py-44,10,0,Math.PI*2);cx.fill();
    cx.fillStyle='rgba(0,0,0,0.5)';cx.fillRect(px-camX+4,py-48,6,5);cx.fillRect(px-camX+22,py-48,6,5);
    cx.fillStyle='#08f';cx.fillRect(px-camX+2,py-10,10,10);cx.fillRect(px-camX+20,py-10,10,10);
  }
  // HUD
  cx.fillStyle='rgba(0,0,0,0.7)';cx.fillRect(0,0,W,24);
  cx.fillStyle='#3f3';cx.font='12px Courier New';cx.textAlign='left';cx.fillText('SCORE: '+score,10,16);
  cx.textAlign='center';cx.fillText('LEVEL '+(level+1),W/2,16);
  cx.textAlign='right';cx.fillText('LIVES: '+'♥'.repeat(lives),W-10,16);
  if(!running){
    cx.fillStyle='rgba(0,0,0,0.85)';cx.fillRect(W/2-160,H/2-55,320,110);cx.strokeStyle='#f44';cx.lineWidth=2;cx.strokeRect(W/2-160,H/2-55,320,110);cx.fillStyle='#f44';cx.font='bold 28px Courier New';cx.textAlign='center';cx.fillText('GAME OVER',W/2,H/2-15);cx.fillStyle='#3f3';cx.font='13px Courier New';cx.fillText('SCORE: '+score,W/2,H/2+14);cx.fillStyle='#2a5a2a';cx.fillText('SPACE TO RESTART',W/2,H/2+38);
  }
}
window.addEventListener('keydown',e=>{KS[e.code]=true;if((e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW')&&onGnd)pvy=-12;if(e.code==='Space'&&!running)initGame();e.preventDefault();});
window.addEventListener('keyup',e=>{KS[e.code]=false;});
// Show start screen
cx.fillStyle='#050a20';cx.fillRect(0,0,W,H);cx.fillStyle='#4af';cx.font='bold 32px Courier New';cx.textAlign='center';cx.fillText('PLATFORMER',W/2,H/2-10);cx.fillStyle='#2a5a8a';cx.font='12px Courier New';cx.fillText('ARROWS/WASD TO MOVE · SPACE/↑ TO JUMP · REACH THE FLAG',W/2,H/2+22);cx.fillStyle='#1a4a6a';cx.fillText('PRESS SPACE TO START',W/2,H/2+50);
window.addEventListener('keydown',function s(e){if(e.code==='Space'){window.removeEventListener('keydown',s);initGame();}},{once:false});

</script>
</body>
</html>
