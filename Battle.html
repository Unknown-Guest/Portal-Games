<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Music Monster RPG – Battle Only</title>
  <link rel="stylesheet" href="Battle.css">
</head>
<body>
  <div id="game">
    <div id="top-bar">
      <div>Music Monster RPG – Battle Only</div>
      <div>Party size: <span id="party-count">0</span>/6</div>
    </div>

    <div id="battle-area">
      <div class="side" id="player-side">
        <div class="sprite-box">
          <img id="player-sprite" class="sprite" src="">
        </div>
        <div class="info-box">
          <div id="player-name">---</div>
          <div>LV <span id="player-lv">1</span> • <span id="player-type">---</span></div>
          <div>HP <span id="player-hp-text">0/0</span></div>
          <div class="hp-bar-outer"><div class="hp-bar-inner" id="player-hp-bar"></div></div>
        </div>
      </div>

      <div class="side" id="enemy-side">
        <div class="sprite-box">
          <img id="enemy-sprite" class="sprite" src="">
        </div>
        <div class="info-box">
          <div id="enemy-name">---</div>
          <div>LV <span id="enemy-lv">1</span> • <span id="enemy-type">---</span></div>
          <div>HP <span id="enemy-hp-text">0/0</span></div>
          <div class="hp-bar-outer"><div class="hp-bar-inner" id="enemy-hp-bar"></div></div>
        </div>
      </div>
    </div>

    <div id="ui">
      <div id="message-box">Press “New Battle” to begin.</div>
      <div id="buttons">
        <button id="btn-attack">Attack</button>
        <button id="btn-catch">Catch</button>
        <button id="btn-switch">Switch</button>
        <button id="btn-new">New Battle</button>
      </div>
    </div>

    <div id="party-panel">
      <strong>Party:</strong>
      <div id="party-slots"></div>
    </div>
  </div>

  <script src="Battle.js"></script>
</body>
</html>
