<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BRICK BREAKER</title>
<style>
:root{--g:#3fbf3f;--gs:#6fdc6f;--gd:#2a9f2a;--r:#ff4444;--gold:#ffcc00;--bg:#000;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--g);font-family:'Courier New',monospace;display:flex;flex-direction:column;min-height:100vh;user-select:none;}
#hdr{border-bottom:2px solid var(--g);box-shadow:0 0 14px color-mix(in srgb,var(--g) 60%,transparent);padding:10px 24px;display:flex;align-items:center;flex-shrink:0;background:var(--bg);}
#hdr-title{font-size:20px;font-weight:bold;letter-spacing:5px;text-shadow:0 0 10px var(--g);flex:1;text-align:center;}
.back-btn{padding:5px 14px;border:1px solid var(--g);background:transparent;color:var(--g);font-size:10px;letter-spacing:2px;cursor:pointer;}
.back-btn:hover{background:var(--g);color:#000;}
#gw{flex:1;display:flex;justify-content:center;align-items:flex-start;padding:14px 16px 24px;}
#go{position:relative;width:960px;height:560px;border:2px solid var(--g);box-shadow:0 0 24px color-mix(in srgb,var(--g) 20%,transparent);flex-shrink:0;overflow:hidden;background:#000;}

</style>
</head>
<body>
<div id="hdr">
  <button class="back-btn" onclick="(function(){if(window.opener||window.history.length<=1)window.close();else location.href='websites.html';})()" >&#8592; BACK</button>
  <div style="flex:1;text-align:center;"><div id="hdr-title">BRICK BREAKER</div><div style="font-size:9px;letter-spacing:2px;color:var(--gs);">// ARKANOID //</div></div>
  <div style="width:90px;display:flex;justify-content:flex-end;"><button onclick="_goFS()" style="background:transparent;border:1px solid #2a4a2a;color:#3a6a3a;font-size:10px;padding:4px 8px;cursor:pointer;font-family:monospace;">&#9974; FULL</button></div>
</div>
<div id="gw"><div id="go"><canvas id="c" width="960" height="560"></canvas></div></div>
<script>
(function(){
  var t=JSON.parse(localStorage.getItem('scpLastTheme')||localStorage.getItem('scpTheme')||'{}');
  var bg=t.bg||'#000000', ac=t.accent||'#3fbf3f';
  document.documentElement.style.setProperty('--g', ac);
  document.documentElement.style.setProperty('--bg', bg);
  function lighten(hex,amt){
    var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    r=Math.min(255,r+amt);g=Math.min(255,g+amt);b=Math.min(255,b+amt);
    return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
  }
  document.documentElement.style.setProperty('--gs', lighten(ac,50));
  document.documentElement.style.setProperty('--gd', lighten(ac,-30));
  document.body.style.backgroundColor=bg;
  document.getElementById('hdr').style.backgroundColor=bg;
  // Disable right-click on all game pages
  document.addEventListener('contextmenu', function(e){ e.preventDefault(); return false; });
  // Disable right-click drag image ghost
  document.addEventListener('dragstart', function(e){ e.preventDefault(); return false; });
})();
function _goFS(){const el=document.getElementById('go');if(!document.fullscreenElement)el.requestFullscreen().catch(()=>{});else document.exitFullscreen().catch(()=>{});}
document.addEventListener('keydown',e=>{if(e.code==='KeyF')_goFS();});
document.addEventListener('fullscreenchange',()=>{const el=document.getElementById('go');if(document.fullscreenElement===el){const s=Math.min(screen.width/960,screen.height/560);el.style.cssText='transform:scale('+s+');transform-origin:top left;position:fixed;top:'+Math.floor((screen.height-560*s)/2)+'px;left:'+Math.floor((screen.width-960*s)/2)+'px;z-index:9999;';}else{el.style.cssText='';}});

const cv=document.getElementById('c'),cx=cv.getContext('2d');
const W=960,H=560;
let px,pw=90,ph=12,py=H-30,bx,by,bdx,bdy,bricks,score,lives,level,running=false,started=false;
const BR=8,BC=14,BW=60,BH=18,BP=4,BOX=8,BOY=60;
const BCOLS=['#ff3333','#ff7700','#ffcc00','#33ff33','#33aaff','#aa44ff'];
function initLevel(){
  bx=W/2;by=H-60;bdx=3+(level-1)*0.4;bdy=-(3+(level-1)*0.4);
  bricks=[];
  for(let r=0;r<BR;r++)for(let c=0;c<BC;c++){
    const hp=r<2?3:r<4?2:1;
    bricks.push({x:BOX+c*(BW+BP),y:BOY+r*(BH+BP),w:BW,h:BH,hp,maxHp:hp,col:BCOLS[r%BCOLS.length]});
  }
}
function init(){score=0;lives=3;level=1;px=W/2-pw/2;initLevel();running=true;started=true;draw();}
function nextLevel(){level++;px=W/2-pw/2;initLevel();bx=W/2;by=H-60;bdx=3+(level-1)*0.4;bdy=-(3+(level-1)*0.4);}
function tick(){
  if(!running)return;
  bx+=bdx;by+=bdy;
  if(bx<6||bx>W-6)bdx*=-1;
  if(by<6){bdy*=-1;}
  if(by>H+20){lives--;if(lives<=0){running=false;}else{bx=W/2;by=H-60;bdy=-Math.abs(bdy);}}
  if(by>py-6&&by<py+ph&&bx>px-4&&bx<px+pw+4){
    bdy=Math.abs(bdy)*-1;const rel=(bx-px)/pw;bdx=6*(rel-0.5);}
  let allClear=true;
  bricks.forEach(b=>{
    if(b.hp<=0)return;allClear=false;
    if(bx>b.x-6&&bx<b.x+b.w+6&&by>b.y-6&&by<b.y+b.h+6){
      const ox=Math.min(Math.abs(bx-(b.x-6)),Math.abs(bx-(b.x+b.w+6)));
      const oy=Math.min(Math.abs(by-(b.y-6)),Math.abs(by-(b.y+b.h+6)));
      if(ox<oy)bdx*=-1;else bdy*=-1;
      b.hp--;score+=10*(4-Math.min(b.hp+1,3));
    }
  });
  if(allClear)nextLevel();
  draw();
}
function draw(){
  cx.fillStyle='#020a14';cx.fillRect(0,0,W,H);
  // Stars
  for(let i=0;i<40;i++){cx.fillStyle='rgba(200,220,255,0.3)';cx.fillRect((i*137)%W,(i*97)%H,1,1);}
  bricks.forEach(b=>{
    if(b.hp<=0)return;
    const alpha=b.hp/b.maxHp;
    const g=cx.createLinearGradient(b.x,b.y,b.x,b.y+b.h);
    g.addColorStop(0,b.col+'ee');g.addColorStop(1,b.col+'88');
    cx.fillStyle=g;cx.beginPath();cx.roundRect(b.x,b.y,b.w,b.h,3);cx.fill();
    cx.strokeStyle='rgba(255,255,255,0.3)';cx.lineWidth=1;cx.strokeRect(b.x+1,b.y+1,b.w-2,b.h-2);
    if(b.hp>1){cx.fillStyle='rgba(255,255,255,0.5)';cx.font='bold 10px Courier';cx.textAlign='center';cx.fillText(b.hp,b.x+b.w/2,b.y+b.h/2+4);}
  });
  // Paddle
  const pg=cx.createLinearGradient(px,py,px,py+ph);pg.addColorStop(0,'#6fdc6f');pg.addColorStop(1,'#2a9f2a');
  cx.fillStyle=pg;cx.beginPath();cx.roundRect(px,py,pw,ph,4);cx.fill();
  cx.strokeStyle='rgba(255,255,255,0.4)';cx.lineWidth=1;cx.strokeRect(px+1,py+1,pw-2,ph-2);
  // Ball
  const bg2=cx.createRadialGradient(bx-2,by-2,0,bx,by,8);bg2.addColorStop(0,'#fff');bg2.addColorStop(1,'#aaffaa');
  cx.fillStyle=bg2;cx.beginPath();cx.arc(bx,by,6,0,Math.PI*2);cx.fill();
  cx.shadowColor='#3f3';cx.shadowBlur=10;cx.fill();cx.shadowBlur=0;
  // HUD
  cx.fillStyle='rgba(0,0,0,0.7)';cx.fillRect(0,0,W,24);
  cx.fillStyle='#3f3';cx.font='12px Courier New';cx.textAlign='left';cx.fillText('SCORE: '+score,10,16);
  cx.textAlign='center';cx.fillText('LV '+level,W/2,16);
  cx.textAlign='right';cx.fillText('LIVES: '+'♥'.repeat(lives),W-10,16);
  if(!started){
    cx.fillStyle='rgba(0,0,0,0.8)';cx.fillRect(W/2-160,H/2-50,320,100);
    cx.strokeStyle='#3f3';cx.lineWidth=2;cx.strokeRect(W/2-160,H/2-50,320,100);
    cx.fillStyle='#3f3';cx.font='bold 24px Courier New';cx.textAlign='center';cx.fillText('BRICK BREAKER',W/2,H/2-10);
    cx.fillStyle='#2a5a2a';cx.font='11px Courier New';cx.fillText('MOVE MOUSE / ARROW KEYS  ·  SPACE',W/2,H/2+20);
  }
  if(!running&&started){
    cx.fillStyle='rgba(0,0,0,0.85)';cx.fillRect(W/2-160,H/2-55,320,110);
    cx.strokeStyle='#f44';cx.lineWidth=2;cx.strokeRect(W/2-160,H/2-55,320,110);
    cx.fillStyle='#f44';cx.font='bold 28px Courier New';cx.textAlign='center';cx.fillText('GAME OVER',W/2,H/2-15);
    cx.fillStyle='#3f3';cx.font='13px Courier New';cx.fillText('SCORE: '+score,W/2,H/2+14);
    cx.fillStyle='#2a5a2a';cx.fillText('SPACE TO RESTART',W/2,H/2+38);
  }
}
cv.addEventListener('mousemove',e=>{const r=cv.getBoundingClientRect();px=Math.max(0,Math.min(W-pw,(e.clientX-r.left)*(W/r.width)-pw/2));});
window.addEventListener('keydown',e=>{
  if(e.code==='Space'){if(!running)init();e.preventDefault();}
  if(e.code==='ArrowLeft')px=Math.max(0,px-18);
  if(e.code==='ArrowRight')px=Math.min(W-pw,px+18);
});
setInterval(tick,1000/60);draw();

</script>
</body>
</html>
