<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WHACK-A-MOLE</title>
<style>
:root{--g:#3fbf3f;--gs:#6fdc6f;--gd:#2a9f2a;--r:#ff4444;--gold:#ffcc00;--bg:#000;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--g);font-family:'Courier New',monospace;display:flex;flex-direction:column;min-height:100vh;user-select:none;}
#hdr{border-bottom:2px solid var(--g);box-shadow:0 0 14px color-mix(in srgb,var(--g) 60%,transparent);padding:10px 24px;display:flex;align-items:center;flex-shrink:0;background:var(--bg);}
#hdr-title{font-size:20px;font-weight:bold;letter-spacing:5px;text-shadow:0 0 10px var(--g);flex:1;text-align:center;}
.back-btn{padding:5px 14px;border:1px solid var(--g);background:transparent;color:var(--g);font-size:10px;letter-spacing:2px;cursor:pointer;}
.back-btn:hover{background:var(--g);color:#000;}
#gw{flex:1;display:flex;justify-content:center;align-items:flex-start;padding:14px 16px 24px;}
#go{position:relative;width:960px;height:560px;border:2px solid var(--g);box-shadow:0 0 24px color-mix(in srgb,var(--g) 20%,transparent);flex-shrink:0;overflow:hidden;background:#000;}

</style>
</head>
<body>
<div id="hdr">
  <button class="back-btn" onclick="(function(){if(window.opener||window.history.length<=1)window.close();else location.href='websites.html';})()" >&#8592; BACK</button>
  <div style="flex:1;text-align:center;"><div id="hdr-title">WHACK-A-MOLE</div><div style="font-size:9px;letter-spacing:2px;color:var(--gs);">// QUICK REFLEXES //</div></div>
  <div style="width:90px;display:flex;justify-content:flex-end;"><button onclick="_goFS()" style="background:transparent;border:1px solid #2a4a2a;color:#3a6a3a;font-size:10px;padding:4px 8px;cursor:pointer;font-family:monospace;">&#9974; FULL</button></div>
</div>
<div id="gw"><div id="go">
<div style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:#0a1a0a;">
  <div style="display:flex;gap:30px;align-items:center;">
    <div style="text-align:center;"><div style="font-size:8px;letter-spacing:2px;color:#2a5a2a;">SCORE</div><div id="wm-score" style="font-size:24px;color:var(--g);font-weight:bold;">0</div></div>
    <div style="text-align:center;"><div style="font-size:8px;letter-spacing:2px;color:#2a5a2a;">TIME</div><div id="wm-time" style="font-size:24px;color:var(--gold,#fc0);font-weight:bold;">30</div></div>
    <div style="text-align:center;"><div style="font-size:8px;letter-spacing:2px;color:#4a2a2a;">MISSED</div><div id="wm-miss" style="font-size:24px;color:#f44;font-weight:bold;">0</div></div>
    <div style="display:flex;gap:6px;">
      <button onclick="wmStart('easy')" style="padding:5px 12px;border:1px solid #44ff44;background:transparent;color:#44ff44;font-family:monospace;font-size:9px;cursor:pointer;">EASY</button>
      <button onclick="wmStart('hard')" style="padding:5px 12px;border:1px solid #ff4444;background:transparent;color:#ff4444;font-family:monospace;font-size:9px;cursor:pointer;">HARD</button>
    </div>
  </div>
  <div id="wm-grid" style="display:grid;grid-template-columns:repeat(4,120px);gap:16px;"></div>
  <div id="wm-msg" style="font-size:11px;letter-spacing:3px;color:var(--gold,#fc0);min-height:18px;text-align:center;"></div>
</div>
</div></div>
<script>
(function(){
  var t=JSON.parse(localStorage.getItem('scpLastTheme')||localStorage.getItem('scpTheme')||'{}');
  var bg=t.bg||'#000000', ac=t.accent||'#3fbf3f';
  document.documentElement.style.setProperty('--g', ac);
  document.documentElement.style.setProperty('--bg', bg);
  function lighten(hex,amt){
    var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    r=Math.min(255,r+amt);g=Math.min(255,g+amt);b=Math.min(255,b+amt);
    return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
  }
  document.documentElement.style.setProperty('--gs', lighten(ac,50));
  document.documentElement.style.setProperty('--gd', lighten(ac,-30));
  document.body.style.backgroundColor=bg;
  document.getElementById('hdr').style.backgroundColor=bg;
  // Disable right-click on all game pages
  document.addEventListener('contextmenu', function(e){ e.preventDefault(); return false; });
  // Disable right-click drag image ghost
  document.addEventListener('dragstart', function(e){ e.preventDefault(); return false; });
})();
function _goFS(){const el=document.getElementById('go');if(!document.fullscreenElement)el.requestFullscreen().catch(()=>{});else document.exitFullscreen().catch(()=>{});}
document.addEventListener('keydown',e=>{if(e.code==='KeyF')_goFS();});
document.addEventListener('fullscreenchange',()=>{const el=document.getElementById('go');if(document.fullscreenElement===el){const s=Math.min(screen.width/960,screen.height/560);el.style.cssText='transform:scale('+s+');transform-origin:top left;position:fixed;top:'+Math.floor((screen.height-560*s)/2)+'px;left:'+Math.floor((screen.width-960*s)/2)+'px;z-index:9999;';}else{el.style.cssText='';}});

let wmScore=0,wmMiss=0,wmTime=30,wmRunning=false,wmHoles=[],wmDiff='easy';
let wmMoleTimer=null,wmCountdown=null;
const MOLES=['🐹','🐭','🐭','🐭','🐱','💀'];// 💀 = bad mole

function wmStart(diff){
  wmDiff=diff;wmScore=0;wmMiss=0;wmTime=30;wmRunning=true;
  document.getElementById('wm-score').textContent='0';
  document.getElementById('wm-miss').textContent='0';
  document.getElementById('wm-time').textContent='30';
  document.getElementById('wm-msg').textContent='';
  clearInterval(wmMoleTimer);clearInterval(wmCountdown);
  // Build holes
  const grid=document.getElementById('wm-grid');grid.innerHTML='';
  wmHoles=[];
  for(let i=0;i<12;i++){
    const hole=document.createElement('div');
    hole.style.cssText='width:120px;height:100px;background:radial-gradient(ellipse at 50% 80%,#1a0a00,#0a0500);border-radius:50% 50% 40% 40%;border:2px solid #3a2010;position:relative;overflow:hidden;cursor:pointer;transition:transform .05s;';
    hole.dataset.i=i;
    const mole=document.createElement('div');
    mole.style.cssText='position:absolute;bottom:-60px;left:50%;transform:translateX(-50%);font-size:50px;transition:bottom .15s;user-select:none;';
    mole.textContent='';hole.appendChild(mole);
    hole.onclick=()=>wmWhack(i);
    grid.appendChild(hole);wmHoles.push({el:hole,mole,active:false,type:''});
  }
  const interval=diff==='hard'?600:900;
  wmMoleTimer=setInterval(wmShowMole,interval);
  wmCountdown=setInterval(()=>{wmTime--;document.getElementById('wm-time').textContent=wmTime;if(wmTime<=0)wmEnd();},1000);
}

function wmShowMole(){
  if(!wmRunning)return;
  // Hide random active mole
  const active=wmHoles.filter(h=>h.active);
  if(active.length>3)active[0].mole.style.bottom='-60px',active[0].active=false;
  // Show new mole
  const avail=wmHoles.filter(h=>!h.active);
  if(!avail.length)return;
  const h=avail[Math.floor(Math.random()*avail.length)];
  const isBad=Math.random()<0.15;
  h.type=isBad?'bad':'good';h.active=true;
  h.mole.textContent=isBad?'💀':'🐹';
  h.mole.style.bottom='4px';
  const stay=wmDiff==='hard'?700:1100;
  setTimeout(()=>{if(h.active){h.active=false;h.mole.style.bottom='-60px';if(h.type==='good'){wmMiss++;document.getElementById('wm-miss').textContent=wmMiss;}}},stay);
}

function wmWhack(idx){
  if(!wmRunning)return;
  const h=wmHoles[idx];if(!h.active)return;
  h.active=false;h.mole.style.bottom='-60px';
  if(h.type==='bad'){wmScore=Math.max(0,wmScore-5);h.el.style.background='radial-gradient(ellipse at 50% 80%,#3a0000,#1a0000)';}
  else{wmScore+=10;h.el.style.transform='scale(0.92)';}
  setTimeout(()=>{h.el.style.transform='';h.el.style.background='radial-gradient(ellipse at 50% 80%,#1a0a00,#0a0500)';},100);
  document.getElementById('wm-score').textContent=wmScore;
}

function wmEnd(){
  wmRunning=false;clearInterval(wmMoleTimer);clearInterval(wmCountdown);
  wmHoles.forEach(h=>{h.active=false;h.mole.style.bottom='-60px';});
  const grade=wmScore>200?'CHAMPION 🏆':wmScore>100?'GREAT':wmScore>50?'GOOD':'KEEP TRYING';
  document.getElementById('wm-msg').textContent='FINAL: '+wmScore+' pts · '+grade+' — Click Easy/Hard to play again';
}

</script>
</body>
</html>
