<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MINESWEEPER</title>
<style>
:root { --g:#3fbf3f; --gs:#6fdc6f; --gd:#2a9f2a; --r:#ff4444; --gold:#ffcc00; --bg:#000; }
*{ box-sizing:border-box; margin:0; padding:0; }
body{ background:var(--bg); color:var(--g); font-family:Arial,sans-serif;
      display:flex; flex-direction:column; min-height:100vh; user-select:none; }
#hdr{ border-bottom:2px solid var(--g); box-shadow:0 0 14px color-mix(in srgb,var(--g) 60%,transparent);
       padding:10px 24px; display:flex; align-items:center; gap:16px; flex-shrink:0;
       background:var(--bg); position:sticky; top:0; z-index:10; }
#hdr-title{ font-size:20px; font-weight:bold; letter-spacing:5px;
             text-shadow:0 0 10px var(--g); flex:1; text-align:center; }
#hdr-sub{ font-size:9px; letter-spacing:2px; color:var(--gs); text-align:center; }
.back-btn{ padding:5px 14px; border:1px solid var(--g); background:transparent;
            color:var(--g); font-size:10px; letter-spacing:2px; cursor:pointer; transition:.15s; white-space:nowrap; }
.back-btn:hover{ background:var(--g); color:#000; }
#game-wrap{ flex:1; display:flex; justify-content:center; align-items:flex-start;
             flex-direction:column; gap:10px; padding:14px 16px 24px;
             align-items:center; overflow-y:auto; }
.score-bar{ display:flex; gap:20px; font-size:11px; letter-spacing:2px; color:var(--gs);
             flex-shrink:0; flex-wrap:wrap; justify-content:center; }
.score-val{ color:var(--g); font-weight:bold; font-size:13px; }
.btn{ padding:7px 20px; border:1px solid var(--g); background:transparent; color:var(--g);
       font-size:11px; letter-spacing:2px; cursor:pointer; transition:.15s; }
.btn:hover{ background:var(--g); color:#000; }
.btn.red{ border-color:var(--r); color:var(--r); }
.btn.red:hover{ background:var(--r); color:#000; }

#ms-outer{ display:flex; flex-direction:column; align-items:center; gap:8px; }
#ms-grid{ display:inline-grid; border:2px solid var(--g);
          box-shadow:0 0 18px color-mix(in srgb,var(--g) 50%,transparent); }
.ms-cell{ width:30px; height:30px; border:1px solid #2a2a2a; background:#111;
          font-size:13px; font-weight:bold; cursor:pointer; display:flex;
          align-items:center; justify-content:center; transition:background .1s; color:#ddd; }
.ms-cell:hover:not(.open):not(.flagged){ background:#1e3a1e; }
.ms-cell.open{ background:#0a0a0a; cursor:default; }
.ms-cell.flagged{ color:var(--r); background:#1a0505; }
  .ms-cell.flag-correct{ background:#0a2a0a !important; border-color:var(--g) !important; box-shadow:0 0 8px color-mix(in srgb,var(--g) 40%,transparent); }
  .ms-cell.flag-wrong  { background:#2a0a0a !important; border-color:var(--r) !important; box-shadow:0 0 8px color-mix(in srgb,var(--r) 40%,transparent); }
.ms-cell.mine-hit{ background:#3a0000; color:var(--r); }
.n1{color:#5af;} .n2{color:#5f5;} .n3{color:#f55;} .n4{color:#b5f;}
.n5{color:#f95;} .n6{color:#5ff;} .n7{color:#f5f;} .n8{color:#aaa;}
#ms-controls{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; justify-content:center; }
#ms-diff{ background:#0d0d0d; border:1px solid var(--g); color:var(--g);
          font-size:11px; padding:6px 10px; outline:none; cursor:pointer; }

</style>
</head>
<body>
<div id="hdr">
  <button class="back-btn" onclick="(function(){if(window.opener||window.history.length<=1){window.close();}else{location.href='websites.html';}})()">← BACK</button>
  <div style="flex:1;text-align:center;">
    <div id="hdr-title">MINESWEEPER</div>
    <div id="hdr-sub"></div>
  </div>
  <div style="width:90px;display:flex;justify-content:flex-end;align-items:center;gap:8px;">
  <button onclick="_goFS()" style="background:transparent;border:1px solid #2a4a2a;color:#3a6a3a;font-size:10px;letter-spacing:1px;padding:4px 8px;cursor:pointer;font-family:monospace;" title="Fullscreen (F)">&#9974; FULL</button>
</div>
</div>
<div id="game-wrap">

<div id="ms-outer">
<div class="score-bar">
  <span>💣 <span class="score-val" id="ms-mines">0</span></span>
  <span>⏱ <span class="score-val" id="ms-time">0</span>s</span>
  <span>BEST <span class="score-val" id="ms-best">--</span></span>
</div>
<div id="ms-controls">
  <select id="ms-diff" onchange="msInit()">
    <option value="easy">EASY  9×9 / 10</option>
    <option value="med" selected>MEDIUM 16×16 / 40</option>
    <option value="hard">HARD  30×16 / 99</option>
  </select>
  <button class="btn" onclick="msInit()">↺ NEW GAME</button>
</div>
<div id="ms-grid"></div>
<div style="font-size:9px;letter-spacing:1px;color:var(--gs);">LEFT CLICK = REVEAL &nbsp;|&nbsp; RIGHT CLICK = FLAG</div>
</div>

</div>
<script>
(function(){
  var t=JSON.parse(localStorage.getItem('scpLastTheme')||localStorage.getItem('scpTheme')||'{}');
  var bg=t.bg||'#000000', ac=t.accent||'#3fbf3f';
  document.documentElement.style.setProperty('--g', ac);
  document.documentElement.style.setProperty('--bg', bg);
  function lighten(hex,amt){
    var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    r=Math.min(255,r+amt);g=Math.min(255,g+amt);b=Math.min(255,b+amt);
    return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
  }
  document.documentElement.style.setProperty('--gs', lighten(ac,50));
  document.documentElement.style.setProperty('--gd', lighten(ac,-30));
  document.body.style.backgroundColor=bg;
  document.getElementById('hdr').style.backgroundColor=bg;
  // Disable right-click on all game pages
  document.addEventListener('contextmenu', function(e){ e.preventDefault(); return false; });
  // Disable right-click drag image ghost
  document.addEventListener('dragstart', function(e){ e.preventDefault(); return false; });
})();

const MS_CFG={easy:{cols:9,rows:9,mines:10},med:{cols:16,rows:16,mines:40},hard:{cols:30,rows:16,mines:99}};
let msBoard,msCols,msRows,msMines,msRev,msFlag,msOver,msStarted,msTimer,msEl;

function msInit(){
  clearInterval(msTimer);
  const d=document.getElementById('ms-diff').value, cfg=MS_CFG[d];
  msCols=cfg.cols;msRows=cfg.rows;msMines=cfg.mines;
  msRev=0;msFlag=0;msOver=false;msStarted=false;
  document.getElementById('ms-time').textContent='0';
  document.getElementById('ms-mines').textContent=msMines;
  msBoard=Array.from({length:msRows},()=>Array(msCols).fill(0));
  msEl=Array.from({length:msRows},()=>Array(msCols).fill(null));
  const bkey='ms_best_'+d, b=localStorage.getItem(bkey);
  document.getElementById('ms-best').textContent=b?b+'s':'--';
  msRender();
}
function msRender(){
  const grid=document.getElementById('ms-grid');
  grid.style.gridTemplateColumns=`repeat(${msCols},30px)`;
  grid.innerHTML='';
  for(let r=0;r<msRows;r++) for(let c=0;c<msCols;c++){
    const cell=document.createElement('div');
    cell.className='ms-cell';
    cell.onclick=()=>msClick(r,c);
    cell.oncontextmenu=e=>{e.preventDefault();msFlg(r,c);};
    grid.appendChild(cell);msEl[r][c]=cell;
  }
}
function msPlace(fr,fc){
  let p=0;
  while(p<msMines){
    const r=Math.floor(Math.random()*msRows),c=Math.floor(Math.random()*msCols);
    if(msBoard[r][c]==='M')continue;
    if(Math.abs(r-fr)<=1&&Math.abs(c-fc)<=1)continue;
    msBoard[r][c]='M';p++;
  }
  for(let r=0;r<msRows;r++)for(let c=0;c<msCols;c++){
    if(msBoard[r][c]==='M')continue;
    let n=0;
    for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
      const nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<msRows&&nc>=0&&nc<msCols&&msBoard[nr][nc]==='M')n++;
    }
    msBoard[r][c]=n;
  }
}
function msClick(r,c){
  if(msOver)return;
  const cell=msEl[r][c];
  if(cell.classList.contains('open')||cell.classList.contains('flagged'))return;
  if(!msStarted){
    msStarted=true;msPlace(r,c);
    let t=0;msTimer=setInterval(()=>{t++;document.getElementById('ms-time').textContent=t;},1000);
  }
  if(msBoard[r][c]==='M'){
    msOver=true;clearInterval(msTimer);msRevealAll();
    cell.classList.add('mine-hit');cell.textContent='💣';return;
  }
  msReveal(r,c);
  if(msRev>=msRows*msCols-msMines){
    msOver=true;clearInterval(msTimer);
    const t=parseInt(document.getElementById('ms-time').textContent);
    const d=document.getElementById('ms-diff').value,bkey='ms_best_'+d;
    const prev=parseInt(localStorage.getItem(bkey)||'99999');
    if(t<prev){localStorage.setItem(bkey,t);document.getElementById('ms-best').textContent=t+'s';}
    // Colour all flags green on win
for(let r=0;r<msRows;r++)for(let c=0;c<msCols;c++)
  if(msEl[r][c].classList.contains('flagged'))msEl[r][c].classList.add('flag-correct');
setTimeout(()=>alert('✓ YOU WIN!  Time: '+t+'s'),80);
  }
}
function msReveal(r,c){
  if(r<0||r>=msRows||c<0||c>=msCols)return;
  const cell=msEl[r][c];
  if(cell.classList.contains('open')||cell.classList.contains('flagged'))return;
  cell.classList.add('open');
  const v=msBoard[r][c];
  if(v>0){cell.textContent=v;cell.classList.add('n'+v);}
  msRev++;
  if(v===0)for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++)msReveal(r+dr,c+dc);
}
function msFlg(r,c){
  if(msOver||!msStarted)return;
  const cell=msEl[r][c];
  if(cell.classList.contains('open'))return;
  if(cell.classList.contains('flagged')){cell.classList.remove('flagged');cell.textContent='';msFlag--;}
  else{cell.classList.add('flagged');cell.textContent='🚩';msFlag++;}
  document.getElementById('ms-mines').textContent=msMines-msFlag;
}
function msRevealAll(){
  for(let r=0;r<msRows;r++)for(let c=0;c<msCols;c++){
    const cell=msEl[r][c], isMine=msBoard[r][c]==='M', isFlagged=cell.classList.contains('flagged');
    if(isMine && !isFlagged){ cell.textContent='💣'; cell.classList.add('open'); }
    else if(isFlagged && isMine){ cell.classList.add('flag-correct'); }
    else if(isFlagged && !isMine){ cell.classList.add('flag-wrong'); cell.textContent='❌'; }
  }
}
window.onload=msInit;

</script>
<script>
function _goFS(){if(!document.fullscreenElement){document.documentElement.requestFullscreen().catch(function(){});}else{document.exitFullscreen().catch(function(){});}}
document.addEventListener('keydown',function(e){if(e.code==='KeyF')_goFS();});
</script></body>
</html>
