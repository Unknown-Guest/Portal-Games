<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MINE CLICKER</title>
<style>
:root{--g:#3fbf3f;--gs:#6fdc6f;--gd:#2a9f2a;--r:#ff4444;--gold:#ffcc00;--bg:#000;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--g);font-family:'Courier New',monospace;display:flex;flex-direction:column;min-height:100vh;user-select:none;}
#hdr{border-bottom:2px solid var(--g);box-shadow:0 0 14px color-mix(in srgb,var(--g) 60%,transparent);padding:10px 24px;display:flex;align-items:center;flex-shrink:0;background:var(--bg);}
#hdr-title{font-size:20px;font-weight:bold;letter-spacing:5px;text-shadow:0 0 10px var(--g);flex:1;text-align:center;}
.back-btn{padding:5px 14px;border:1px solid var(--g);background:transparent;color:var(--g);font-size:10px;letter-spacing:2px;cursor:pointer;}
.back-btn:hover{background:var(--g);color:#000;}
#gw{flex:1;display:flex;justify-content:center;align-items:flex-start;padding:14px 16px 24px;}
#go{position:relative;width:960px;height:560px;border:2px solid var(--g);box-shadow:0 0 24px color-mix(in srgb,var(--g) 20%,transparent);flex-shrink:0;overflow:hidden;background:#000;}

</style>
</head>
<body>
<div id="hdr">
  <button class="back-btn" onclick="(function(){if(window.opener||window.history.length<=1)window.close();else location.href='websites.html';})()" >&#8592; BACK</button>
  <div style="flex:1;text-align:center;"><div id="hdr-title">MINE CLICKER</div><div style="font-size:9px;letter-spacing:2px;color:var(--gs);">// DIG DEEPER //</div></div>
  <div style="width:90px;display:flex;justify-content:flex-end;"><button onclick="_goFS()" style="background:transparent;border:1px solid #2a4a2a;color:#3a6a3a;font-size:10px;padding:4px 8px;cursor:pointer;font-family:monospace;">&#9974; FULL</button></div>
</div>
<div id="gw"><div id="go">
<div style="width:100%;height:100%;display:flex;background:#080808;">
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;border-right:1px solid #1a1a1a;padding:16px;">
    <div id="mn-depth" style="font-size:10px;letter-spacing:3px;color:#8B6914;">DEPTH: 0m</div>
    <div id="mn-ore" style="font-size:16px;letter-spacing:2px;color:var(--gold,#fc0);">0 ore</div>
    <div id="mn-gold" style="font-size:12px;letter-spacing:2px;color:#aaa;">💰 0 gold</div>
    <canvas id="mn-c" width="320" height="280" style="border:1px solid #1a1a1a;cursor:crosshair;"></canvas>
    <div id="mn-msg" style="font-size:9px;letter-spacing:2px;color:#3a3a3a;min-height:14px;"></div>
    <button onclick="mnSell()" style="padding:6px 20px;border:1px solid #8B6914;background:transparent;color:#8B6914;font-family:monospace;font-size:10px;letter-spacing:2px;cursor:pointer;">SELL ORE</button>
  </div>
  <div style="width:340px;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:4px;">
    <div style="font-size:9px;letter-spacing:3px;color:#2a2a2a;padding:4px 0;border-bottom:1px solid #111;margin-bottom:4px;">UPGRADES</div>
    <div id="mn-shop"></div>
  </div>
</div>
</div></div>
<script>
(function(){
  var t=JSON.parse(localStorage.getItem('scpLastTheme')||localStorage.getItem('scpTheme')||'{}');
  var bg=t.bg||'#000000', ac=t.accent||'#3fbf3f';
  document.documentElement.style.setProperty('--g', ac);
  document.documentElement.style.setProperty('--bg', bg);
  function lighten(hex,amt){
    var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    r=Math.min(255,r+amt);g=Math.min(255,g+amt);b=Math.min(255,b+amt);
    return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
  }
  document.documentElement.style.setProperty('--gs', lighten(ac,50));
  document.documentElement.style.setProperty('--gd', lighten(ac,-30));
  document.body.style.backgroundColor=bg;
  document.getElementById('hdr').style.backgroundColor=bg;
  // Disable right-click on all game pages
  document.addEventListener('contextmenu', function(e){ e.preventDefault(); return false; });
  // Disable right-click drag image ghost
  document.addEventListener('dragstart', function(e){ e.preventDefault(); return false; });
})();
function _goFS(){const el=document.getElementById('go');if(!document.fullscreenElement)el.requestFullscreen().catch(()=>{});else document.exitFullscreen().catch(()=>{});}
document.addEventListener('keydown',e=>{if(e.code==='KeyF')_goFS();});
document.addEventListener('fullscreenchange',()=>{const el=document.getElementById('go');if(document.fullscreenElement===el){const s=Math.min(screen.width/960,screen.height/560);el.style.cssText='transform:scale('+s+');transform-origin:top left;position:fixed;top:'+Math.floor((screen.height-560*s)/2)+'px;left:'+Math.floor((screen.width-960*s)/2)+'px;z-index:9999;';}else{el.style.cssText='';}});

const mc=document.getElementById('mn-c'),mx=mc.getContext('2d');
const MW=320,MH=280,TILE=20;
let ore=0,gold=0,depth=0,power=1,speed=1,autoMiners=0,autoTimer=0;
let grid=[];
const ORES=[{name:'STONE',col:'#555',val:0,prob:0.6},{name:'COAL',col:'#333',val:1,prob:0.2},{name:'IRON',col:'#8a6a4a',val:3,prob:0.1},{name:'GOLD',col:'#ffd700',val:10,prob:0.06},{name:'DIAMOND',col:'#88eeff',val:50,prob:0.04}];
const UPGRADES=[
  {name:'IRON PICKAXE',icon:'⛏️',cost:50,bought:false,desc:'+2 power',effect:()=>power+=2},
  {name:'GOLD PICKAXE',icon:'✨',cost:300,bought:false,desc:'+5 power',effect:()=>power+=5},
  {name:'DIAMOND PICK',icon:'💎',cost:2000,bought:false,desc:'+15 power',effect:()=>power+=15},
  {name:'AUTO MINER',icon:'🤖',cost:500,bought:false,desc:'Auto-mines 1/s',effect:()=>autoMiners++},
  {name:'2× AUTO',icon:'⚙️',cost:2000,bought:false,desc:'Doubles auto',effect:()=>autoMiners*=2},
  {name:'DEPTH CHARGE',icon:'💣',cost:1000,bought:false,desc:'+50m depth bonus',effect:()=>depth+=50},
  {name:'SELL BOOST',icon:'💰',cost:5000,bought:false,desc:'2× sell price',effect:()=>sellMult*=2},
  {name:'MEGA DRILL',icon:'🚀',cost:10000,bought:false,desc:'+50 power',effect:()=>power+=50},
];
let sellMult=1;
function genRow(d){
  return Array(16).fill(0).map(()=>{
    const r=Math.random();
    const bonus=Math.min(d/100,0.3);
    let cum=0;
    for(let i=ORES.length-1;i>=0;i--){
      cum+=ORES[i].prob*(1+bonus*(ORES.length-i));
      if(r<cum)return i;
    }
    return 0;
  });
}
function initGrid(){grid=[];for(let r=0;r<14;r++)grid.push({y:r*TILE,cells:genRow(0).map(v=>({type:v,hp:ORES[v].val+1}))});}
function mineAt(cx2,cy2){
  const col=Math.floor(cx2/TILE);const rowIdx=Math.floor(cy2/TILE);
  if(rowIdx<0||rowIdx>=grid.length||col<0||col>=16)return;
  const row=grid[rowIdx];const cell=row.cells[col];
  if(cell.hp<=0)return;
  cell.hp-=power;
  if(cell.hp<=0){
    const val=ORES[cell.type].val;
    ore+=val;cell.type=0;cell.hp=1;
    if(val>0)mnMsg('+'+val+' '+ORES[cell.type===0?0:cell.type].name);
    // If bottom row mined, add new row
    if(rowIdx>=grid.length-3){depth+=20;grid.push({y:grid.length*TILE,cells:genRow(depth).map(v=>({type:v,hp:ORES[v].val+1}))});grid=grid.slice(-14);}
  }
  draw();updHUD();
}
function mnSell(){gold+=Math.floor(ore*sellMult);ore=0;updHUD();mnMsg('SOLD!');}
let mnMsgT=null;function mnMsg(t){document.getElementById('mn-msg').textContent=t;clearTimeout(mnMsgT);mnMsgT=setTimeout(()=>document.getElementById('mn-msg').textContent='',1200);}
function draw(){
  mx.fillStyle='#0a0808';mx.fillRect(0,0,MW,MH);
  grid.forEach((row,ri)=>{
    row.cells.forEach((cell,ci)=>{
      const ore2=ORES[cell.type];
      mx.fillStyle=cell.hp<=(ore2.val+1)/2?ore2.col+'88':ore2.col;
      mx.fillRect(ci*TILE+1,ri*TILE+1,TILE-2,TILE-2);
      if(cell.type>0){mx.strokeStyle=ore2.col+'aa';mx.lineWidth=1;mx.strokeRect(ci*TILE+1,ri*TILE+1,TILE-2,TILE-2);}
    });
  });
  // Grid lines
  mx.strokeStyle='rgba(0,0,0,0.3)';mx.lineWidth=0.5;
  for(let i=0;i<=16;i++){mx.beginPath();mx.moveTo(i*TILE,0);mx.lineTo(i*TILE,MH);mx.stroke();}
  for(let i=0;i<=14;i++){mx.beginPath();mx.moveTo(0,i*TILE);mx.lineTo(MW,i*TILE);mx.stroke();}
}
function updHUD(){
  document.getElementById('mn-ore').textContent=ore+' ore';
  document.getElementById('mn-gold').textContent='💰 '+gold+' gold';
  document.getElementById('mn-depth').textContent='DEPTH: '+depth+'m';
  const shop=document.getElementById('mn-shop');shop.innerHTML='';
  UPGRADES.forEach((u,i)=>{
    if(u.bought)return;
    const can=gold>=u.cost;
    const el=document.createElement('div');
    el.style.cssText='display:flex;align-items:center;gap:8px;padding:6px 8px;border:1px solid '+(can?'#3a2a10':'#111')+';margin-bottom:3px;cursor:'+(can?'pointer':'default')+';opacity:'+(can?'1':'0.4')+';background:'+(can?'rgba(30,20,0,0.4)':'transparent')+';';
    el.innerHTML='<span style="font-size:16px;">'+u.icon+'</span><div style="flex:1;"><div style="font-size:10px;color:var(--gold,#fc0);">'+u.name+'</div><div style="font-size:8px;color:#5a4a2a;">'+u.desc+'</div></div><div style="font-size:10px;color:var(--gold,#fc0);">'+u.cost+'💰</div>';
    if(can)el.onclick=()=>{gold-=u.cost;u.bought=true;u.effect();updHUD();};
    shop.appendChild(el);
  });
}
mc.addEventListener('click',e=>{const r=mc.getBoundingClientRect();mineAt((e.clientX-r.left)*(MW/r.width),(e.clientY-r.top)*(MH/r.height));});
mc.addEventListener('mousemove',e=>{if(e.buttons===1){const r=mc.getBoundingClientRect();mineAt((e.clientX-r.left)*(MW/r.width),(e.clientY-r.top)*(MH/r.height));}});
setInterval(()=>{if(autoMiners>0){for(let i=0;i<autoMiners;i++){const c=Math.floor(Math.random()*16),r=Math.floor(Math.random()*14);if(grid[r]){const cell=grid[r].cells[c];cell.hp=Math.max(0,cell.hp-1);if(cell.hp<=0){ore+=ORES[cell.type].val;cell.type=0;cell.hp=1;}}}draw();updHUD();}},1000);
initGrid();draw();updHUD();

</script>
</body>
</html>
