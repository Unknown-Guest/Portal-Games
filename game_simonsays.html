<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SIMON SAYS</title>
<style>
:root{--g:#3fbf3f;--gs:#6fdc6f;--gd:#2a9f2a;--r:#ff4444;--gold:#ffcc00;--bg:#000;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--g);font-family:'Courier New',monospace;display:flex;flex-direction:column;min-height:100vh;user-select:none;}
#hdr{border-bottom:2px solid var(--g);box-shadow:0 0 14px color-mix(in srgb,var(--g) 60%,transparent);padding:10px 24px;display:flex;align-items:center;flex-shrink:0;background:var(--bg);}
#hdr-title{font-size:20px;font-weight:bold;letter-spacing:5px;text-shadow:0 0 10px var(--g);flex:1;text-align:center;}
.back-btn{padding:5px 14px;border:1px solid var(--g);background:transparent;color:var(--g);font-size:10px;letter-spacing:2px;cursor:pointer;}
.back-btn:hover{background:var(--g);color:#000;}
#gw{flex:1;display:flex;justify-content:center;align-items:flex-start;padding:14px 16px 24px;}
#go{position:relative;width:960px;height:560px;border:2px solid var(--g);box-shadow:0 0 24px color-mix(in srgb,var(--g) 20%,transparent);flex-shrink:0;overflow:hidden;background:#000;}

</style>
</head>
<body>
<div id="hdr">
  <button class="back-btn" onclick="(function(){if(window.opener||window.history.length<=1)window.close();else location.href='websites.html';})()" >&#8592; BACK</button>
  <div style="flex:1;text-align:center;"><div id="hdr-title">SIMON SAYS</div><div style="font-size:9px;letter-spacing:2px;color:var(--gs);">// MEMORY //</div></div>
  <div style="width:90px;display:flex;justify-content:flex-end;"><button onclick="_goFS()" style="background:transparent;border:1px solid #2a4a2a;color:#3a6a3a;font-size:10px;padding:4px 8px;cursor:pointer;font-family:monospace;">&#9974; FULL</button></div>
</div>
<div id="gw"><div id="go">
<div style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;background:#020a02;">
  <div id="ss-info" style="font-size:11px;letter-spacing:3px;color:var(--g);">PRESS START</div>
  <div id="ss-score" style="font-size:28px;font-weight:bold;color:var(--gold,#fc0);min-height:40px;"></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;width:360px;height:360px;">
    <div class="ss-btn" id="ss-0" data-i="0" onclick="ssPress(0)" style="background:#880000;border-radius:120px 12px 12px 12px;border:3px solid #cc0000;cursor:pointer;transition:all .1s;"></div>
    <div class="ss-btn" id="ss-1" data-i="1" onclick="ssPress(1)" style="background:#006600;border-radius:12px 120px 12px 12px;border:3px solid #00aa00;cursor:pointer;transition:all .1s;"></div>
    <div class="ss-btn" id="ss-2" data-i="2" onclick="ssPress(2)" style="background:#0000aa;border-radius:12px 12px 12px 120px;border:3px solid #0000ff;cursor:pointer;transition:all .1s;"></div>
    <div class="ss-btn" id="ss-3" data-i="3" onclick="ssPress(3)" style="background:#886600;border-radius:12px 12px 120px 12px;border:3px solid #ffcc00;cursor:pointer;transition:all .1s;"></div>
  </div>
  <button onclick="ssStart()" style="padding:8px 28px;border:1px solid var(--g);background:transparent;color:var(--g);font-family:monospace;font-size:11px;letter-spacing:3px;cursor:pointer;">START</button>
</div>
</div></div>
<script>
(function(){
  var t=JSON.parse(localStorage.getItem('scpLastTheme')||localStorage.getItem('scpTheme')||'{}');
  var bg=t.bg||'#000000', ac=t.accent||'#3fbf3f';
  document.documentElement.style.setProperty('--g', ac);
  document.documentElement.style.setProperty('--bg', bg);
  function lighten(hex,amt){
    var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    r=Math.min(255,r+amt);g=Math.min(255,g+amt);b=Math.min(255,b+amt);
    return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
  }
  document.documentElement.style.setProperty('--gs', lighten(ac,50));
  document.documentElement.style.setProperty('--gd', lighten(ac,-30));
  document.body.style.backgroundColor=bg;
  document.getElementById('hdr').style.backgroundColor=bg;
  // Disable right-click on all game pages
  document.addEventListener('contextmenu', function(e){ e.preventDefault(); return false; });
  // Disable right-click drag image ghost
  document.addEventListener('dragstart', function(e){ e.preventDefault(); return false; });
})();
function _goFS(){const el=document.getElementById('go');if(!document.fullscreenElement)el.requestFullscreen().catch(()=>{});else document.exitFullscreen().catch(()=>{});}
document.addEventListener('keydown',e=>{if(e.code==='KeyF')_goFS();});
document.addEventListener('fullscreenchange',()=>{const el=document.getElementById('go');if(document.fullscreenElement===el){const s=Math.min(screen.width/960,screen.height/560);el.style.cssText='transform:scale('+s+');transform-origin:top left;position:fixed;top:'+Math.floor((screen.height-560*s)/2)+'px;left:'+Math.floor((screen.width-960*s)/2)+'px;z-index:9999;';}else{el.style.cssText='';}});

const COLS=['#ff2222','#22ff22','#2222ff','#ffcc00'];
const GLOW=['#ff8888','#88ff88','#8888ff','#ffee88'];
const BORD=['#ff0000','#00ff00','#0000ff','#ffaa00'];
let seq=[],step=0,playing=false,hi=0,round=0;
function ssStart(){seq=[];round=0;ssNextRound();}
function ssNextRound(){round++;step=0;playing=false;seq.push(Math.floor(Math.random()*4));document.getElementById('ss-info').textContent='WATCH...';document.getElementById('ss-score').textContent='ROUND '+round;let i=0;function show(){if(i>=seq.length){playing=true;document.getElementById('ss-info').textContent='YOUR TURN';return;}ssFlash(seq[i]);i++;setTimeout(show,700);}setTimeout(show,500);}
function ssFlash(idx,dur=400){const el=document.getElementById('ss-'+idx);const bg=COLS[idx];el.style.background=bg;el.style.boxShadow='0 0 40px '+GLOW[idx]+',0 0 80px '+GLOW[idx];setTimeout(()=>{el.style.background=bg.replace(/(..)(..)(..)$/,(_,r,g,b)=>([r,g,b].map(x=>Math.floor(parseInt(x,16)*0.3).toString(16).padStart(2,'0')).join('')));el.style.boxShadow='none';},dur);}
function ssPress(idx){if(!playing)return;ssFlash(idx,150);if(idx===seq[step]){step++;if(step===seq.length){if(round>hi)hi=round-1;playing=false;document.getElementById('ss-info').textContent='✓ CORRECT!';setTimeout(ssNextRound,800);}}else{playing=false;document.getElementById('ss-info').textContent='✗ WRONG! Best: '+(hi||round-1)+' rounds';document.getElementById('ss-score').textContent='';setTimeout(()=>{document.getElementById('ss-info').textContent='PRESS START';},2000);}}

</script>
</body>
</html>
