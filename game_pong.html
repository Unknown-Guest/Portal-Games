<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PONG</title>
<style>
:root{--g:#3fbf3f;--gs:#6fdc6f;--gd:#2a9f2a;--r:#ff4444;--gold:#ffcc00;--bg:#000;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--g);font-family:'Courier New',monospace;display:flex;flex-direction:column;min-height:100vh;user-select:none;}
#hdr{border-bottom:2px solid var(--g);box-shadow:0 0 14px color-mix(in srgb,var(--g) 60%,transparent);padding:10px 24px;display:flex;align-items:center;flex-shrink:0;background:var(--bg);}
#hdr-title{font-size:20px;font-weight:bold;letter-spacing:5px;text-shadow:0 0 10px var(--g);flex:1;text-align:center;}
.back-btn{padding:5px 14px;border:1px solid var(--g);background:transparent;color:var(--g);font-size:10px;letter-spacing:2px;cursor:pointer;}
.back-btn:hover{background:var(--g);color:#000;}
#gw{flex:1;display:flex;justify-content:center;align-items:flex-start;padding:14px 16px 24px;}
#go{position:relative;width:960px;height:560px;border:2px solid var(--g);box-shadow:0 0 24px color-mix(in srgb,var(--g) 20%,transparent);flex-shrink:0;overflow:hidden;background:#000;}

</style>
</head>
<body>
<div id="hdr">
  <button class="back-btn" onclick="(function(){if(window.opener||window.history.length<=1)window.close();else location.href='websites.html';})()" >&#8592; BACK</button>
  <div style="flex:1;text-align:center;"><div id="hdr-title">PONG</div><div style="font-size:9px;letter-spacing:2px;color:var(--gs);">// 2 PLAYER CLASSIC //</div></div>
  <div style="width:90px;display:flex;justify-content:flex-end;"><button onclick="_goFS()" style="background:transparent;border:1px solid #2a4a2a;color:#3a6a3a;font-size:10px;padding:4px 8px;cursor:pointer;font-family:monospace;">&#9974; FULL</button></div>
</div>
<div id="gw"><div id="go"><canvas id="c" width="960" height="560"></canvas></div></div>
<script>
(function(){
  var t=JSON.parse(localStorage.getItem('scpLastTheme')||localStorage.getItem('scpTheme')||'{}');
  var bg=t.bg||'#000000', ac=t.accent||'#3fbf3f';
  document.documentElement.style.setProperty('--g', ac);
  document.documentElement.style.setProperty('--bg', bg);
  function lighten(hex,amt){
    var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    r=Math.min(255,r+amt);g=Math.min(255,g+amt);b=Math.min(255,b+amt);
    return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
  }
  document.documentElement.style.setProperty('--gs', lighten(ac,50));
  document.documentElement.style.setProperty('--gd', lighten(ac,-30));
  document.body.style.backgroundColor=bg;
  document.getElementById('hdr').style.backgroundColor=bg;
  // Disable right-click on all game pages
  document.addEventListener('contextmenu', function(e){ e.preventDefault(); return false; });
  // Disable right-click drag image ghost
  document.addEventListener('dragstart', function(e){ e.preventDefault(); return false; });
})();
function _goFS(){const el=document.getElementById('go');if(!document.fullscreenElement)el.requestFullscreen().catch(()=>{});else document.exitFullscreen().catch(()=>{});}
document.addEventListener('keydown',e=>{if(e.code==='KeyF')_goFS();});
document.addEventListener('fullscreenchange',()=>{const el=document.getElementById('go');if(document.fullscreenElement===el){const s=Math.min(screen.width/960,screen.height/560);el.style.cssText='transform:scale('+s+');transform-origin:top left;position:fixed;top:'+Math.floor((screen.height-560*s)/2)+'px;left:'+Math.floor((screen.width-960*s)/2)+'px;z-index:9999;';}else{el.style.cssText='';}});

const cv=document.getElementById('c'),cx=cv.getContext('2d');
const W=960,H=560,KS={};
let p1y,p2y,bx,by,bvx,bvy,s1,s2,running=false,frame=0;
const PW=12,PH=80,PSPD=5.5,BR=8;
function init(){
  p1y=H/2-PH/2;p2y=H/2-PH/2;
  bx=W/2;by=H/2;
  const a=(Math.random()-0.5)*0.8;const spd=5+Math.min(Math.max(s1,s2)*0.3,3);
  bvx=(Math.random()<0.5?1:-1)*spd*Math.cos(a);
  bvy=spd*Math.sin(a);
  running=true;
}
function reset2(){s1=0;s2=0;init();}
function tick(){
  if(!running)return;frame++;
  if(KS['KeyW'])p1y=Math.max(0,p1y-PSPD);
  if(KS['KeyS'])p1y=Math.min(H-PH,p1y+PSPD);
  if(KS['ArrowUp'])p2y=Math.max(0,p2y-PSPD);
  if(KS['ArrowDown'])p2y=Math.min(H-PH,p2y+PSPD);
  bx+=bvx;by+=bvy;
  if(by<BR||by>H-BR){bvy*=-1;by=by<BR?BR:H-BR;}
  // P1 paddle
  if(bx<20+PW&&bx>20&&by>p1y-BR&&by<p1y+PH+BR&&bvx<0){
    bvx=Math.abs(bvx)*1.05;const rel=(by-p1y-PH/2)/(PH/2);bvy=rel*7;
    bvx=Math.min(bvx,14);
  }
  // P2 paddle
  if(bx>W-20-PW&&bx<W-20&&by>p2y-BR&&by<p2y+PH+BR&&bvx>0){
    bvx=-Math.abs(bvx)*1.05;const rel=(by-p2y-PH/2)/(PH/2);bvy=rel*7;
    bvx=Math.max(bvx,-14);
  }
  if(bx<0){s2++;running=false;setTimeout(()=>s2<7&&s1<7?init():null,1000);}
  if(bx>W){s1++;running=false;setTimeout(()=>s2<7&&s1<7?init():null,1000);}
  draw();
}
function draw(){
  cx.fillStyle='#050505';cx.fillRect(0,0,W,H);
  // Centre line
  cx.setLineDash([8,8]);cx.strokeStyle='rgba(255,255,255,0.1)';cx.lineWidth=2;cx.beginPath();cx.moveTo(W/2,0);cx.lineTo(W/2,H);cx.stroke();cx.setLineDash([]);
  // Scores
  cx.fillStyle='rgba(255,255,255,0.15)';cx.font='bold 80px Courier New';cx.textAlign='center';cx.fillText(s1,W/4,100);cx.fillText(s2,W*3/4,100);
  // Paddles
  const p1g=cx.createLinearGradient(20,p1y,20+PW,p1y+PH);p1g.addColorStop(0,'#44ff88');p1g.addColorStop(1,'#22aa44');
  cx.fillStyle=p1g;cx.shadowColor='#3f3';cx.shadowBlur=12;cx.beginPath();cx.roundRect(20,p1y,PW,PH,4);cx.fill();
  const p2g=cx.createLinearGradient(W-20-PW,p2y,W-20,p2y+PH);p2g.addColorStop(0,'#ff4466');p2g.addColorStop(1,'#aa2233');
  cx.fillStyle=p2g;cx.shadowColor='#f44';cx.shadowBlur=12;cx.beginPath();cx.roundRect(W-20-PW,p2y,PW,PH,4);cx.fill();
  // Ball
  cx.fillStyle='#fff';cx.shadowColor='#fff';cx.shadowBlur=16;cx.beginPath();cx.arc(bx,by,BR,0,Math.PI*2);cx.fill();cx.shadowBlur=0;
  // Labels
  cx.fillStyle='rgba(80,200,80,0.4)';cx.font='9px Courier New';cx.textAlign='center';cx.fillText('W/S',36,H-8);
  cx.fillStyle='rgba(200,80,80,0.4)';cx.fillText('↑/↓',W-36,H-8);
  if(s1>=7||s2>=7){
    const winner=s1>=7?'P1':'P2';const wCol=s1>=7?'#3f3':'#f44';
    cx.fillStyle='rgba(0,0,0,0.85)';cx.fillRect(W/2-160,H/2-55,320,110);cx.strokeStyle=wCol;cx.lineWidth=2;cx.strokeRect(W/2-160,H/2-55,320,110);cx.fillStyle=wCol;cx.font='bold 28px Courier New';cx.textAlign='center';cx.fillText(winner+' WINS!',W/2,H/2-14);cx.fillStyle='rgba(255,255,255,0.4)';cx.font='11px Courier New';cx.fillText(s1+' — '+s2+' · SPACE TO RESTART',W/2,H/2+18);
  } else if(!running&&frame>10){
    cx.fillStyle='rgba(255,255,255,0.15)';cx.font='11px Courier New';cx.textAlign='center';cx.fillText(s1>0||s2>0?s1+' — '+s2:'W/S  ·  ARROWS  ·  FIRST TO 7 WINS',W/2,H-12);
  }
}
window.addEventListener('keydown',e=>{KS[e.code]=true;if(e.code==='Space'){if(!running&&(s1<7&&s2<7))init();else if(s1>=7||s2>=7)reset2();e.preventDefault();}});
window.addEventListener('keyup',e=>{KS[e.code]=false;});
s1=0;s2=0;
cx.fillStyle='#050505';cx.fillRect(0,0,W,H);cx.fillStyle='rgba(255,255,255,0.4)';cx.font='bold 32px Courier New';cx.textAlign='center';cx.fillText('PONG',W/2,H/2-10);cx.fillStyle='rgba(255,255,255,0.2)';cx.font='11px Courier New';cx.fillText('P1: W/S · P2: ARROWS · FIRST TO 7 · SPACE TO START',W/2,H/2+22);
setInterval(tick,1000/60);

</script>
</body>
</html>
