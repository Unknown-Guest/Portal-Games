<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ENDLESS RUNNER</title>
<style>
:root{--g:#3fbf3f;--gs:#6fdc6f;--gd:#2a9f2a;--r:#ff4444;--gold:#ffcc00;--bg:#000;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--g);font-family:'Courier New',monospace;display:flex;flex-direction:column;min-height:100vh;user-select:none;}
#hdr{border-bottom:2px solid var(--g);box-shadow:0 0 14px color-mix(in srgb,var(--g) 60%,transparent);padding:10px 24px;display:flex;align-items:center;flex-shrink:0;background:var(--bg);}
#hdr-title{font-size:20px;font-weight:bold;letter-spacing:5px;text-shadow:0 0 10px var(--g);flex:1;text-align:center;}
.back-btn{padding:5px 14px;border:1px solid var(--g);background:transparent;color:var(--g);font-size:10px;letter-spacing:2px;cursor:pointer;}
.back-btn:hover{background:var(--g);color:#000;}
#gw{flex:1;display:flex;justify-content:center;align-items:flex-start;padding:14px 16px 24px;}
#go{position:relative;width:960px;height:560px;border:2px solid var(--g);box-shadow:0 0 24px color-mix(in srgb,var(--g) 20%,transparent);flex-shrink:0;overflow:hidden;background:#000;}

</style>
</head>
<body>
<div id="hdr">
  <button class="back-btn" onclick="(function(){if(window.opener||window.history.length<=1)window.close();else location.href='websites.html';})()" >&#8592; BACK</button>
  <div style="flex:1;text-align:center;"><div id="hdr-title">ENDLESS RUNNER</div><div style="font-size:9px;letter-spacing:2px;color:var(--gs);">// RUN FOREVER //</div></div>
  <div style="width:90px;display:flex;justify-content:flex-end;"><button onclick="_goFS()" style="background:transparent;border:1px solid #2a4a2a;color:#3a6a3a;font-size:10px;padding:4px 8px;cursor:pointer;font-family:monospace;">&#9974; FULL</button></div>
</div>
<div id="gw"><div id="go"><canvas id="c" width="960" height="560"></canvas></div></div>
<script>
(function(){
  var t=JSON.parse(localStorage.getItem('scpLastTheme')||localStorage.getItem('scpTheme')||'{}');
  var bg=t.bg||'#000000', ac=t.accent||'#3fbf3f';
  document.documentElement.style.setProperty('--g', ac);
  document.documentElement.style.setProperty('--bg', bg);
  function lighten(hex,amt){
    var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    r=Math.min(255,r+amt);g=Math.min(255,g+amt);b=Math.min(255,b+amt);
    return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
  }
  document.documentElement.style.setProperty('--gs', lighten(ac,50));
  document.documentElement.style.setProperty('--gd', lighten(ac,-30));
  document.body.style.backgroundColor=bg;
  document.getElementById('hdr').style.backgroundColor=bg;
  // Disable right-click on all game pages
  document.addEventListener('contextmenu', function(e){ e.preventDefault(); return false; });
  // Disable right-click drag image ghost
  document.addEventListener('dragstart', function(e){ e.preventDefault(); return false; });
})();
function _goFS(){const el=document.getElementById('go');if(!document.fullscreenElement)el.requestFullscreen().catch(()=>{});else document.exitFullscreen().catch(()=>{});}
document.addEventListener('keydown',e=>{if(e.code==='KeyF')_goFS();});
document.addEventListener('fullscreenchange',()=>{const el=document.getElementById('go');if(document.fullscreenElement===el){const s=Math.min(screen.width/960,screen.height/560);el.style.cssText='transform:scale('+s+');transform-origin:top left;position:fixed;top:'+Math.floor((screen.height-560*s)/2)+'px;left:'+Math.floor((screen.width-960*s)/2)+'px;z-index:9999;';}else{el.style.cssText='';}});

const cv=document.getElementById('c'),cx=cv.getContext('2d');
const W=960,H=560,G=980,GND=H-80;
let px=140,py=GND,vy=0,onGnd=true,obstacles=[],score=0,hi=0,speed=5,running=false,alive=false,frame=0,stars=[];
let coins=[],particles=[];
for(let i=0;i<60;i++)stars.push({x:Math.random()*W,y:Math.random()*H*0.6,s:Math.random()*2+0.5});
function init(){px=140;py=GND;vy=0;onGnd=true;obstacles=[];coins=[];particles=[];score=0;speed=5;frame=0;alive=true;running=true;loop();}
function jump(){if(!alive){init();return;}if(onGnd){vy=-18;onGnd=false;}}
function loop(){if(!running)return;requestAnimationFrame(loop);update();draw();}
function update(){
  frame++;score++;if(score>hi)hi=score;
  speed=5+Math.floor(score/400)*0.5;
  // Physics
  vy+=G/60/60*16;py+=vy;
  if(py>=GND){py=GND;vy=0;onGnd=true;}
  // Obstacles
  if(frame%Math.max(40,80-Math.floor(score/200))==0){
    const h=30+Math.random()*60,w=20+Math.random()*20;
    obstacles.push({x:W+10,y:GND-h+2,w,h,col:'#cc2222'});
    if(Math.random()<0.3)obstacles.push({x:W+w+30+Math.random()*60,y:GND-h*0.6,w:w*0.6,h:h*0.6,col:'#aa1111'});
  }
  obstacles.forEach(o=>o.x-=speed);
  obstacles=obstacles.filter(o=>o.x>-100);
  // Coins
  if(frame%60==0)coins.push({x:W+10,y:GND-40-Math.random()*120,r:10});
  coins.forEach(c=>c.x-=speed);coins=coins.filter(c=>c.x>-20);
  // Collect coins
  coins=coins.filter(c=>{if(Math.hypot(px+16-c.x,py-26-c.y)<20){score+=50;for(let i=0;i<6;i++)particles.push({x:c.x,y:c.y,vx:(Math.random()-0.5)*4,vy:-Math.random()*3,l:20,col:'#ffcc00'});return false;}return true;});
  // Particles
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.l--;});
  particles=particles.filter(p=>p.l>0);
  // Collision
  for(const o of obstacles){if(px+26>o.x+4&&px+6<o.x+o.w-4&&py>o.y&&py-40<o.y+o.h){alive=false;running=false;if(score>hi)hi=score;return;}}
}
function draw(){
  // Sky gradient
  const sky=cx.createLinearGradient(0,0,0,H);sky.addColorStop(0,'#0a0020');sky.addColorStop(0.6,'#150030');sky.addColorStop(1,'#050010');
  cx.fillStyle=sky;cx.fillRect(0,0,W,H);
  // Stars
  stars.forEach(s=>{cx.fillStyle='rgba(255,255,255,'+(0.3+Math.sin(frame*0.02+s.x)*0.2)+')';cx.fillRect(s.x,s.y,s.s,s.s);});
  // Ground
  const gg=cx.createLinearGradient(0,GND,0,H);gg.addColorStop(0,'#1a4a1a');gg.addColorStop(1,'#0a1a0a');
  cx.fillStyle=gg;cx.fillRect(0,GND,W,H-GND);
  cx.fillStyle='#2a6a2a';cx.fillRect(0,GND,W,3);
  // Ground lines
  for(let i=0;i<12;i++){const lx=((i*120-frame*speed*0.5)%W+W)%W;cx.strokeStyle='rgba(40,100,40,0.3)';cx.lineWidth=1;cx.beginPath();cx.moveTo(lx,GND);cx.lineTo(lx-40,H);cx.stroke();}
  // Obstacles
  obstacles.forEach(o=>{
    const g=cx.createLinearGradient(o.x,o.y,o.x+o.w,o.y+o.h);g.addColorStop(0,'#ff4444');g.addColorStop(1,'#880000');
    cx.fillStyle=g;cx.fillRect(o.x,o.y,o.w,o.h);
    cx.strokeStyle='rgba(255,120,120,0.4)';cx.lineWidth=1;cx.strokeRect(o.x,o.y,o.w,o.h);
  });
  // Coins
  coins.forEach(c=>{
    cx.fillStyle='#ffcc00';cx.shadowColor='#ffcc00';cx.shadowBlur=8;
    cx.beginPath();cx.arc(c.x,c.y,c.r,0,Math.PI*2);cx.fill();cx.shadowBlur=0;
    cx.fillStyle='rgba(255,255,200,0.4)';cx.beginPath();cx.arc(c.x-3,c.y-3,4,0,Math.PI*2);cx.fill();
  });
  // Particles
  particles.forEach(p=>{cx.globalAlpha=p.l/20;cx.fillStyle=p.col;cx.beginPath();cx.arc(p.x,p.y,4,0,Math.PI*2);cx.fill();});cx.globalAlpha=1;
  // Player (stick figure running)
  const runPhase=Math.sin(frame*0.3);
  cx.fillStyle='#3f3';cx.shadowColor='#3f3';cx.shadowBlur=4;
  // Body
  cx.fillRect(px+8,py-36,16,18);
  // Head
  cx.beginPath();cx.arc(px+16,py-42,9,0,Math.PI*2);cx.fill();
  // Legs
  const lA=runPhase*25;
  cx.strokeStyle='#3f3';cx.lineWidth=5;
  cx.beginPath();cx.moveTo(px+12,py-18);cx.lineTo(px+6+lA,py-2);cx.lineTo(px+lA,py);cx.stroke();
  cx.beginPath();cx.moveTo(px+20,py-18);cx.lineTo(px+26-lA,py-2);cx.lineTo(px+32-lA,py);cx.stroke();
  // Arms
  cx.beginPath();cx.moveTo(px+12,py-32);cx.lineTo(px+2-lA*0.5,py-24);cx.stroke();
  cx.beginPath();cx.moveTo(px+20,py-32);cx.lineTo(px+30+lA*0.5,py-24);cx.stroke();
  cx.shadowBlur=0;
  // HUD
  cx.fillStyle='rgba(0,0,0,0.6)';cx.fillRect(0,0,W,24);
  cx.fillStyle='#3f3';cx.font='bold 13px Courier New';cx.textAlign='left';cx.fillText('SCORE: '+score,10,16);
  cx.textAlign='right';cx.fillText('BEST: '+hi,W-10,16);
  cx.textAlign='center';cx.fillStyle='rgba(0,180,0,0.4)';cx.fillText('SPACE/↑ TO JUMP',W/2,16);
  if(!alive){
    cx.fillStyle='rgba(0,0,0,0.85)';cx.fillRect(W/2-160,H/2-55,320,110);
    cx.strokeStyle='#f44';cx.lineWidth=2;cx.strokeRect(W/2-160,H/2-55,320,110);
    cx.fillStyle='#f44';cx.font='bold 26px Courier New';cx.textAlign='center';cx.fillText('GAME OVER',W/2,H/2-15);
    cx.fillStyle='#3f3';cx.font='13px Courier New';cx.fillText('SCORE: '+score+'  BEST: '+hi,W/2,H/2+14);
    cx.fillStyle='#2a5a2a';cx.fillText('CLICK OR SPACE',W/2,H/2+38);
  } else if(!running&&!alive===false&&frame===0){
    cx.fillStyle='rgba(0,0,0,0.8)';cx.fillRect(W/2-180,H/2-50,360,100);cx.strokeStyle='#3f3';cx.lineWidth=2;cx.strokeRect(W/2-180,H/2-50,360,100);cx.fillStyle='#3f3';cx.font='bold 26px Courier New';cx.textAlign='center';cx.fillText('ENDLESS RUNNER',W/2,H/2-10);cx.fillStyle='#2a5a2a';cx.font='11px Courier New';cx.fillText('CLICK · SPACE · ↑ TO JUMP',W/2,H/2+20);
  }
}
window.addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='ArrowUp'){jump();e.preventDefault();}});
cv.addEventListener('click',jump);
draw();

</script>
</body>
</html>
