<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TYPING SPEED</title>
<style>
:root{--g:#3fbf3f;--gs:#6fdc6f;--gd:#2a9f2a;--r:#ff4444;--gold:#ffcc00;--bg:#000;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--g);font-family:'Courier New',monospace;display:flex;flex-direction:column;min-height:100vh;user-select:none;}
#hdr{border-bottom:2px solid var(--g);box-shadow:0 0 14px color-mix(in srgb,var(--g) 60%,transparent);padding:10px 24px;display:flex;align-items:center;flex-shrink:0;background:var(--bg);}
#hdr-title{font-size:20px;font-weight:bold;letter-spacing:5px;text-shadow:0 0 10px var(--g);flex:1;text-align:center;}
.back-btn{padding:5px 14px;border:1px solid var(--g);background:transparent;color:var(--g);font-size:10px;letter-spacing:2px;cursor:pointer;}
.back-btn:hover{background:var(--g);color:#000;}
#gw{flex:1;display:flex;justify-content:center;align-items:flex-start;padding:14px 16px 24px;}
#go{position:relative;width:960px;height:560px;border:2px solid var(--g);box-shadow:0 0 24px color-mix(in srgb,var(--g) 20%,transparent);flex-shrink:0;overflow:hidden;background:#000;}

</style>
</head>
<body>
<div id="hdr">
  <button class="back-btn" onclick="(function(){if(window.opener||window.history.length<=1)window.close();else location.href='websites.html';})()" >&#8592; BACK</button>
  <div style="flex:1;text-align:center;"><div id="hdr-title">TYPING SPEED</div><div style="font-size:9px;letter-spacing:2px;color:var(--gs);">// WPM TEST //</div></div>
  <div style="width:90px;display:flex;justify-content:flex-end;"><button onclick="_goFS()" style="background:transparent;border:1px solid #2a4a2a;color:#3a6a3a;font-size:10px;padding:4px 8px;cursor:pointer;font-family:monospace;">&#9974; FULL</button></div>
</div>
<div id="gw"><div id="go">
<div style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px;background:#020a02;">
  <div style="display:flex;gap:40px;margin-bottom:4px;">
    <div style="text-align:center;"><div style="font-size:8px;letter-spacing:2px;color:#2a5a2a;">WPM</div><div id="tp-wpm" style="font-size:32px;color:var(--gold,#fc0);font-weight:bold;">--</div></div>
    <div style="text-align:center;"><div style="font-size:8px;letter-spacing:2px;color:#2a5a2a;">ACCURACY</div><div id="tp-acc" style="font-size:32px;color:var(--g);font-weight:bold;">--</div></div>
    <div style="text-align:center;"><div style="font-size:8px;letter-spacing:2px;color:#2a5a2a;">TIME</div><div id="tp-time" style="font-size:32px;color:#4af;font-weight:bold;">60</div></div>
  </div>
  <div id="tp-text" style="max-width:820px;font-size:18px;line-height:2;letter-spacing:1px;font-family:'Courier New',monospace;padding:16px;border:1px solid #1a3a1a;background:rgba(0,0,0,0.5);border-radius:4px;min-height:80px;"></div>
  <input id="tp-input" style="width:820px;padding:10px 14px;background:#0a1a0a;border:1px solid var(--g);color:var(--g);font-size:16px;font-family:'Courier New',monospace;letter-spacing:1px;outline:none;" placeholder="START TYPING..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
  <div style="display:flex;gap:16px;">
    <button onclick="tpStart()" style="padding:8px 24px;border:1px solid var(--g);background:transparent;color:var(--g);font-family:monospace;font-size:10px;letter-spacing:2px;cursor:pointer;">RESTART</button>
    <select id="tp-dur" style="padding:8px 14px;background:#0a1a0a;border:1px solid #1a3a1a;color:var(--g);font-family:monospace;font-size:10px;cursor:pointer;" onchange="tpStart()">
      <option value="30">30s</option><option value="60" selected>60s</option><option value="120">2min</option>
    </select>
  </div>
  <div id="tp-result" style="font-size:11px;letter-spacing:2px;color:#1a3a1a;"></div>
</div>
</div></div>
<script>
(function(){
  var t=JSON.parse(localStorage.getItem('scpLastTheme')||localStorage.getItem('scpTheme')||'{}');
  var bg=t.bg||'#000000', ac=t.accent||'#3fbf3f';
  document.documentElement.style.setProperty('--g', ac);
  document.documentElement.style.setProperty('--bg', bg);
  function lighten(hex,amt){
    var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    r=Math.min(255,r+amt);g=Math.min(255,g+amt);b=Math.min(255,b+amt);
    return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
  }
  document.documentElement.style.setProperty('--gs', lighten(ac,50));
  document.documentElement.style.setProperty('--gd', lighten(ac,-30));
  document.body.style.backgroundColor=bg;
  document.getElementById('hdr').style.backgroundColor=bg;
  // Disable right-click on all game pages
  document.addEventListener('contextmenu', function(e){ e.preventDefault(); return false; });
  // Disable right-click drag image ghost
  document.addEventListener('dragstart', function(e){ e.preventDefault(); return false; });
})();
function _goFS(){const el=document.getElementById('go');if(!document.fullscreenElement)el.requestFullscreen().catch(()=>{});else document.exitFullscreen().catch(()=>{});}
document.addEventListener('keydown',e=>{if(e.code==='KeyF')_goFS();});
document.addEventListener('fullscreenchange',()=>{const el=document.getElementById('go');if(document.fullscreenElement===el){const s=Math.min(screen.width/960,screen.height/560);el.style.cssText='transform:scale('+s+');transform-origin:top left;position:fixed;top:'+Math.floor((screen.height-560*s)/2)+'px;left:'+Math.floor((screen.width-960*s)/2)+'px;z-index:9999;';}else{el.style.cssText='';}});

const WORDS='the quick brown fox jumps over lazy dog function variable return boolean integer string array object class method property interface abstract implementation algorithm complexity performance recursion iteration database network protocol authentication encryption compression optimization deployment'.split(' ');
let words=[],current=0,typed=0,errors=0,timer=null,timeLeft=60,started=false,best=0;
function getWords(n){const w=[];for(let i=0;i<n;i++)w.push(WORDS[Math.floor(Math.random()*WORDS.length)]);return w;}
function tpStart(){
  clearInterval(timer);timeLeft=parseInt(document.getElementById('tp-dur').value);
  words=getWords(80);current=0;typed=0;errors=0;started=false;
  document.getElementById('tp-result').textContent='';
  document.getElementById('tp-wpm').textContent='--';document.getElementById('tp-acc').textContent='--';
  document.getElementById('tp-time').textContent=timeLeft;
  document.getElementById('tp-input').value='';
  renderText();document.getElementById('tp-input').focus();
}
function renderText(){
  const el=document.getElementById('tp-text');el.innerHTML='';
  words.forEach((w,i)=>{
    const sp=document.createElement('span');
    sp.textContent=w+' ';
    if(i<current)sp.style.color='#3f3';
    else if(i===current){sp.style.color='#fff';sp.style.textDecoration='underline';sp.style.textDecorationColor='var(--gold,#fc0)';}
    else sp.style.color='#2a4a2a';
    el.appendChild(sp);
  });
}
function calcWPM(){const mins=(parseInt(document.getElementById('tp-dur').value)-timeLeft)/60;return mins>0?Math.round(typed/5/mins):0;}
document.getElementById('tp-input').addEventListener('input',e=>{
  if(!started){started=true;timer=setInterval(()=>{timeLeft--;document.getElementById('tp-time').textContent=timeLeft;document.getElementById('tp-wpm').textContent=calcWPM();if(timeLeft<=0){clearInterval(timer);tpFinish();}},1000);}
  const val=e.target.value;
  if(val.endsWith(' ')){
    const attempt=val.trim();const target=words[current];
    if(attempt===target)typed+=target.length+1;else errors++;
    current++;e.target.value='';
    if(current>=words.length){words=[...words,...getWords(20)];}
    renderText();document.getElementById('tp-acc').textContent=Math.max(0,Math.round((1-errors/Math.max(1,current))*100))+'%';
  }
});
function tpFinish(){
  document.getElementById('tp-input').disabled=true;
  const wpm=calcWPM();const acc=Math.max(0,Math.round((1-errors/Math.max(1,current))*100));
  if(wpm>best)best=wpm;
  document.getElementById('tp-wpm').textContent=wpm;document.getElementById('tp-acc').textContent=acc+'%';
  const grade=wpm>80?'OUTSTANDING':wpm>60?'EXCELLENT':wpm>40?'GOOD':wpm>20?'AVERAGE':'KEEP PRACTICING';
  document.getElementById('tp-result').textContent=grade+' · BEST: '+best+' WPM';
  setTimeout(()=>{document.getElementById('tp-input').disabled=false;},500);
}
tpStart();

</script>
</body>
</html>
