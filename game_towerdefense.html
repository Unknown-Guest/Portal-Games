<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TOWER DEFENSE</title>
<style>
:root{--g:#3fbf3f;--gs:#6fdc6f;--gd:#2a9f2a;--r:#ff4444;--gold:#ffcc00;--bg:#000;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--g);font-family:'Courier New',monospace;display:flex;flex-direction:column;min-height:100vh;user-select:none;}
#hdr{border-bottom:2px solid var(--g);box-shadow:0 0 14px color-mix(in srgb,var(--g) 60%,transparent);padding:10px 24px;display:flex;align-items:center;flex-shrink:0;background:var(--bg);}
#hdr-title{font-size:20px;font-weight:bold;letter-spacing:5px;text-shadow:0 0 10px var(--g);flex:1;text-align:center;}
.back-btn{padding:5px 14px;border:1px solid var(--g);background:transparent;color:var(--g);font-size:10px;letter-spacing:2px;cursor:pointer;}
.back-btn:hover{background:var(--g);color:#000;}
#gw{flex:1;display:flex;justify-content:center;align-items:flex-start;padding:14px 16px 24px;}
#go{position:relative;width:960px;height:560px;border:2px solid var(--g);box-shadow:0 0 24px color-mix(in srgb,var(--g) 20%,transparent);flex-shrink:0;overflow:hidden;background:#000;}

</style>
</head>
<body>
<div id="hdr">
  <button class="back-btn" onclick="(function(){if(window.opener||window.history.length<=1)window.close();else location.href='websites.html';})()" >&#8592; BACK</button>
  <div style="flex:1;text-align:center;"><div id="hdr-title">TOWER DEFENSE</div><div style="font-size:9px;letter-spacing:2px;color:var(--gs);">// PROTECT THE BASE //</div></div>
  <div style="width:90px;display:flex;justify-content:flex-end;"><button onclick="_goFS()" style="background:transparent;border:1px solid #2a4a2a;color:#3a6a3a;font-size:10px;padding:4px 8px;cursor:pointer;font-family:monospace;">&#9974; FULL</button></div>
</div>
<div id="gw"><div id="go"><canvas id="c" width="960" height="560"></canvas></div></div>
<script>
(function(){
  var t=JSON.parse(localStorage.getItem('scpLastTheme')||localStorage.getItem('scpTheme')||'{}');
  var bg=t.bg||'#000000', ac=t.accent||'#3fbf3f';
  document.documentElement.style.setProperty('--g', ac);
  document.documentElement.style.setProperty('--bg', bg);
  function lighten(hex,amt){
    var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    r=Math.min(255,r+amt);g=Math.min(255,g+amt);b=Math.min(255,b+amt);
    return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
  }
  document.documentElement.style.setProperty('--gs', lighten(ac,50));
  document.documentElement.style.setProperty('--gd', lighten(ac,-30));
  document.body.style.backgroundColor=bg;
  document.getElementById('hdr').style.backgroundColor=bg;
  // Disable right-click on all game pages
  document.addEventListener('contextmenu', function(e){ e.preventDefault(); return false; });
  // Disable right-click drag image ghost
  document.addEventListener('dragstart', function(e){ e.preventDefault(); return false; });
})();
function _goFS(){const el=document.getElementById('go');if(!document.fullscreenElement)el.requestFullscreen().catch(()=>{});else document.exitFullscreen().catch(()=>{});}
document.addEventListener('keydown',e=>{if(e.code==='KeyF')_goFS();});
document.addEventListener('fullscreenchange',()=>{const el=document.getElementById('go');if(document.fullscreenElement===el){const s=Math.min(screen.width/960,screen.height/560);el.style.cssText='transform:scale('+s+');transform-origin:top left;position:fixed;top:'+Math.floor((screen.height-560*s)/2)+'px;left:'+Math.floor((screen.width-960*s)/2)+'px;z-index:9999;';}else{el.style.cssText='';}});

const cv=document.getElementById('c'),cx=cv.getContext('2d');
const W=960,H=560;
let gold,lives,wave2,waveTimer2,towers,enemies2,bullets2,particles3,running=false,frame=0;
let selectedTower='basic';
const PATH=[[0,200],[120,200],[120,320],[280,320],[280,120],[440,120],[440,400],[640,400],[640,200],[820,200],[820,400],[960,400]];
const TOWER_DEF={
  basic:{name:'BASIC',cost:50,dmg:20,range:100,rate:40,col:'#3f3',bCol:'#ff0',icon:'🗼'},
  sniper:{name:'SNIPER',cost:120,dmg:80,range:200,rate:100,col:'#4af',bCol:'#4af',icon:'🎯'},
  rapid:{name:'RAPID',cost:80,dmg:8,range:80,rate:12,col:'#fa0',bCol:'#fa0',icon:'⚡'},
  slow:{name:'SLOW',cost:100,dmg:5,range:110,rate:35,col:'#a4f',bCol:'#a4f',icon:'❄️'},
};
function init2(){
  gold=200;lives=20;wave2=0;waveTimer2=0;towers=[];enemies2=[];bullets2=[];particles3=[];running=true;frame=0;
  spawnWave2();
}
function spawnWave2(){
  wave2++;
  const n=5+wave2*3;const hp=50+wave2*30;const spd=0.8+wave2*0.1;
  let spawned=0;
  const t=setInterval(()=>{
    if(spawned>=n){clearInterval(t);return;}
    const isBoss=wave2>=3&&spawned===n-1;
    enemies2.push({px:0,seg:0,hp:isBoss?hp*5:hp,maxHp:isBoss?hp*5:hp,spd:isBoss?spd*0.6:spd,r:isBoss?18:10,col:isBoss?'#f44':'#c33',slowed:0,slow:1,progress:0});
    spawned++;
  },600);
}
function tick2(){
  if(!running)return;frame++;
  // Move enemies
  enemies2.forEach(e=>{
    e.slow=Math.max(1,e.slow-0.02);if(e.slowed>0){e.slowed--;e.slow=2;}
    const spd2=e.spd/e.slow;e.progress+=spd2;
    // Move along path
    let dist=e.progress,seg=0;
    for(let i=0;i<PATH.length-1;i++){
      const dx=PATH[i+1][0]-PATH[i][0],dy=PATH[i+1][1]-PATH[i][1];
      const len=Math.hypot(dx,dy);
      if(dist<len){e.x=PATH[i][0]+dx/len*dist;e.y=PATH[i][1]+dy/len*dist;seg=i;break;}
      dist-=len;
    }
    e.seg=seg;
    if(e.progress>=PATH.reduce((s,_,i)=>i>0?s+Math.hypot(PATH[i][0]-PATH[i-1][0],PATH[i][1]-PATH[i-1][1]):s,0)-5){
      e.hp=0;lives--;if(lives<=0){running=false;}
    }
  });
  enemies2=enemies2.filter(e=>e.hp>0);
  // Tower shooting
  towers.forEach(t=>{
    t.timer=Math.max(0,t.timer-1);if(t.timer>0)return;
    const def=TOWER_DEF[t.type];
    const target=enemies2.find(e=>Math.hypot(e.x-t.x,e.y-t.y)<def.range);
    if(!target)return;
    t.timer=def.rate;t.angle=Math.atan2(target.y-t.y,target.x-t.x);
    bullets2.push({x:t.x,y:t.y,tx:target,vx:Math.cos(t.angle)*6,vy:Math.sin(t.angle)*6,dmg:def.dmg,col:def.bCol,slow:t.type==='slow',life:120});
  });
  // Bullets
  bullets2=bullets2.filter(b=>{
    b.x+=b.vx;b.y+=b.vy;b.life--;
    if(b.life<=0)return false;
    if(b.tx&&b.tx.hp>0&&Math.hypot(b.x-b.tx.x,b.y-b.tx.y)<14){
      b.tx.hp-=b.dmg;if(b.slow)b.tx.slowed=40,b.tx.slow=2.5;
      for(let p=0;p<4;p++)particles3.push({x:b.x,y:b.y,vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3,l:10,col:b.col});
      if(b.tx.hp<=0){gold+=b.tx.maxHp>200?20:10;b.tx.hp=0;}
      return false;
    }
    return true;
  });
  particles3=particles3.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.l--;return p.l>0;});
  if(!enemies2.length&&running){setTimeout(spawnWave2,2000);}
  draw2();
}
function draw2(){
  cx.fillStyle='#080f08';cx.fillRect(0,0,W,H);
  // Path
  cx.strokeStyle='rgba(100,80,40,0.6)';cx.lineWidth=40;cx.lineJoin='round';
  cx.beginPath();PATH.forEach((p,i)=>i?cx.lineTo(p[0],p[1]):cx.moveTo(p[0],p[1]));cx.stroke();
  cx.strokeStyle='rgba(140,110,50,0.4)';cx.lineWidth=38;
  cx.beginPath();PATH.forEach((p,i)=>i?cx.lineTo(p[0],p[1]):cx.moveTo(p[0],p[1]));cx.stroke();
  // Grid dots for placing
  for(let x=40;x<W;x+=40)for(let y=40;y<H;y+=40){cx.fillStyle='rgba(40,80,40,0.2)';cx.fillRect(x-1,y-1,2,2);}
  // Towers
  towers.forEach(t=>{
    const def=TOWER_DEF[t.type];
    cx.save();cx.translate(t.x,t.y);
    // Range circle on hover
    cx.strokeStyle='rgba(100,200,100,0.12)';cx.lineWidth=1;cx.beginPath();cx.arc(0,0,def.range,0,Math.PI*2);cx.stroke();
    cx.rotate(t.angle||0);
    cx.fillStyle=def.col;cx.shadowColor=def.col;cx.shadowBlur=8;
    cx.beginPath();cx.roundRect(-12,-12,24,24,4);cx.fill();cx.shadowBlur=0;
    cx.fillStyle='rgba(0,0,0,0.5)';cx.fillRect(-2,-14,4,10);// barrel
    cx.fillStyle=def.col;cx.fillRect(-1.5,-14,3,10);
    cx.restore();
    cx.fillStyle='rgba(255,255,255,0.6)';cx.font='14px Arial';cx.textAlign='center';cx.fillText(def.icon,t.x,t.y+5);
  });
  // Enemies
  enemies2.forEach(e=>{
    if(!e.x)return;
    cx.fillStyle=e.slowed>0?'#88f':e.col;cx.shadowColor=e.col;cx.shadowBlur=4;
    cx.beginPath();cx.arc(e.x,e.y,e.r,0,Math.PI*2);cx.fill();cx.shadowBlur=0;
    cx.fillStyle='rgba(0,0,0,0.6)';cx.fillRect(e.x-e.r,e.y-e.r-8,e.r*2,5);
    const hpPct=e.hp/e.maxHp;cx.fillStyle=hpPct<0.3?'#f33':hpPct<0.6?'#fa0':'#3f3';cx.fillRect(e.x-e.r,e.y-e.r-8,e.r*2*hpPct,5);
  });
  bullets2.forEach(b=>{cx.fillStyle=b.col;cx.shadowColor=b.col;cx.shadowBlur=4;cx.beginPath();cx.arc(b.x,b.y,4,0,Math.PI*2);cx.fill();cx.shadowBlur=0;});
  particles3.forEach(p=>{cx.globalAlpha=p.l/10;cx.fillStyle=p.col;cx.beginPath();cx.arc(p.x,p.y,3,0,Math.PI*2);cx.fill();});cx.globalAlpha=1;
  // HUD
  cx.fillStyle='rgba(0,0,0,0.8)';cx.fillRect(0,0,W,26);
  cx.fillStyle='#3f3';cx.font='11px Courier New';cx.textAlign='left';cx.fillText('💰 '+gold,8,17);
  cx.fillStyle='#f44';cx.fillText('❤ '+lives,80,17);
  cx.fillStyle='#ff0';cx.fillText('WAVE '+wave2,150,17);
  // Tower shop
  let shopX=250;
  Object.entries(TOWER_DEF).forEach(([k,def])=>{
    const sel=selectedTower===k;
    cx.fillStyle=sel?def.col+'44':'rgba(0,0,0,0.5)';cx.fillRect(shopX,2,90,22);
    cx.strokeStyle=sel?def.col:'#333';cx.lineWidth=1;cx.strokeRect(shopX,2,90,22);
    cx.fillStyle=gold>=def.cost?def.col:'#555';cx.font='10px Courier New';cx.textAlign='left';
    cx.fillText(def.icon+' '+def.name+' '+def.cost+'g',shopX+4,16);
    shopX+=96;
  });
  cx.fillStyle='rgba(100,100,100,0.3)';cx.fillRect(W-160,2,158,22);
  cx.strokeStyle='#333';cx.lineWidth=1;cx.strokeRect(W-160,2,158,22);
  cx.fillStyle='#555';cx.font='9px Courier New';cx.textAlign='center';cx.fillText('CLICK TO PLACE · KEYS 1-4',W-81,16);
  if(!running&&frame>60){cx.fillStyle='rgba(0,0,0,0.85)';cx.fillRect(W/2-160,H/2-55,320,110);cx.strokeStyle='#f44';cx.lineWidth=2;cx.strokeRect(W/2-160,H/2-55,320,110);cx.fillStyle='#f44';cx.font='bold 26px Courier New';cx.textAlign='center';cx.fillText('BASE DESTROYED',W/2,H/2-14);cx.fillStyle='#3f3';cx.font='12px Courier New';cx.fillText('WAVE '+wave2+' · SPACE TO RESTART',W/2,H/2+20);}
}
function isOnPath(x,y){for(let i=0;i<PATH.length-1;i++){const dx=PATH[i+1][0]-PATH[i][0],dy=PATH[i+1][1]-PATH[i][1],len=Math.hypot(dx,dy);const t=Math.max(0,Math.min(1,((x-PATH[i][0])*dx+(y-PATH[i][1])*dy)/(len*len)));const px=PATH[i][0]+t*dx-x,py=PATH[i][1]+t*dy-y;if(Math.hypot(px,py)<28)return true;}return false;}
cv.addEventListener('click',e=>{
  if(!running)return;
  const r=cv.getBoundingClientRect();const x=(e.clientX-r.left)*(W/r.width),y=(e.clientY-r.top)*(H/r.height);
  // Check shop
  let shopX=250;
  for(const k of Object.keys(TOWER_DEF)){if(x>shopX&&x<shopX+90&&y<26){selectedTower=k;return;}shopX+=96;}
  if(y<26)return;
  if(isOnPath(x,y))return;
  if(towers.some(t=>Math.hypot(t.x-x,t.y-y)<30))return;
  const def=TOWER_DEF[selectedTower];if(gold<def.cost)return;
  gold-=def.cost;towers.push({x,y,type:selectedTower,timer:0,angle:0});
});
window.addEventListener('keydown',e=>{
  const keys={'Digit1':'basic','Digit2':'sniper','Digit3':'rapid','Digit4':'slow'};
  if(keys[e.code])selectedTower=keys[e.code];
  if(e.code==='Space'&&!running)init2();
  e.preventDefault();
});
setInterval(tick2,1000/60);
cx.fillStyle='#080f08';cx.fillRect(0,0,W,H);cx.fillStyle='#3f3';cx.font='bold 28px Courier New';cx.textAlign='center';cx.fillText('TOWER DEFENSE',W/2,H/2-10);cx.fillStyle='#2a5a2a';cx.font='11px Courier New';cx.fillText('CLICK TO PLACE TOWERS · 1-4 TO SELECT · SPACE TO START',W/2,H/2+22);

</script>
</body>
</html>
