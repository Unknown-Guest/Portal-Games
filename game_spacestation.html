<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SPACE STATION</title>
<style>
:root{--g:#3fbf3f;--gs:#6fdc6f;--gd:#2a9f2a;--r:#ff4444;--gold:#ffcc00;--bg:#000;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--g);font-family:'Courier New',monospace;display:flex;flex-direction:column;min-height:100vh;user-select:none;}
#hdr{border-bottom:2px solid var(--g);box-shadow:0 0 14px color-mix(in srgb,var(--g) 60%,transparent);padding:10px 24px;display:flex;align-items:center;flex-shrink:0;background:var(--bg);}
#hdr-title{font-size:20px;font-weight:bold;letter-spacing:5px;text-shadow:0 0 10px var(--g);flex:1;text-align:center;}
.back-btn{padding:5px 14px;border:1px solid var(--g);background:transparent;color:var(--g);font-size:10px;letter-spacing:2px;cursor:pointer;}
.back-btn:hover{background:var(--g);color:#000;}
#gw{flex:1;display:flex;justify-content:center;align-items:flex-start;padding:14px 16px 24px;}
#go{position:relative;width:960px;height:560px;border:2px solid var(--g);box-shadow:0 0 24px color-mix(in srgb,var(--g) 20%,transparent);flex-shrink:0;overflow:hidden;background:#000;}

</style>
</head>
<body>
<div id="hdr">
  <button class="back-btn" onclick="(function(){if(window.opener||window.history.length<=1)window.close();else location.href='websites.html';})()" >&#8592; BACK</button>
  <div style="flex:1;text-align:center;"><div id="hdr-title">SPACE STATION</div><div style="font-size:9px;letter-spacing:2px;color:var(--gs);">// BUILD & EXPAND //</div></div>
  <div style="width:90px;display:flex;justify-content:flex-end;"><button onclick="_goFS()" style="background:transparent;border:1px solid #2a4a2a;color:#3a6a3a;font-size:10px;padding:4px 8px;cursor:pointer;font-family:monospace;">&#9974; FULL</button></div>
</div>
<div id="gw"><div id="go">
<div style="width:100%;height:100%;display:flex;flex-direction:column;background:#020408;font-family:'Courier New',monospace;overflow:hidden;">
  <div style="display:flex;gap:16px;padding:7px 12px;border-bottom:1px solid #0a1a2a;flex-shrink:0;flex-wrap:wrap;align-items:center;">
    <div><span style="font-size:7px;color:#1a3a5a;letter-spacing:2px;">⚡ POWER</span><div id="ss-pow" style="color:#ffcc00;font-size:11px;">0</div></div>
    <div><span style="font-size:7px;color:#1a3a5a;letter-spacing:2px;">👥 CREW</span><div id="ss-crew" style="color:#4af;font-size:11px;">0/0</div></div>
    <div><span style="font-size:7px;color:#1a3a5a;letter-spacing:2px;">🔬 RESEARCH</span><div id="ss-res" style="color:#af4;font-size:11px;">0</div></div>
    <div><span style="font-size:7px;color:#1a3a5a;letter-spacing:2px;">💰 CREDITS</span><div id="ss-cred" style="color:var(--gold,#fc0);font-size:11px;">500</div></div>
    <div><span style="font-size:7px;color:#1a3a5a;letter-spacing:2px;">🛸 PRESTIGE</span><div id="ss-pres" style="color:#f4f;font-size:11px;">0</div></div>
    <div style="margin-left:auto;"><div id="ss-msg" style="font-size:8px;color:#1a3a5a;text-align:right;min-width:180px;"></div></div>
  </div>
  <div style="display:flex;flex:1;overflow:hidden;">
    <canvas id="ss-c" width="400" height="440" style="flex-shrink:0;"></canvas>
    <div style="flex:1;overflow-y:auto;padding:8px;border-left:1px solid #0a1a2a;" id="ss-modules"></div>
    <div style="width:220px;border-left:1px solid #0a1a2a;overflow-y:auto;padding:8px;" id="ss-tech-panel"></div>
  </div>
</div>
</div></div>
<script>
(function(){
  var t=JSON.parse(localStorage.getItem('scpLastTheme')||localStorage.getItem('scpTheme')||'{}');
  var bg=t.bg||'#000000', ac=t.accent||'#3fbf3f';
  document.documentElement.style.setProperty('--g', ac);
  document.documentElement.style.setProperty('--bg', bg);
  function lighten(hex,amt){
    var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    r=Math.min(255,r+amt);g=Math.min(255,g+amt);b=Math.min(255,b+amt);
    return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
  }
  document.documentElement.style.setProperty('--gs', lighten(ac,50));
  document.documentElement.style.setProperty('--gd', lighten(ac,-30));
  document.body.style.backgroundColor=bg;
  document.getElementById('hdr').style.backgroundColor=bg;
  // Disable right-click on all game pages
  document.addEventListener('contextmenu', function(e){ e.preventDefault(); return false; });
  // Disable right-click drag image ghost
  document.addEventListener('dragstart', function(e){ e.preventDefault(); return false; });
})();
function _goFS(){const el=document.getElementById('go');if(!document.fullscreenElement)el.requestFullscreen().catch(()=>{});else document.exitFullscreen().catch(()=>{});}
document.addEventListener('keydown',e=>{if(e.code==='KeyF')_goFS();});
document.addEventListener('fullscreenchange',()=>{const el=document.getElementById('go');if(document.fullscreenElement===el){const s=Math.min(screen.width/960,screen.height/560);el.style.cssText='transform:scale('+s+');transform-origin:top left;position:fixed;top:'+Math.floor((screen.height-560*s)/2)+'px;left:'+Math.floor((screen.width-960*s)/2)+'px;z-index:9999;';}else{el.style.cssText='';}});

const sc=document.getElementById('ss-c'),sx=sc.getContext('2d');
const SW=400,SH=440;
let credits=500,power=0,maxPower=0,crew=0,maxCrew=0,research=0,prestige=0;
let tickN=0;
let modules={solarPanel:0,reactor:0,habitat:0,lab:0,hangar:0,factory:0,warpCore:0};
let techs={automation:false,advanced:false,warpTech:false,quantum:false};
const MOD={
  solarPanel:{name:'SOLAR PANEL',icon:'🔆',base:80,desc:'⚡+4/s',req:{}},
  reactor:{name:'REACTOR',icon:'⚛️',base:400,desc:'⚡+20/s, needs crew',req:{automation:true}},
  habitat:{name:'HABITAT',icon:'🏠',base:150,desc:'👥+5 crew capacity',req:{}},
  lab:{name:'LABORATORY',icon:'🔬',base:300,desc:'🔬+2/s per crew',req:{}},
  hangar:{name:'HANGAR',icon:'🛸',base:600,desc:'💰+10/s · prestige',req:{advanced:true}},
  factory:{name:'FACTORY',icon:'⚙️',base:1000,desc:'Produces all resources',req:{automation:true,advanced:true}},
  warpCore:{name:'WARP CORE',icon:'🌀',base:5000,desc:'Prestige multiplier',req:{warpTech:true}},
};
const TECH={
  automation:{name:'AUTOMATION',icon:'🤖',cost:200,desc:'Unlocks reactors & factories',req:{}},
  advanced:{name:'ADVANCED SYSTEMS',icon:'💫',cost:500,desc:'Unlocks hangars',req:{automation:true}},
  warpTech:{name:'WARP TECHNOLOGY',icon:'🌌',cost:2000,desc:'Unlocks Warp Core',req:{advanced:true}},
  quantum:{name:'QUANTUM COMPUTING',icon:'🧠',cost:5000,desc:'2× all research output',req:{warpTech:true}},
};
function fmt(n){if(n>=1e9)return(n/1e9).toFixed(1)+'B';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1000)return(n/1000).toFixed(1)+'K';return Math.floor(n);}
function modCost(id,n){return Math.ceil(MOD[id].base*Math.pow(1.25,n));}
function metReq(req){return Object.entries(req).every(([k,v])=>techs[k]===v);}
function canAfford(c){return credits>=c;}
function buyMod(id){if(!metReq(MOD[id].req))return;const c=modCost(id,modules[id]);if(!canAfford(c))return;credits-=c;modules[id]++;if(id==='habitat')maxCrew+=5;ssMsg('Built '+MOD[id].name);renderShop();}
function buyTech(id){const t=TECH[id];if(techs[id]||!metReq(t.req)||credits<t.cost)return;credits-=t.cost;techs[id]=true;ssMsg('Researched: '+t.name);renderShop();}
function ssMsg(t){document.getElementById('ss-msg').textContent=t;setTimeout(()=>document.getElementById('ss-msg').textContent='',2500);}
function gameTick(){
  tickN++;
  // Power production
  maxPower=modules.solarPanel*4+modules.reactor*20+modules.factory*5;
  power=Math.min(power+maxPower*0.1,maxPower);
  // Crew auto-assign up to capacity
  crew=Math.min(maxCrew,modules.habitat*3+modules.lab+modules.reactor);
  // Research
  const rBonus=techs.quantum?2:1;
  research+=modules.lab*0.2*Math.min(crew,modules.lab)*rBonus;
  // Credits
  const cps=modules.hangar*10+modules.factory*(techs.advanced?20:5)+modules.warpCore*100;
  credits+=cps*0.1;
  prestige=modules.warpCore*2+Math.floor(research/1000);
  // HUD
  document.getElementById('ss-pow').textContent=fmt(power)+'/'+fmt(maxPower);
  document.getElementById('ss-crew').textContent=crew+'/'+maxCrew;
  document.getElementById('ss-res').textContent=fmt(research);
  document.getElementById('ss-cred').textContent=fmt(credits);
  document.getElementById('ss-pres').textContent=prestige;
  if(tickN%8===0)renderShop();
  drawStation();
}
function drawStation(){
  sx.fillStyle='#010408';sx.fillRect(0,0,SW,SH);
  // Stars
  for(let i=0;i<80;i++){const bri=(Math.sin(tickN*0.05+i)*0.5+0.5)*0.4+0.1;sx.fillStyle='rgba(200,220,255,'+bri+')';sx.fillRect((i*173)%SW,(i*97)%SH,i%7===0?2:1,i%7===0?2:1);}
  // Station core
  const cx2=SW/2,cy2=SH/2;
  sx.fillStyle='#1a2a3a';sx.beginPath();sx.arc(cx2,cy2,28,0,Math.PI*2);sx.fill();
  sx.strokeStyle='#4af';sx.lineWidth=2;sx.beginPath();sx.arc(cx2,cy2,28,0,Math.PI*2);sx.stroke();
  sx.fillStyle='#4af';sx.font='16px Arial';sx.textAlign='center';sx.fillText('🛸',cx2,cy2+6);
  // Solar panels
  for(let i=0;i<modules.solarPanel;i++){
    const a=(i/Math.max(modules.solarPanel,1))*Math.PI*2;
    const r=60+Math.floor(i/8)*30;
    const px2=cx2+Math.cos(a)*r,py2=cy2+Math.sin(a)*r;
    sx.fillStyle='#ffd700';sx.fillRect(px2-8,py2-3,16,6);
    sx.strokeStyle='rgba(255,215,0,0.4)';sx.lineWidth=1;sx.strokeRect(px2-8,py2-3,16,6);
  }
  // Habitats
  for(let i=0;i<modules.habitat;i++){
    const a=(i/Math.max(modules.habitat,1))*Math.PI*2+Math.PI/4;
    const px2=cx2+Math.cos(a)*80,py2=cy2+Math.sin(a)*80;
    sx.fillStyle='#2a4a6a';sx.beginPath();sx.arc(px2,py2,10,0,Math.PI*2);sx.fill();
    sx.fillStyle='#4af';sx.font='10px Arial';sx.textAlign='center';sx.fillText('🏠',px2,py2+4);
  }
  // Labs
  for(let i=0;i<modules.lab;i++){
    const a=(i/Math.max(modules.lab,1))*Math.PI*2+Math.PI/3;
    const px2=cx2+Math.cos(a)*110,py2=cy2+Math.sin(a)*110;
    sx.fillStyle='#2a5a2a';sx.beginPath();sx.roundRect(px2-10,py2-8,20,16,3);sx.fill();
    sx.fillStyle='#af4';sx.font='10px Arial';sx.textAlign='center';sx.fillText('🔬',px2,py2+4);
  }
  // Connecting lines
  sx.strokeStyle='rgba(74,175,255,0.15)';sx.lineWidth=1;
  for(let i=0;i<modules.solarPanel;i++){const a=(i/Math.max(modules.solarPanel,1))*Math.PI*2;const r=60+Math.floor(i/8)*30;sx.beginPath();sx.moveTo(cx2,cy2);sx.lineTo(cx2+Math.cos(a)*r,cy2+Math.sin(a)*r);sx.stroke();}
  // Power glow
  if(power>0){sx.strokeStyle='rgba(255,200,0,0.2)';sx.lineWidth=power/maxPower*10;sx.beginPath();sx.arc(cx2,cy2,30,0,Math.PI*2);sx.stroke();}
}
function renderShop(){
  const mp=document.getElementById('ss-modules');mp.innerHTML='<div style="font-size:8px;letter-spacing:3px;color:#1a3a5a;margin-bottom:6px;">MODULES</div>';
  Object.entries(MOD).forEach(([id,m])=>{
    if(!metReq(m.req)&&!modules[id])return;
    const cost=modCost(id,modules[id]);const can=canAfford(cost)&&metReq(m.req);
    const el=document.createElement('div');
    el.style.cssText='display:flex;align-items:center;gap:6px;padding:5px 7px;border:1px solid '+(can?'#0a2a4a':'#0a0a1a')+';margin-bottom:3px;cursor:'+(can?'pointer':'default')+';opacity:'+(can?'1':'0.5')+';background:'+(can?'rgba(0,10,30,0.4)':'transparent')+';';
    el.innerHTML='<span style="font-size:16px;">'+m.icon+'</span><div style="flex:1;"><div style="font-size:9px;color:#4af;">'+m.name+' ('+modules[id]+')</div><div style="font-size:7px;color:#1a4a6a;">'+m.desc+'</div></div><div style="font-size:9px;color:var(--gold,#fc0);">'+fmt(cost)+'💰</div>';
    if(can)el.onclick=()=>buyMod(id);
    mp.appendChild(el);
  });
  const tp=document.getElementById('ss-tech-panel');tp.innerHTML='<div style="font-size:8px;letter-spacing:3px;color:#1a3a5a;margin-bottom:6px;">TECHNOLOGY</div>';
  Object.entries(TECH).forEach(([id,t])=>{
    if(techs[id]){const el=document.createElement('div');el.style.cssText='padding:5px;border:1px solid #0a2a2a;margin-bottom:3px;font-size:8px;color:#1a5a3a;';el.textContent='✓ '+t.name;tp.appendChild(el);return;}
    if(!metReq(t.req))return;
    const can=credits>=t.cost;const el=document.createElement('div');
    el.style.cssText='padding:5px;border:1px solid '+(can?'#1a3a5a':'#0a0a1a')+';margin-bottom:3px;cursor:'+(can?'pointer':'default')+';opacity:'+(can?'1':'0.4')+';background:'+(can?'rgba(0,10,30,0.3)':'transparent')+';';
    el.innerHTML='<div style="font-size:9px;color:#4af;">'+t.icon+' '+t.name+'</div><div style="font-size:7px;color:#1a3a5a;">'+t.desc+'</div><div style="font-size:7px;color:var(--gold,#fc0);">'+fmt(t.cost)+'💰</div>';
    if(can)el.onclick=()=>buyTech(id);
    tp.appendChild(el);
  });
}
setInterval(gameTick,200);renderShop();drawStation();

</script>
</body>
</html>
