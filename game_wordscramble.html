<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WORD SCRAMBLE</title>
<style>
:root{--g:#3fbf3f;--gs:#6fdc6f;--gd:#2a9f2a;--r:#ff4444;--gold:#ffcc00;--bg:#000;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--g);font-family:'Courier New',monospace;display:flex;flex-direction:column;min-height:100vh;user-select:none;}
#hdr{border-bottom:2px solid var(--g);box-shadow:0 0 14px color-mix(in srgb,var(--g) 60%,transparent);padding:10px 24px;display:flex;align-items:center;flex-shrink:0;background:var(--bg);}
#hdr-title{font-size:20px;font-weight:bold;letter-spacing:5px;text-shadow:0 0 10px var(--g);flex:1;text-align:center;}
.back-btn{padding:5px 14px;border:1px solid var(--g);background:transparent;color:var(--g);font-size:10px;letter-spacing:2px;cursor:pointer;}
.back-btn:hover{background:var(--g);color:#000;}
#gw{flex:1;display:flex;justify-content:center;align-items:flex-start;padding:14px 16px 24px;}
#go{position:relative;width:960px;height:560px;border:2px solid var(--g);box-shadow:0 0 24px color-mix(in srgb,var(--g) 20%,transparent);flex-shrink:0;overflow:hidden;background:#000;}

</style>
</head>
<body>
<div id="hdr">
  <button class="back-btn" onclick="(function(){if(window.opener||window.history.length<=1)window.close();else location.href='websites.html';})()" >&#8592; BACK</button>
  <div style="flex:1;text-align:center;"><div id="hdr-title">WORD SCRAMBLE</div><div style="font-size:9px;letter-spacing:2px;color:var(--gs);">// UNSCRAMBLE IT //</div></div>
  <div style="width:90px;display:flex;justify-content:flex-end;"><button onclick="_goFS()" style="background:transparent;border:1px solid #2a4a2a;color:#3a6a3a;font-size:10px;padding:4px 8px;cursor:pointer;font-family:monospace;">&#9974; FULL</button></div>
</div>
<div id="gw"><div id="go">
<div style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:#020a02;">
  <div style="display:flex;gap:30px;align-items:center;">
    <div style="text-align:center;"><div style="font-size:8px;letter-spacing:2px;color:#2a5a2a;">SCORE</div><div id="ws-score" style="font-size:22px;color:var(--g);font-weight:bold;">0</div></div>
    <div style="text-align:center;"><div style="font-size:8px;letter-spacing:2px;color:#2a5a2a;">STREAK</div><div id="ws-streak" style="font-size:22px;color:var(--gold,#fc0);font-weight:bold;">0</div></div>
    <div style="text-align:center;"><div style="font-size:8px;letter-spacing:2px;color:#2a5a2a;">SKIPS</div><div id="ws-skips" style="font-size:22px;color:#4af;font-weight:bold;">3</div></div>
  </div>
  <div id="ws-scrambled" style="font-size:40px;letter-spacing:12px;color:var(--g);font-weight:bold;text-align:center;min-height:60px;text-shadow:0 0 20px var(--g);"></div>
  <div id="ws-hint" style="font-size:9px;letter-spacing:2px;color:#1a3a1a;"></div>
  <input id="ws-input" maxlength="20" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
    style="padding:10px 20px;background:#0a1a0a;border:2px solid var(--g);color:var(--g);font-size:20px;font-family:'Courier New',monospace;letter-spacing:4px;text-align:center;width:360px;outline:none;text-transform:uppercase;"
    placeholder="TYPE YOUR ANSWER" onkeydown="if(event.key==='Enter')wsCheck()"/>
  <div style="display:flex;gap:10px;">
    <button onclick="wsCheck()" style="padding:8px 24px;border:1px solid var(--g);background:transparent;color:var(--g);font-family:monospace;font-size:10px;letter-spacing:2px;cursor:pointer;">✓ SUBMIT</button>
    <button onclick="wsSkip()" style="padding:8px 24px;border:1px solid #4af;background:transparent;color:#4af;font-family:monospace;font-size:10px;letter-spacing:2px;cursor:pointer;">→ SKIP</button>
  </div>
  <div id="ws-msg" style="font-size:11px;letter-spacing:2px;min-height:18px;text-align:center;"></div>
</div>
</div></div>
<script>
(function(){
  var t=JSON.parse(localStorage.getItem('scpLastTheme')||localStorage.getItem('scpTheme')||'{}');
  var bg=t.bg||'#000000', ac=t.accent||'#3fbf3f';
  document.documentElement.style.setProperty('--g', ac);
  document.documentElement.style.setProperty('--bg', bg);
  function lighten(hex,amt){
    var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    r=Math.min(255,r+amt);g=Math.min(255,g+amt);b=Math.min(255,b+amt);
    return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
  }
  document.documentElement.style.setProperty('--gs', lighten(ac,50));
  document.documentElement.style.setProperty('--gd', lighten(ac,-30));
  document.body.style.backgroundColor=bg;
  document.getElementById('hdr').style.backgroundColor=bg;
  // Disable right-click on all game pages
  document.addEventListener('contextmenu', function(e){ e.preventDefault(); return false; });
  // Disable right-click drag image ghost
  document.addEventListener('dragstart', function(e){ e.preventDefault(); return false; });
})();
function _goFS(){const el=document.getElementById('go');if(!document.fullscreenElement)el.requestFullscreen().catch(()=>{});else document.exitFullscreen().catch(()=>{});}
document.addEventListener('keydown',e=>{if(e.code==='KeyF')_goFS();});
document.addEventListener('fullscreenchange',()=>{const el=document.getElementById('go');if(document.fullscreenElement===el){const s=Math.min(screen.width/960,screen.height/560);el.style.cssText='transform:scale('+s+');transform-origin:top left;position:fixed;top:'+Math.floor((screen.height-560*s)/2)+'px;left:'+Math.floor((screen.width-960*s)/2)+'px;z-index:9999;';}else{el.style.cssText='';}});

const WORDS=['python javascript html computer keyboard monitor internet software hardware database algorithm function variable boolean integer string network password security browser server client upload download file folder memory processor graphics display keyboard mouse printer router firewall encryption protocol'.split(' ').join("','")];
let wsScore=0,wsStreak=0,wsSkips=3,wsCurrent='',wsMsgT=null;
function wsScramble(w){const a=w.split('');for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}const s=a.join('');return s===w?wsScramble(w):s;}
function wsNext(){
  wsCurrent=WORDS[Math.floor(Math.random()*WORDS.length)];
  const sc=wsScramble(wsCurrent.toUpperCase());
  document.getElementById('ws-scrambled').textContent=sc;
  document.getElementById('ws-hint').textContent='HINT: '+wsCurrent.length+' letters';
  document.getElementById('ws-input').value='';
  document.getElementById('ws-input').focus();
  wsMsg('');
}
function wsCheck(){
  const ans=document.getElementById('ws-input').value.trim().toLowerCase();
  if(!ans)return;
  if(ans===wsCurrent){
    wsScore+=10+wsStreak*2;wsStreak++;
    wsMsg('✓ CORRECT! +'+(10+wsStreak*2),'#3f3');
    document.getElementById('ws-score').textContent=wsScore;
    document.getElementById('ws-streak').textContent=wsStreak;
    setTimeout(wsNext,700);
  } else {
    wsStreak=0;document.getElementById('ws-streak').textContent=0;
    wsMsg('✗ WRONG! Answer: '+wsCurrent.toUpperCase(),'#f44');
    setTimeout(wsNext,1200);
  }
}
function wsSkip(){
  if(wsSkips<=0){wsMsg('No skips left!','#f44');return;}
  wsSkips--;document.getElementById('ws-skips').textContent=wsSkips;
  wsStreak=0;document.getElementById('ws-streak').textContent=0;
  wsMsg('Skipped: '+wsCurrent.toUpperCase(),'#4af');
  setTimeout(wsNext,800);
}
function wsMsg(t,col){const el=document.getElementById('ws-msg');el.textContent=t;el.style.color=col||'var(--gold,#fc0)';}
wsNext();

</script>
</body>
</html>
