<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>REACTION TIME</title>
<style>
:root{--g:#3fbf3f;--gs:#6fdc6f;--gd:#2a9f2a;--r:#ff4444;--gold:#ffcc00;--bg:#000;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--g);font-family:'Courier New',monospace;display:flex;flex-direction:column;min-height:100vh;user-select:none;}
#hdr{border-bottom:2px solid var(--g);box-shadow:0 0 14px color-mix(in srgb,var(--g) 60%,transparent);padding:10px 24px;display:flex;align-items:center;flex-shrink:0;background:var(--bg);}
#hdr-title{font-size:20px;font-weight:bold;letter-spacing:5px;text-shadow:0 0 10px var(--g);flex:1;text-align:center;}
.back-btn{padding:5px 14px;border:1px solid var(--g);background:transparent;color:var(--g);font-size:10px;letter-spacing:2px;cursor:pointer;}
.back-btn:hover{background:var(--g);color:#000;}
#gw{flex:1;display:flex;justify-content:center;align-items:flex-start;padding:14px 16px 24px;}
#go{position:relative;width:960px;height:560px;border:2px solid var(--g);box-shadow:0 0 24px color-mix(in srgb,var(--g) 20%,transparent);flex-shrink:0;overflow:hidden;background:#000;}

</style>
</head>
<body>
<div id="hdr">
  <button class="back-btn" onclick="(function(){if(window.opener||window.history.length<=1)window.close();else location.href='websites.html';})()" >&#8592; BACK</button>
  <div style="flex:1;text-align:center;"><div id="hdr-title">REACTION TIME</div><div style="font-size:9px;letter-spacing:2px;color:var(--gs);">// HOW FAST ARE YOU? //</div></div>
  <div style="width:90px;display:flex;justify-content:flex-end;"><button onclick="_goFS()" style="background:transparent;border:1px solid #2a4a2a;color:#3a6a3a;font-size:10px;padding:4px 8px;cursor:pointer;font-family:monospace;">&#9974; FULL</button></div>
</div>
<div id="gw"><div id="go">
<div id="rt-area" style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:#020a02;gap:16px;" onclick="rtClick()">
  <div id="rt-msg" style="font-size:32px;font-weight:bold;letter-spacing:6px;color:var(--g);">CLICK TO START</div>
  <div id="rt-sub" style="font-size:11px;letter-spacing:3px;color:#2a5a2a;">WAIT FOR GREEN THEN CLICK</div>
  <div id="rt-results" style="display:flex;gap:24px;flex-wrap:wrap;justify-content:center;margin-top:20px;"></div>
  <div id="rt-avg" style="font-size:9px;letter-spacing:2px;color:#1a3a1a;"></div>
</div>
</div></div>
<script>
(function(){
  var t=JSON.parse(localStorage.getItem('scpLastTheme')||localStorage.getItem('scpTheme')||'{}');
  var bg=t.bg||'#000000', ac=t.accent||'#3fbf3f';
  document.documentElement.style.setProperty('--g', ac);
  document.documentElement.style.setProperty('--bg', bg);
  function lighten(hex,amt){
    var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    r=Math.min(255,r+amt);g=Math.min(255,g+amt);b=Math.min(255,b+amt);
    return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
  }
  document.documentElement.style.setProperty('--gs', lighten(ac,50));
  document.documentElement.style.setProperty('--gd', lighten(ac,-30));
  document.body.style.backgroundColor=bg;
  document.getElementById('hdr').style.backgroundColor=bg;
  // Disable right-click on all game pages
  document.addEventListener('contextmenu', function(e){ e.preventDefault(); return false; });
  // Disable right-click drag image ghost
  document.addEventListener('dragstart', function(e){ e.preventDefault(); return false; });
})();
function _goFS(){const el=document.getElementById('go');if(!document.fullscreenElement)el.requestFullscreen().catch(()=>{});else document.exitFullscreen().catch(()=>{});}
document.addEventListener('keydown',e=>{if(e.code==='KeyF')_goFS();});
document.addEventListener('fullscreenchange',()=>{const el=document.getElementById('go');if(document.fullscreenElement===el){const s=Math.min(screen.width/960,screen.height/560);el.style.cssText='transform:scale('+s+');transform-origin:top left;position:fixed;top:'+Math.floor((screen.height-560*s)/2)+'px;left:'+Math.floor((screen.width-960*s)/2)+'px;z-index:9999;';}else{el.style.cssText='';}});

let rtState='idle',rtStart=0,rtTimer=null,rtTimes=[];
function rtClick(){
  if(rtState==='idle'||rtState==='done'){rtBegin();}
  else if(rtState==='waiting'){clearTimeout(rtTimer);rtState='done';document.getElementById('rt-msg').textContent='TOO EARLY!';document.getElementById('rt-msg').style.color='#f44';document.getElementById('rt-area').style.background='#1a0000';setTimeout(rtReset,1000);}
  else if(rtState==='go'){
    const t=Date.now()-rtStart;rtTimes.push(t);
    document.getElementById('rt-msg').textContent=t+'ms';
    document.getElementById('rt-msg').style.color='#ff0';
    document.getElementById('rt-area').style.background='#020a02';
    document.getElementById('rt-sub').textContent='CLICK FOR NEXT';
    if(rtTimes.length>=5){
      const avg=Math.round(rtTimes.reduce((a,b)=>a+b)/rtTimes.length);
      const best=Math.min(...rtTimes);
      const grade=avg<200?'ELITE ⚡':avg<250?'EXCELLENT':avg<300?'GOOD':avg<400?'AVERAGE':'SLOW';
      document.getElementById('rt-avg').textContent='AVG: '+avg+'ms · BEST: '+best+'ms · '+grade;
      rtState='done';document.getElementById('rt-sub').textContent='CLICK TO RESTART';
    } else {
      rtState='idle';
    }
    renderResults();
  }
}
function rtBegin(){
  if(rtTimes.length>=5){rtTimes=[];document.getElementById('rt-results').innerHTML='';document.getElementById('rt-avg').textContent='';}
  rtState='waiting';
  document.getElementById('rt-msg').textContent='WAIT...';document.getElementById('rt-msg').style.color='#f44';
  document.getElementById('rt-area').style.background='#1a0000';
  document.getElementById('rt-sub').textContent='';
  rtTimer=setTimeout(()=>{
    rtState='go';rtStart=Date.now();
    document.getElementById('rt-msg').textContent='CLICK NOW!';document.getElementById('rt-msg').style.color='#3f3';
    document.getElementById('rt-area').style.background='#002000';
  },1000+Math.random()*3000);
}
function rtReset(){rtState='idle';document.getElementById('rt-msg').textContent='CLICK TO TRY AGAIN';document.getElementById('rt-msg').style.color='var(--g)';document.getElementById('rt-area').style.background='#020a02';}
function renderResults(){
  const r=document.getElementById('rt-results');r.innerHTML='';
  rtTimes.forEach((t,i)=>{const d=document.createElement('div');d.style.cssText='padding:6px 14px;border:1px solid #1a3a1a;font-size:12px;letter-spacing:1px;color:#3f3;';d.textContent='#'+(i+1)+': '+t+'ms';r.appendChild(d);});
}

</script>
</body>
</html>
