<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SNAKE</title>
<style>
:root{--g:#3fbf3f;--gs:#6fdc6f;--gd:#2a9f2a;--r:#ff4444;--gold:#ffcc00;--bg:#000;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--g);font-family:'Courier New',monospace;display:flex;flex-direction:column;min-height:100vh;user-select:none;}
#hdr{border-bottom:2px solid var(--g);box-shadow:0 0 14px color-mix(in srgb,var(--g) 60%,transparent);padding:10px 24px;display:flex;align-items:center;flex-shrink:0;background:var(--bg);}
#hdr-title{font-size:20px;font-weight:bold;letter-spacing:5px;text-shadow:0 0 10px var(--g);flex:1;text-align:center;}
.back-btn{padding:5px 14px;border:1px solid var(--g);background:transparent;color:var(--g);font-size:10px;letter-spacing:2px;cursor:pointer;}
.back-btn:hover{background:var(--g);color:#000;}
#gw{flex:1;display:flex;justify-content:center;align-items:flex-start;padding:14px 16px 24px;}
#go{position:relative;width:960px;height:560px;border:2px solid var(--g);box-shadow:0 0 24px color-mix(in srgb,var(--g) 20%,transparent);flex-shrink:0;overflow:hidden;background:#000;}

</style>
</head>
<body>
<div id="hdr">
  <button class="back-btn" onclick="(function(){if(window.opener||window.history.length<=1)window.close();else location.href='websites.html';})()" >&#8592; BACK</button>
  <div style="flex:1;text-align:center;"><div id="hdr-title">SNAKE</div><div style="font-size:9px;letter-spacing:2px;color:var(--gs);">// CLASSIC //</div></div>
  <div style="width:90px;display:flex;justify-content:flex-end;"><button onclick="_goFS()" style="background:transparent;border:1px solid #2a4a2a;color:#3a6a3a;font-size:10px;padding:4px 8px;cursor:pointer;font-family:monospace;">&#9974; FULL</button></div>
</div>
<div id="gw"><div id="go"><canvas id="c" width="960" height="560"></canvas></div></div>
<script>
(function(){
  var t=JSON.parse(localStorage.getItem('scpLastTheme')||localStorage.getItem('scpTheme')||'{}');
  var bg=t.bg||'#000000', ac=t.accent||'#3fbf3f';
  document.documentElement.style.setProperty('--g', ac);
  document.documentElement.style.setProperty('--bg', bg);
  function lighten(hex,amt){
    var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    r=Math.min(255,r+amt);g=Math.min(255,g+amt);b=Math.min(255,b+amt);
    return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
  }
  document.documentElement.style.setProperty('--gs', lighten(ac,50));
  document.documentElement.style.setProperty('--gd', lighten(ac,-30));
  document.body.style.backgroundColor=bg;
  document.getElementById('hdr').style.backgroundColor=bg;
  // Disable right-click on all game pages
  document.addEventListener('contextmenu', function(e){ e.preventDefault(); return false; });
  // Disable right-click drag image ghost
  document.addEventListener('dragstart', function(e){ e.preventDefault(); return false; });
})();
function _goFS(){const el=document.getElementById('go');if(!document.fullscreenElement)el.requestFullscreen().catch(()=>{});else document.exitFullscreen().catch(()=>{});}
document.addEventListener('keydown',e=>{if(e.code==='KeyF')_goFS();});
document.addEventListener('fullscreenchange',()=>{const el=document.getElementById('go');if(document.fullscreenElement===el){const s=Math.min(screen.width/960,screen.height/560);el.style.cssText='transform:scale('+s+');transform-origin:top left;position:fixed;top:'+Math.floor((screen.height-560*s)/2)+'px;left:'+Math.floor((screen.width-960*s)/2)+'px;z-index:9999;';}else{el.style.cssText='';}});

const cv=document.getElementById('c'),cx=cv.getContext('2d');
const W=960,H=560,SZ=20,COLS=48,ROWS=28;
let snake,dir,food,score,hi=0,running=false,loop,speed=120,grow=0;
function init(){
  snake=[{x:24,y:14},{x:23,y:14},{x:22,y:14}];
  dir={x:1,y:0};food=spawnFood();score=0;grow=0;speed=120;running=true;
  clearInterval(loop);loop=setInterval(tick,speed);draw();
}
function spawnFood(){
  let f;
  do{f={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)};}
  while(snake.some(s=>s.x===f.x&&s.y===f.y));
  return f;
}
function tick(){
  const h={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(h.x<0||h.x>=COLS||h.y<0||h.y>=ROWS||snake.some(s=>s.x===h.x&&s.y===h.y)){
    clearInterval(loop);running=false;draw();return;
  }
  snake.unshift(h);
  if(h.x===food.x&&h.y===food.y){
    score+=10;if(score>hi)hi=score;food=spawnFood();grow+=2;
    if(score%50===0){speed=Math.max(60,speed-8);clearInterval(loop);loop=setInterval(tick,speed);}
  } else if(grow>0){grow--;}
  else snake.pop();
  draw();
}
function draw(){
  cx.fillStyle='#050f05';cx.fillRect(0,0,W,H);
  // Grid
  cx.strokeStyle='rgba(0,60,0,0.3)';cx.lineWidth=0.5;
  for(let x=0;x<COLS;x++)for(let y=0;y<ROWS;y++){cx.strokeRect(x*SZ,y*SZ,SZ,SZ);}
  // Food
  const fx=food.x*SZ+SZ/2,fy=food.y*SZ+SZ/2;
  const fg=cx.createRadialGradient(fx,fy,0,fx,fy,SZ*0.6);
  fg.addColorStop(0,'#ff4444');fg.addColorStop(1,'#880000');
  cx.fillStyle=fg;cx.beginPath();cx.arc(fx,fy,SZ*0.4,0,Math.PI*2);cx.fill();
  cx.fillStyle='rgba(255,255,100,0.6)';cx.beginPath();cx.arc(fx-2,fy-2,3,0,Math.PI*2);cx.fill();
  // Snake
  snake.forEach((s,i)=>{
    const x=s.x*SZ,y=s.y*SZ;
    const g=cx.createLinearGradient(x,y,x+SZ,y+SZ);
    if(i===0){g.addColorStop(0,'#88ff88');g.addColorStop(1,'#44cc44');}
    else{const t=i/snake.length;g.addColorStop(0,`hsl(${120-t*40},80%,${50-t*15}%)`);g.addColorStop(1,`hsl(${120-t*40},70%,${40-t*15}%)`);}
    cx.fillStyle=g;cx.beginPath();cx.roundRect(x+1,y+1,SZ-2,SZ-2,i===0?4:2);cx.fill();
    if(i===0){cx.fillStyle='#000';cx.beginPath();const ey=dir.y===1?3:dir.y===-1?SZ-5:SZ/2;const ex1=dir.x===1?SZ-5:dir.x===-1?3:SZ/3;const ex2=dir.x===1?SZ-5:dir.x===-1?3:SZ*2/3;cx.arc(x+ex1,y+ey,2,0,Math.PI*2);cx.arc(x+ex2,y+ey,2,0,Math.PI*2);cx.fill();}
  });
  // HUD
  cx.fillStyle='rgba(0,0,0,0.6)';cx.fillRect(0,0,W,28);
  cx.fillStyle='#3f3';cx.font='bold 14px Courier New';cx.textAlign='left';cx.fillText('SCORE: '+score,12,18);
  cx.textAlign='right';cx.fillText('BEST: '+hi,W-12,18);
  cx.textAlign='center';cx.fillStyle='rgba(0,180,0,0.4)';cx.fillText('SNAKE — ARROWS/WASD · F FULLSCREEN',W/2,18);
  if(!running&&score>0||!running&&snake.length===3){
    cx.fillStyle='rgba(0,0,0,0.8)';cx.fillRect(W/2-160,H/2-60,320,120);
    cx.strokeStyle='#3f3';cx.lineWidth=2;cx.strokeRect(W/2-160,H/2-60,320,120);
    cx.fillStyle='#f44';cx.font='bold 28px Courier New';cx.textAlign='center';cx.fillText('GAME OVER',W/2,H/2-20);
    cx.fillStyle='#3f3';cx.font='14px Courier New';cx.fillText('SCORE: '+score+'  BEST: '+hi,W/2,H/2+10);
    cx.fillStyle='#2a5a2a';cx.fillText('PRESS SPACE TO RESTART',W/2,H/2+36);
  } else if(!running){
    cx.fillStyle='rgba(0,0,0,0.7)';cx.fillRect(W/2-180,H/2-50,360,100);
    cx.strokeStyle='#3f3';cx.lineWidth=2;cx.strokeRect(W/2-180,H/2-50,360,100);
    cx.fillStyle='#3f3';cx.font='bold 28px Courier New';cx.textAlign='center';cx.fillText('SNAKE',W/2,H/2-10);
    cx.fillStyle='#2a5a2a';cx.font='12px Courier New';cx.fillText('PRESS SPACE TO START',W/2,H/2+22);
  }
}
const DIRS={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},KeyW:{x:0,y:-1},KeyS:{x:0,y:1},KeyA:{x:-1,y:0},KeyD:{x:1,y:0}};
window.addEventListener('keydown',e=>{
  if(e.code==='Space'){if(!running)init();e.preventDefault();return;}
  const d=DIRS[e.code];if(!d)return;
  if(d.x!==-dir.x||d.y!==-dir.y){dir=d;}e.preventDefault();
});
draw();

</script>
</body>
</html>
