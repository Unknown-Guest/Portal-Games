<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SUDOKU</title>
<style>
:root{--g:#3fbf3f;--gs:#6fdc6f;--gd:#2a9f2a;--r:#ff4444;--gold:#ffcc00;--bg:#000;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--g);font-family:'Courier New',monospace;display:flex;flex-direction:column;min-height:100vh;user-select:none;}
#hdr{border-bottom:2px solid var(--g);box-shadow:0 0 14px color-mix(in srgb,var(--g) 60%,transparent);padding:10px 24px;display:flex;align-items:center;flex-shrink:0;background:var(--bg);}
#hdr-title{font-size:20px;font-weight:bold;letter-spacing:5px;text-shadow:0 0 10px var(--g);flex:1;text-align:center;}
.back-btn{padding:5px 14px;border:1px solid var(--g);background:transparent;color:var(--g);font-size:10px;letter-spacing:2px;cursor:pointer;}
.back-btn:hover{background:var(--g);color:#000;}
#gw{flex:1;display:flex;justify-content:center;align-items:flex-start;padding:14px 16px 24px;}
#go{position:relative;width:960px;height:560px;border:2px solid var(--g);box-shadow:0 0 24px color-mix(in srgb,var(--g) 20%,transparent);flex-shrink:0;overflow:hidden;background:#000;}

</style>
</head>
<body>
<div id="hdr">
  <button class="back-btn" onclick="(function(){if(window.opener||window.history.length<=1)window.close();else location.href='websites.html';})()" >&#8592; BACK</button>
  <div style="flex:1;text-align:center;"><div id="hdr-title">SUDOKU</div><div style="font-size:9px;letter-spacing:2px;color:var(--gs);">// NUMBER LOGIC //</div></div>
  <div style="width:90px;display:flex;justify-content:flex-end;"><button onclick="_goFS()" style="background:transparent;border:1px solid #2a4a2a;color:#3a6a3a;font-size:10px;padding:4px 8px;cursor:pointer;font-family:monospace;">&#9974; FULL</button></div>
</div>
<div id="gw"><div id="go">
<div style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:#020a02;">
  <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap;justify-content:center;">
    <div style="display:flex;gap:6px;">
      <button onclick="sudNew('easy')" id="btn-easy" style="padding:4px 14px;border:1px solid #44ff44;background:transparent;color:#44ff44;font-family:monospace;font-size:9px;letter-spacing:2px;cursor:pointer;">EASY</button>
      <button onclick="sudNew('medium')" id="btn-med" style="padding:4px 14px;border:1px solid var(--gold,#fc0);background:transparent;color:var(--gold,#fc0);font-family:monospace;font-size:9px;letter-spacing:2px;cursor:pointer;">MEDIUM</button>
      <button onclick="sudNew('hard')" id="btn-hard" style="padding:4px 14px;border:1px solid #ff4444;background:transparent;color:#ff4444;font-family:monospace;font-size:9px;letter-spacing:2px;cursor:pointer;">HARD</button>
    </div>
    <div id="sud-timer" style="font-size:12px;letter-spacing:3px;color:var(--g);min-width:52px;text-align:center;">0:00</div>
    <button onclick="sudCheck()" style="padding:4px 12px;border:1px solid var(--g);background:transparent;color:var(--g);font-family:monospace;font-size:9px;cursor:pointer;">CHECK</button>
    <button onclick="sudHint()" style="padding:4px 12px;border:1px solid #4af;background:transparent;color:#4af;font-family:monospace;font-size:9px;cursor:pointer;">HINT <span id="hint-cnt" style="opacity:0.6;">(3)</span></button>
  </div>
  <div id="sud-grid" style="display:grid;grid-template-columns:repeat(9,48px);gap:1px;background:#1a3a1a;border:2px solid var(--g);border-radius:2px;"></div>
  <div id="sud-numpad" style="display:flex;gap:4px;"></div>
  <div id="sud-msg" style="font-size:9px;letter-spacing:2px;color:var(--gold,#fc0);min-height:16px;text-align:center;"></div>
</div>
</div></div>
<script>
(function(){
  var t=JSON.parse(localStorage.getItem('scpLastTheme')||localStorage.getItem('scpTheme')||'{}');
  var bg=t.bg||'#000000', ac=t.accent||'#3fbf3f';
  document.documentElement.style.setProperty('--g', ac);
  document.documentElement.style.setProperty('--bg', bg);
  function lighten(hex,amt){
    var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    r=Math.min(255,r+amt);g=Math.min(255,g+amt);b=Math.min(255,b+amt);
    return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
  }
  document.documentElement.style.setProperty('--gs', lighten(ac,50));
  document.documentElement.style.setProperty('--gd', lighten(ac,-30));
  document.body.style.backgroundColor=bg;
  document.getElementById('hdr').style.backgroundColor=bg;
  // Disable right-click on all game pages
  document.addEventListener('contextmenu', function(e){ e.preventDefault(); return false; });
  // Disable right-click drag image ghost
  document.addEventListener('dragstart', function(e){ e.preventDefault(); return false; });
})();
function _goFS(){const el=document.getElementById('go');if(!document.fullscreenElement)el.requestFullscreen().catch(()=>{});else document.exitFullscreen().catch(()=>{});}
document.addEventListener('keydown',e=>{if(e.code==='KeyF')_goFS();});
document.addEventListener('fullscreenchange',()=>{const el=document.getElementById('go');if(document.fullscreenElement===el){const s=Math.min(screen.width/960,screen.height/560);el.style.cssText='transform:scale('+s+');transform-origin:top left;position:fixed;top:'+Math.floor((screen.height-560*s)/2)+'px;left:'+Math.floor((screen.width-960*s)/2)+'px;z-index:9999;';}else{el.style.cssText='';}});

// Sudoku generator using backtracking
let puzzle,solution,selected=null,fixed2=[],errors2=[],hintsLeft=3,timerS=0,timerInt=null,curDiff='easy';

function sudSolve(g){
  for(let r=0;r<9;r++)for(let c=0;c<9;c++){
    if(g[r][c])continue;
    for(let n=1;n<=9;n++){
      if(sudValid(g,r,c,n)){g[r][c]=n;if(sudSolve(g))return true;g[r][c]=0;}
    }
    return false;
  }
  return true;
}
function sudValid(g,r,c,n){
  for(let i=0;i<9;i++){if(g[r][i]===n||g[i][c]===n)return false;}
  const br=Math.floor(r/3)*3,bc=Math.floor(c/3)*3;
  for(let i=0;i<3;i++)for(let j=0;j<3;j++){if(g[br+i][bc+j]===n)return false;}
  return true;
}
function sudGen(){
  const g=Array(9).fill(0).map(()=>Array(9).fill(0));
  // Fill diagonal 3x3 boxes first (independent)
  [0,3,6].forEach(b=>{
    const nums=[1,2,3,4,5,6,7,8,9].sort(()=>Math.random()-0.5);
    let k=0;for(let i=0;i<3;i++)for(let j=0;j<3;j++)g[b+i][b+j]=nums[k++];
  });
  sudSolve(g);
  return g;
}
function sudNew(diff){
  curDiff=diff;
  ['easy','med','hard'].forEach(d=>{
    const b=document.getElementById('btn-'+d);if(!b)return;
    const cols={easy:'#44ff44',med:'var(--gold,#fc0)',hard:'#ff4444'};
    b.style.background=d===diff?cols[d]:'transparent';b.style.color=d===diff?'#000':cols[d];
  });
  // Generate full solution
  solution=sudGen();
  puzzle=solution.map(r=>[...r]);
  // Remove cells
  const remove={easy:35,medium:45,hard:55}[diff]||40;
  const cells=[];for(let r=0;r<9;r++)for(let c=0;c<9;c++)cells.push([r,c]);
  cells.sort(()=>Math.random()-0.5);
  for(let i=0;i<remove;i++){const[r,c]=cells[i];puzzle[r][c]=0;}
  fixed2=puzzle.map(r=>r.map(v=>v!==0));
  errors2=Array(9).fill(0).map(()=>Array(9).fill(false));
  selected=null;hintsLeft=3;
  document.getElementById('hint-cnt').textContent='('+hintsLeft+')';
  clearInterval(timerInt);timerS=0;
  timerInt=setInterval(()=>{timerS++;const m=Math.floor(timerS/60),s2=timerS%60;document.getElementById('sud-timer').textContent=m+':'+(s2<10?'0':'')+s2;},1000);
  sudMsg('');render2();
}
function sudSel(n){
  if(selected===null)return;
  const[r,c]=selected;if(fixed2[r][c])return;
  puzzle[r][c]=n;errors2[r][c]=n!==0&&n!==solution[r][c];
  if(puzzle.flat().join('')===solution.flat().join('')){
    clearInterval(timerInt);
    sudMsg('✓ SOLVED in '+document.getElementById('sud-timer').textContent+' · '+hintsLeft+' hints left');
  }
  render2();
}
function sudHint(){
  if(hintsLeft<=0){sudMsg('No hints left!');return;}
  if(selected===null){sudMsg('Select a cell first');return;}
  const[r,c]=selected;if(fixed2[r][c])return;
  puzzle[r][c]=solution[r][c];errors2[r][c]=false;hintsLeft--;
  document.getElementById('hint-cnt').textContent='('+hintsLeft+')';
  render2();
}
function sudCheck(){
  let wrong=0;
  puzzle.forEach((row,r)=>row.forEach((v,c)=>{
    if(v&&v!==solution[r][c]){errors2[r][c]=true;wrong++;}else{errors2[r][c]=false;}
  }));
  sudMsg(wrong?wrong+' errors highlighted':'Looking good! ✓');render2();
}
function sudMsg(t){document.getElementById('sud-msg').textContent=t;}
function render2(){
  const g=document.getElementById('sud-grid');g.innerHTML='';
  if(!puzzle){g.innerHTML='<div style="padding:20px;color:#2a5a2a;font-size:11px;letter-spacing:2px;grid-column:1/-1;">CHOOSE A DIFFICULTY</div>';return;}
  puzzle.forEach((row,r)=>row.forEach((v,c)=>{
    const cell=document.createElement('div');
    const isSel=selected&&selected[0]===r&&selected[1]===c;
    const isRel=selected&&(selected[0]===r||selected[1]===c||(Math.floor(selected[0]/3)===Math.floor(r/3)&&Math.floor(selected[1]/3)===Math.floor(c/3)));
    const isSameNum=selected&&puzzle[selected[0]][selected[1]]&&v&&v===puzzle[selected[0]][selected[1]];
    cell.style.cssText='width:48px;height:48px;display:flex;align-items:center;justify-content:center;font-size:'+(v?'20px':'14px')+';font-family:Courier New;font-weight:bold;cursor:pointer;background:'+(isSel?'#1a5a1a':isSameNum?'rgba(0,80,0,0.5)':isRel?'rgba(0,40,0,0.3)':'#050f05')+';color:'+(fixed2[r][c]?'var(--g)':errors2[r][c]?'#ff4444':'#66bbff')+(isSel?';box-shadow:inset 0 0 0 2px var(--g)':'')+';border-right:'+(c%3===2&&c<8?'2px solid var(--g)':'1px solid #122212')+';border-bottom:'+(r%3===2&&r<8?'2px solid var(--g)':'1px solid #122212')+';transition:background .08s;';
    cell.textContent=v||'';
    cell.onclick=()=>{selected=[r,c];render2();};
    g.appendChild(cell);
  }));
  // Numpad
  const np=document.getElementById('sud-numpad');np.innerHTML='';
  const clr=document.createElement('div');clr.style.cssText='width:40px;height:40px;display:flex;align-items:center;justify-content:center;border:1px solid #1a3a1a;color:#444;cursor:pointer;font-size:16px;background:rgba(0,0,0,0.5);';clr.textContent='✕';clr.onclick=()=>sudSel(0);np.appendChild(clr);
  for(let n=1;n<=9;n++){const d=document.createElement('div');const cnt=puzzle?puzzle.flat().filter(v=>v===n).length:0;d.style.cssText='width:40px;height:40px;display:flex;align-items:center;justify-content:center;border:1px solid '+(cnt>=9?'#1a1a1a':'#1a3a1a')+';color:'+(cnt>=9?'#222':'var(--g)')+';cursor:pointer;font-size:18px;font-weight:bold;background:rgba(0,20,0,0.4);position:relative;';d.textContent=n;if(cnt>=9)d.style.opacity='0.3';d.onclick=()=>sudSel(n);np.appendChild(d);}
}
window.addEventListener('keydown',e=>{
  if(e.key>='1'&&e.key<='9'){sudSel(+e.key);return;}
  if(e.key==='Backspace'||e.key==='Delete'){sudSel(0);return;}
  const moves={ArrowUp:[-1,0],ArrowDown:[1,0],ArrowLeft:[0,-1],ArrowRight:[0,1]};
  if(moves[e.code]&&selected){const[dr,dc]=moves[e.code];selected=[Math.max(0,Math.min(8,selected[0]+dr)),Math.max(0,Math.min(8,selected[1]+dc))];render2();e.preventDefault();}
});
render2();

</script>
</body>
</html>
