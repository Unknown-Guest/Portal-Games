<!DOCTYPE html>
<html>
<head>
<title>Chess Puzzle Manager</title>
<meta charset="utf-8">
<script>(function(){
  var t=JSON.parse(localStorage.getItem('scpLastTheme')||localStorage.getItem('scpTheme')||'{}');
  var h=/^#[0-9a-fA-F]{6}$/;
  if(t.bg&&h.test(t.bg))document.documentElement.style.setProperty('--bg',t.bg);
  if(t.accent&&h.test(t.accent))document.documentElement.style.setProperty('--g',t.accent);
})();</script>
<style>
:root{--g:#3fbf3f;--bg:#0a0a0a;--r:#ff3f3f;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);background-image:radial-gradient(circle,rgba(63,191,63,0.03) 1px,transparent 1px);background-size:24px 24px;color:var(--g);font-family:monospace;font-size:12px;letter-spacing:1px;min-height:100vh;}
#page{max-width:900px;margin:0 auto;padding:20px;}
h1{font-size:16px;letter-spacing:6px;text-shadow:0 0 14px var(--g);margin-bottom:4px;}
.sub{font-size:9px;letter-spacing:3px;color:#3a5a3a;margin-bottom:24px;}
#gate{display:flex;flex-direction:column;align-items:center;gap:16px;margin-top:0;min-height:100vh;justify-content:center;}
#gate-box{border:2px solid var(--g);padding:40px 48px;display:flex;flex-direction:column;align-items:center;gap:16px;background:#071207;box-shadow:0 0 60px rgba(0,180,0,0.25);}
#gate-icon{font-size:32px;letter-spacing:8px;color:var(--g);text-shadow:0 0 20px var(--g);}
#gate-title{font-size:14px;letter-spacing:6px;color:var(--g);}
#gate-sub{font-size:9px;letter-spacing:3px;color:#2a4a2a;margin-top:-8px;}
#gate input{background:#000;border:1px solid #2a4a2a;color:#eee;padding:12px 20px;font-size:14px;letter-spacing:4px;width:260px;text-align:center;font-family:monospace;outline:none;transition:border-color .2s;}
#gate input:focus{border-color:var(--g);box-shadow:0 0 10px rgba(0,180,0,0.15);}
.btn{background:transparent;border:1px solid var(--g);color:var(--g);padding:7px 18px;font-size:10px;letter-spacing:2px;cursor:pointer;}
.btn:hover{background:var(--g);color:#000;}
.btn.red{border-color:var(--r);color:var(--r);}.btn.red:hover{background:var(--r);color:#000;}
.btn.gold{border-color:#ffaa00;color:#ffaa00;}.btn.gold:hover{background:#ffaa00;color:#000;}
.err{font-size:10px;color:var(--r);min-height:14px;}
#main{display:none;}
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
#puzzle-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
.pcard{border:1px solid #1a2a1a;padding:12px 16px;cursor:pointer;display:flex;gap:12px;align-items:center;}
.pcard:hover{border-color:var(--g);}.pcard.active{border-color:var(--g);background:#050f05;}
.pnum{font-size:11px;color:#3a5a3a;width:24px;flex-shrink:0;}
.pdesc{flex:1;font-size:11px;letter-spacing:2px;}
.pmeta{font-size:9px;color:#3a5a3a;text-align:right;line-height:1.8;}
.empty{font-size:11px;color:#2a3a2a;letter-spacing:2px;padding:20px;text-align:center;}
#editor{border:1px solid #1a2a1a;padding:20px;display:none;}
#editor.open{display:block;}
.etitle{font-size:11px;letter-spacing:4px;color:#ffaa00;margin-bottom:16px;}
.field{margin-bottom:12px;}
.lbl{font-size:9px;letter-spacing:2px;color:#ffaa00;margin-bottom:3px;}
.hint{color:#333;margin-left:6px;}
input.inp,textarea.inp,select.inp{background:#000;border:1px solid #333;color:#eee;padding:8px 10px;font-size:11px;letter-spacing:1px;width:100%;font-family:monospace;}
textarea.inp{resize:vertical;line-height:1.8;}
.tray{display:flex;gap:4px;flex-wrap:wrap;padding:6px;background:#0a0a0a;border:1px solid #1a2a1a;width:272px;}
.tl{font-size:9px;letter-spacing:2px;color:#3a5a3a;width:100%;}
.ep{width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;border-radius:4px;border:1px solid transparent;user-select:none;}
.ep:hover{background:#1a2a1a;}.ep.sel{background:#2a4a2a;border-color:var(--g);}.ep.er{font-size:14px;color:#555;}
#ed-board{border:2px solid #444;display:inline-block;}
.erow{display:flex;}
.esq{width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;position:relative;user-select:none;}
.esq.lt{background:#b58863;}.esq.dk{background:#f0d9b5;}.esq:hover{filter:brightness(1.12);}
.pw{color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.9);}
.pb{color:#1a1208;text-shadow:0 1px 1px rgba(255,255,255,.4);}
.rk{position:absolute;top:1px;left:2px;font-size:7px;color:rgba(0,0,0,.45);pointer-events:none;}
.esq.dk .rk{color:rgba(255,255,255,.45);}
.fl{position:absolute;bottom:1px;right:2px;font-size:7px;color:rgba(0,0,0,.45);pointer-events:none;}
.esq.dk .fl{color:rgba(255,255,255,.45);}
#smsg{font-size:10px;min-height:16px;margin-top:8px;}
.ebtns{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;}
</style>
</head>
<body>
<div id="page">
<div id="gate" style="display:flex;">
  <div id="gate-box">
    <div id="gate-icon">&#9812;</div>
    <div id="gate-title">CHESS PUZZLES</div>
    <div id="gate-sub">PUZZLE MANAGER</div>
    <input id="gc" type="password" placeholder="ACCESS CODE" autocomplete="off"/>
    <button class="btn" style="width:200px;padding:10px;" onclick="gate()">UNLOCK</button>
    <div id="ge" class="err"></div>
  </div>
</div>
<div id="main">
  <div class="toolbar">
    <span id="pcount" style="font-size:10px;color:#3a5a3a;">0 PUZZLES</span>
    <button class="btn gold" onclick="openNew()">+ NEW PUZZLE</button>
    <button class="btn" onclick="load()" style="margin-left:auto;">&#8635; REFRESH</button>
  </div>
  <div id="puzzle-list"></div>
  <div id="editor">
    <div class="etitle" id="etitle">NEW PUZZLE</div>
    <div style="display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start;">
      <div style="display:flex;flex-direction:column;gap:6px;align-items:center;">
        <div class="tray" id="bt"><div class="tl">BLACK</div></div>
        <div id="ed-board"></div>
        <div class="tray" id="wt"><div class="tl">WHITE</div></div>
        <div style="font-size:9px;color:#333;letter-spacing:1px;text-align:center;max-width:272px;">Click piece then square to place | Click piece on board to remove</div>
        <div style="display:flex;gap:8px;margin-top:4px;">
          <button class="btn" onclick="edClear()">CLEAR</button>
          <button class="btn" onclick="edReset()">RESET</button>
        </div>
      </div>
      <div style="flex:1;min-width:220px;display:flex;flex-direction:column;gap:0;">
        <div class="field"><div class="lbl">DESCRIPTION</div><input id="fd" class="inp" type="text" placeholder="e.g. MATE IN 1" maxlength="60"/></div>
        <div class="field">
          <div class="lbl">SOLUTION MOVES <span class="hint">(one per line, e.g. d1h5)</span></div>
          <textarea id="fm" class="inp" rows="5" placeholder="d1h5&#10;e7e5&#10;f1c4"></textarea>
          <div style="font-size:9px;color:#333;margin-top:2px;">Odd lines = player moves | Even lines = opponent replies</div>
        </div>
        <div style="display:flex;gap:10px;">
          <div class="field" style="flex:1;"><div class="lbl">TURN</div><select id="ft" class="inp"><option value="w">White</option><option value="b">Black</option></select></div>
          <div class="field" style="flex:1;"><div class="lbl">POINTS</div><input id="fp" class="inp" type="number" value="100" min="50" max="500" step="50"/></div>
          <div class="field" style="flex:1;"><div class="lbl">TIMER (s)</div><input id="fti" class="inp" type="number" value="180" min="30" max="600" step="30"/></div>
        </div>
        <div id="smsg"></div>
        <div class="ebtns">
          <button class="btn gold" id="savebtn" onclick="save()">SAVE</button>
          <button class="btn red" id="dbtn" onclick="del()" style="display:none;">DELETE</button>
          <button class="btn" onclick="closeEd()">CANCEL</button>
        </div>
      </div>
    </div>
  </div>
</div>
</div>
<script>
// SUPABASE
const SB_URL = 'https://esgunecokerphecjrtjw.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzZ3VuZWNva2VycGhlY2pydGp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2ODQ1ODksImV4cCI6MjA4ODI2MDU4OX0.RUr9owzkstT75xCUMQ6Ru9bQC_im99gnv2AlYwFVrwI';

async function sbReq(method, path, body = null, params = '') {
    const url = `${SB_URL}/rest/v1/${path}${params ? '?' + params : ''}`;
    const opts = {
        method,
        headers: {
            'apikey': SB_KEY,
            'Authorization': 'Bearer ' + SB_KEY,
            'Content-Type': 'application/json',
            'Prefer': method === 'POST' ? 'return=representation' : 'return=representation'
        }
    };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(url, opts);
    if (!res.ok) {
        const err = await res.text();
        console.error('Supabase error:', err);
        return null;
    }
    const text = await res.text();
    return text ? JSON.parse(text) : [];
}

async function dbGetChessPuzzles() {
    return await sbReq('GET', 'chess_puzzles', null, 'deleted=eq.false&order=created_at.asc') || [];
}
async function dbCreateChessPuzzle(puzzle) {
    return await sbReq('POST', 'chess_puzzles', puzzle);
}
async function dbUpdateChessPuzzle(id, updates) {
    return await sbReq('PATCH', 'chess_puzzles', updates, 'id=eq.' + id);
}
async function dbDeleteChessPuzzle(id) {
    return await sbReq('PATCH', 'chess_puzzles', {deleted:true}, 'id=eq.' + id);
}
</script>
<script>

const SYM={wK:'\u2654',wQ:'\u2655',wR:'\u2656',wB:'\u2657',wN:'\u2658',wP:'\u2659',bK:'\u265a',bQ:'\u265b',bR:'\u265c',bB:'\u265d',bN:'\u265e',bP:'\u265f'};
const F=['a','b','c','d','e','f','g','h'];
const PCS=['K','Q','R','B','N','P'];

function a2i(sq){const c=sq.charCodeAt(0)-97,r=8-parseInt(sq[1]);return(c>=0&&c<=7&&r>=0&&r<=7)?r*8+c:-1;}
function fen2board(fen){
  const rows=fen.split(' ')[0].split('/');if(rows.length!==8)return null;
  const b=Array(64).fill(null);
  const M={k:'bK',q:'bQ',r:'bR',b:'bB',n:'bN',p:'bP',K:'wK',Q:'wQ',R:'wR',B:'wB',N:'wN',P:'wP'};
  for(let r=0;r<8;r++){let c=0;for(const ch of rows[r]){if(ch>='1'&&ch<='8')c+=+ch;else{b[r*8+c]=M[ch]||null;c++;}}}
  return b;
}
function board2fen(){
  const S={wK:'K',wQ:'Q',wR:'R',wB:'B',wN:'N',wP:'P',bK:'k',bQ:'q',bR:'r',bB:'b',bN:'n',bP:'p'};
  let f='';
  for(let r=0;r<8;r++){let e=0;for(let c=0;c<8;c++){const p=edB[r*8+c];if(!p)e++;else{if(e){f+=e;e=0;}f+=S[p];}}if(e)f+=e;if(r<7)f+='/';}
  return f+' '+document.getElementById('ft').value+' - - 0 1';
}

function gate(){
  const code=document.getElementById('gc').value.trim();
  // Check multiple storage locations (works across Website and Games folders)
  const valid=localStorage.getItem('_scp_puzzle_code')||
               sessionStorage.getItem('_scp_puzzle_code')||
               'CHESS2025';
  if(code.toUpperCase()!==valid.toUpperCase()){
    document.getElementById('ge').textContent='Incorrect code.';
    document.getElementById('gc').value='';
    document.getElementById('gc').focus();
    return;
  }
  // Cache the code so it works in this folder going forward
  sessionStorage.setItem('_scp_puzzle_code', code.toUpperCase());
  sessionStorage.setItem('pmgr','1');
  document.getElementById('gate').style.display='none';
  const mainEl=document.getElementById('main');
  mainEl.style.display='block';
  mainEl.style.opacity='0';
  document.getElementById('puzzle-list').innerHTML='<div class="empty" style="color:#2a4a2a;letter-spacing:2px;">LOADING PUZZLES...</div>';
  setTimeout(()=>{ mainEl.style.transition='opacity 0.3s'; mainEl.style.opacity='1'; },50);
  load();
}
document.getElementById('gc').addEventListener('keydown',e=>{if(e.key==='Enter')gate();});

let allP=[],editId=null;
// Always show gate - enter code each session for security

async function load(){
  const list=document.getElementById('puzzle-list');
  list.innerHTML='<div class="empty">LOADING...</div>';
  try{allP=await dbGetChessPuzzles()||[];}catch(e){allP=[];}
  document.getElementById('pcount').textContent=allP.length+' PUZZLE'+(allP.length!==1?'S':'');
  if(!allP.length){list.innerHTML='<div class="empty">NO PUZZLES YET</div>';return;}
  list.innerHTML='';
  allP.forEach((p,i)=>{
    const d=document.createElement('div');d.className='pcard';d.dataset.id=p.id;
    let mc=1;try{mc=Math.ceil(JSON.parse(p.solution||'[]').length/2);}catch(e){}
    d.innerHTML='<div class="pnum">'+(i+1)+'</div><div class="pdesc">'+p.description+'</div><div class="pmeta">'+mc+' move'+(mc!==1?'s':'')+'<br>'+p.points+'pts   '+(p.timer_seconds||180)+'s<br><span style="color:#1a3a1a;">'+(p.turn==='w'?'White':'Black')+' to move</span></div>';
    d.onclick=()=>openEdit(p);list.appendChild(d);
  });
}

let edB=Array(64).fill(null),edSel=null;
function buildTray(col){
  const id=col==='w'?'wt':'bt',tray=document.getElementById(id),lbl=tray.querySelector('.tl');
  tray.innerHTML='';tray.appendChild(lbl);
  PCS.forEach(t=>{const k=col+t,el=document.createElement('div');el.className='ep';el.dataset.p=k;el.textContent=SYM[k];el.style.color=col==='w'?'#fff':'#111';el.style.textShadow=col==='w'?'0 1px 2px rgba(0,0,0,.9)':'0 1px 1px rgba(255,255,255,.4)';el.onclick=()=>selP(k);tray.appendChild(el);});
  const er=document.createElement('div');er.className='ep er';er.dataset.p='x';er.textContent='\u2715';er.onclick=()=>selP('x');tray.appendChild(er);
}
function selP(k){edSel=(edSel===k)?null:k;document.querySelectorAll('.ep').forEach(el=>el.classList.toggle('sel',el.dataset.p===edSel));}
function drawBoard(){
  const b=document.getElementById('ed-board');b.innerHTML='';
  for(let r=0;r<8;r++){const row=document.createElement('div');row.className='erow';for(let c=0;c<8;c++){const s=r*8+c,lt=(r+c)%2===0,sq=document.createElement('div');sq.className='esq '+(lt?'lt':'dk');const p=edB[s];if(p){const sp=document.createElement('span');sp.textContent=SYM[p];sp.className=p[0]==='w'?'pw':'pb';sq.appendChild(sp);}if(c===0){const l=document.createElement('span');l.className='rk';l.textContent=8-r;sq.appendChild(l);}if(r===7){const l=document.createElement('span');l.className='fl';l.textContent=F[c];sq.appendChild(l);}sq.onclick=()=>edClick(s);row.appendChild(sq);}b.appendChild(row);}
}
function edClick(s){if(edSel==='x'){edB[s]=null;drawBoard();return;}if(edSel){edB[s]=edSel;drawBoard();return;}if(edB[s]){edB[s]=null;drawBoard();}}
function edClear(){edB=Array(64).fill(null);drawBoard();}
function edReset(){edB=Array(64).fill(null);const bk=['R','N','B','Q','K','B','N','R'];for(let c=0;c<8;c++){edB[c]='b'+bk[c];edB[8+c]='bP';edB[48+c]='wP';edB[56+c]='w'+bk[c];}drawBoard();}

function openNew(){
  editId=null;document.getElementById('etitle').textContent='NEW PUZZLE';document.getElementById('dbtn').style.display='none';
  ['fd','fm'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fp').value='100';document.getElementById('fti').value='180';document.getElementById('ft').value='w';
  document.getElementById('smsg').textContent='';
  edB=Array(64).fill(null);edSel=null;buildTray('w');buildTray('b');drawBoard();
  document.querySelectorAll('.pcard').forEach(c=>c.classList.remove('active'));
  document.getElementById('editor').classList.add('open');
  document.getElementById('editor').scrollIntoView({behavior:'smooth',block:'start'});
}
function openEdit(p){
  editId=p.id;document.getElementById('etitle').textContent='EDIT PUZZLE';document.getElementById('dbtn').style.display='';
  document.getElementById('fd').value=p.description||'';document.getElementById('fp').value=p.points||100;
  document.getElementById('fti').value=p.timer_seconds||180;document.getElementById('ft').value=p.turn||'w';
  document.getElementById('smsg').textContent='';
  try{const mv=JSON.parse(p.solution||'[]');document.getElementById('fm').value=mv.map(m=>m.from+m.to).join(String.fromCharCode(10));}catch(e){document.getElementById('fm').value=(p.answer_from||'')+(p.answer_to||'');}
  edB=p.fen?fen2board(p.fen)||Array(64).fill(null):Array(64).fill(null);
  edSel=null;buildTray('w');buildTray('b');drawBoard();
  document.querySelectorAll('.pcard').forEach(c=>c.classList.toggle('active',String(c.dataset.id)===String(p.id)));
  document.getElementById('editor').classList.add('open');
  document.getElementById('editor').scrollIntoView({behavior:'smooth',block:'start'});
}
function closeEd(){document.getElementById('editor').classList.remove('open');document.querySelectorAll('.pcard').forEach(c=>c.classList.remove('active'));editId=null;}

async function save(){
  const desc=document.getElementById('fd').value.trim();
  const movesRaw=document.getElementById('fm').value.trim();
  const pts=parseInt(document.getElementById('fp').value)||100;
  const timer=parseInt(document.getElementById('fti').value)||180;
  const turn=document.getElementById('ft').value;
  const msg=document.getElementById('smsg');
  if(!desc){msg.style.color='var(--r)';msg.textContent='Description required.';return;}
  if(!movesRaw){msg.style.color='var(--r)';msg.textContent='At least one move required.';return;}
  if(!edB.some(Boolean)){msg.style.color='var(--r)';msg.textContent='Place pieces on the board.';return;}
  const lines=movesRaw.split(String.fromCharCode(10)).map(l=>l.trim().toLowerCase()).filter(Boolean);
  const parsed=[];
  for(const mv of lines){
    if(mv.length<4){msg.style.color='var(--r)';msg.textContent='Invalid move: '+mv;return;}
    const from=mv.slice(0,2),to=mv.slice(2,4);
    if(a2i(from)<0||a2i(to)<0){msg.style.color='var(--r)';msg.textContent='Bad squares: '+mv;return;}
    parsed.push({from,to});
  }
  const fen=board2fen();
  msg.style.color='#556655';msg.textContent='Saving...';
  document.getElementById('savebtn').disabled=true;
  const rec={description:desc.toUpperCase(),fen,answer_from:parsed[0].from,answer_to:parsed[0].to,solution:JSON.stringify(parsed),turn,points:pts,timer_seconds:timer,created_by:(localStorage.getItem('loggedInUser')||'manager'),created_at:Date.now(),deleted:false};
  const result=editId?await dbUpdateChessPuzzle(editId,{description:rec.description,fen,answer_from:rec.answer_from,answer_to:rec.answer_to,solution:rec.solution,turn,points:pts,timer_seconds:timer}):await dbCreateChessPuzzle(rec);
  document.getElementById('savebtn').disabled=false;
  if(!result){msg.style.color='var(--r)';msg.textContent='Failed to save.';return;}
  msg.style.color='var(--g)';msg.textContent='\u2713 SAVED!';
  closeEd();await load();
}

async function del(){
  if(!editId)return;
  const desc=document.getElementById('fd').value||'this puzzle';
  if(!confirm('Delete "'+desc.toUpperCase()+'"? Cannot be undone.'))return;
  await dbDeleteChessPuzzle(editId);closeEd();await load();
}

</script>
</body>
</html>
